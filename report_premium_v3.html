<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CAL 의식OS 프리미엄 리포트 v3.0</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">

<style>
:root {
  --bg: #fdfcf9;
  --ink: #1a1a1a;
  --gold: #b28e5d;
  --gold-soft: #f4eee4;
  --border: rgba(0, 0, 0, 0.08);
  --shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
}

body {
  margin: 0;
  font-family: 'Pretendard', sans-serif;
  background-color: var(--bg);
  color: var(--ink);
  line-height: 1.7;
  word-break: keep-all;
}

.report-wrap {
  max-width: 540px; /* 모바일에서 가장 예쁘게 보이는 폭 */
  margin: 0 auto;
  padding: 20px 16px 80px;
}

/* 상단 커버 디자인 */
.cover {
  background: #1a1a1a;
  color: #fff;
  padding: 40px 24px;
  border-radius: 32px;
  text-align: center;
  margin-bottom: 30px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.1);
}

.kicker {
  font-size: 11px;
  letter-spacing: 0.25em;
  color: var(--gold);
  font-weight: 800;
  margin-bottom: 15px;
}

.cover h1 {
  font-size: 26px;
  font-weight: 800;
  margin: 0 0 20px;
  line-height: 1.3;
}

.meta-info {
  display: flex;
  justify-content: center;
  gap: 12px;
  font-size: 13px;
  color: rgba(255,255,255,0.6);
}

/* 섹션 공통 스타일 */
.section {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 28px;
  padding: 24px;
  margin-bottom: 24px;
  box-shadow: var(--shadow);
}

.section-num {
  font-size: 12px;
  font-weight: 900;
  color: var(--gold);
  margin-bottom: 8px;
  display: block;
}

.section-title {
  font-size: 21px;
  font-weight: 800;
  margin-bottom: 20px;
  color: #000;
}

/* 포인트 박스 */
.lead-box {
  background: var(--gold-soft);
  padding: 20px;
  border-radius: 20px;
  margin-bottom: 20px;
}

.lead-box strong {
  font-size: 18px;
  color: #4a3a25;
  display: block;
  line-height: 1.5;
}

/* 카드 스타일 */
.card {
  background: #f9f9f9;
  border-radius: 18px;
  padding: 16px;
  margin-bottom: 12px;
  border: 1px solid var(--border);
}

.card-label {
  font-size: 12px;
  font-weight: 800;
  color: var(--gold);
  margin-bottom: 6px;
  display: block;
}

/* 다이어그램 (모바일 스크롤) */
.diagram-wrap {
  display: flex;
  overflow-x: auto;
  gap: 10px;
  padding: 10px 0 20px;
  -ms-overflow-style: none; scrollbar-width: none;
}
.diagram-wrap::-webkit-scrollbar { display: none; }

.diag-item {
  flex: 0 0 auto;
  background: #1a1a1a;
  color: #fff;
  padding: 10px 18px;
  border-radius: 100px;
  font-size: 13px;
  font-weight: 600;
}

/* CAL 인사이트 */
.cal-insight {
  margin-top: 20px;
  padding: 18px;
  background: #f1f3f5;
  border-radius: 18px;
  font-size: 14px;
  border-left: 4px solid var(--ink);
}

.cal-insight b {
  display: block;
  font-size: 11px;
  letter-spacing: 0.1em;
  margin-bottom: 5px;
}

.final-section {
  background: linear-gradient(135deg, #1a1a1a, #333);
  color: #fff;
  text-align: center;
}

.declaration {
  font-size: 22px;
  font-weight: 800;
  color: var(--gold);
  padding: 20px 0;
}

.footer { text-align: center; font-size: 11px; color: #999; margin-top: 40px; }
</style>
</head>

<body>
<div id="app" class="report-wrap"></div>

<script>
// 연삿갓님의 실제 데이터를 그대로 사용합니다.
const reportData = {
  "meta": {
    "clientName": "연삿갓",
    "reportDate": "2026-05-08",
    "reportId": "CAL-PREMIUM-20260508-연삿갓",
    "reportType": "CAL 의식OS 프리미엄 리포트 v3.0",
    "coreThesis": "현실은 사건이 아니라 반복 실행된 의식 구조의 출력입니다."
  },
  "executiveSummary": {
    "title": "현실 출력 구조 요약",
    "oneLineDiagnosis": "연삿갓님의 핵심 구조는 어린 시절 신체 충격 사건이 ‘평생 해결해야 할 숙제’로 저장되며, 불안과 압박을 반복 출력해온 구조입니다.",
    "corePattern": "감정 즉시 반응, 해석 과잉, 말의 잔상, 신체 긴장, 반복 반응이 모두 ‘가끔 그렇다’로 나타나며, 자동반응이 강박적으로 폭주하기보다는 특정 자극에서 간헐적으로 실행되는 구조입니다.",
    "calInsight": "사건 자체가 아니라 '풀어야 할 숙제'라고 명명한 내면의 라벨링이 현재의 자유를 제한하는 주범입니다."
  },
  "coreLoop": {
    "title": "핵심 자동반응 루프",
    "loopDiagram": ["자극 입력", "숙제 해석", "불안 발생", "자동반응", "재출력"],
    "coreInsight": "어린 시절 충격 사건 → ‘평생 치유해야 할 숙제’라는 해석 → 불안과 압박 → 회피 → 미완료감 저장"
  },
  "consciousnessOS": {
    "title": "의식OS 구조 분석",
    "patterns": [
      { "label": "6식 - 해석", "desc": "외부 자극을 '심각한 과제'로 즉각 분류" },
      { "label": "9식 - 선택", "desc": "최근 '나무에 흠집났네~'라는 가벼운 해석 언어 형성됨" }
    ]
  },
  "finalMessage": {
    "title": "최종 선언",
    "declaration": "나는 더 이상 숙제를 푸는 자가 아니라, 풍요를 그리는 아키텍트이다.",
    "closing": "연삿갓님의 시스템이 새로운 평온의 알고리즘으로 재부팅되었습니다."
  }
};

const esc = (v) => v || '';

function renderReport(data) {
  const app = document.getElementById('app');
  
  app.innerHTML = `
    <header class="cover">
      <div class="kicker">CONSCIOUSNESS ARCHITECTURE LAB</div>
      <h1>${esc(data.meta.reportType)}</h1>
      <div class="meta-info">
        <span>${esc(data.meta.clientName)} 님</span>
        <span>${esc(data.meta.reportDate)}</span>
      </div>
    </header>

    <section class="section">
      <span class="section-num">01</span>
      <h2 class="section-title">${esc(data.executiveSummary.title)}</h2>
      <div class="lead-box">
        <strong>${esc(data.executiveSummary.oneLineDiagnosis)}</strong>
      </div>
      <p style="font-size:15px; color:#444;">${esc(data.executiveSummary.corePattern)}</p>
      <div class="cal-insight">
        <b>CAL INSIGHT</b>
        ${esc(data.executiveSummary.calInsight)}
      </div>
    </section>

    <section class="section" style="background:#fcfcfc">
      <span class="section-num">02</span>
      <h2 class="section-title">${esc(data.coreLoop.title)}</h2>
      <div class="diagram-wrap">
        ${data.coreLoop.loopDiagram.map(item => `<div class="diag-item">${item}</div>`).join('')}
      </div>
      <div class="card">
        <span class="card-label">루프 메커니즘</span>
        <p style="margin:0; font-size:14px;">${esc(data.coreLoop.coreInsight)}</p>
      </div>
    </section>

    <section class="section">
      <span class="section-num">03</span>
      <h2 class="section-title">${esc(data.consciousnessOS.title)}</h2>
      ${data.consciousnessOS.patterns.map(p => `
        <div class="card">
          <span class="card-label">${p.label}</span>
          <p style="margin:0; font-size:14px;">${p.desc}</p>
        </div>
      `).join('')}
    </section>

    <section class="section final-section">
      <span class="section-num" style="color:#d6a94d">FINALLY</span>
      <h2 class="section-title" style="color:#fff">${esc(data.finalMessage.title)}</h2>
      <div class="declaration">"${esc(data.finalMessage.declaration)}"</div>
      <p style="font-size:14px; color:rgba(255,255,255,0.7)">${esc(data.finalMessage.closing)}</p>
    </section>

    <div class="footer">
      © 2026 Consciousness Architecture Lab.<br>
      본 리포트는 의식 구조 분석을 위한 가이드입니다.
    </div>
  `;
}

renderReport(reportData);
</script>
</body>
</html>
