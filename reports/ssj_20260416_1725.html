<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>성수지 의식OS 프리미엄 리포트</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, "Noto Sans KR", sans-serif;
      background: #f8fafc;
      color: #111827;
      line-height: 1.75;
    }
    .wrap {
      max-width: 820px;
      margin: 0 auto;
      padding: 36px 18px 80px;
    }
    .cover {
      background: linear-gradient(135deg, #111827, #1e293b);
      color: white;
      padding: 42px 26px;
      border-radius: 24px;
      margin-bottom: 28px;
    }
    .label {
      font-size: 13px;
      letter-spacing: 0.12em;
      color: #facc15;
      font-weight: 700;
    }
    h1 {
      font-size: 32px;
      margin: 14px 0 10px;
      line-height: 1.25;
    }
    h2 {
      margin-top: 34px;
      font-size: 22px;
      border-left: 5px solid #111827;
      padding-left: 12px;
    }
    h3 {
      margin-top: 22px;
      font-size: 18px;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 24px;
      margin: 18px 0;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
      border: 1px solid #e5e7eb;
    }
    .score-row {
      margin: 14px 0;
    }
    .score-label {
      display: flex;
      justify-content: space-between;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .bar {
      height: 12px;
      background: #e5e7eb;
      border-radius: 999px;
      overflow: hidden;
    }
    .bar span {
      display: block;
      height: 100%;
      background: #111827;
      border-radius: 999px;
    }
    ul {
      padding-left: 22px;
    }
    li {
      margin-bottom: 8px;
    }
    .footer {
      margin-top: 42px;
      padding-top: 22px;
      border-top: 1px solid #e5e7eb;
      color: #64748b;
      font-size: 14px;
    }
    @media print {
      body { background: white; }
      .card, .cover { box-shadow: none; }
    }
  </style>
</head>

<body>
  <main id="report" class="wrap"></main>

  <script>
    const reportData = {
  "clientName": "성수지",
  "reportDate": "2026.04.16",
  "reportType": "의식OS 프리미엄 리포트",
  "totalState": "내면 불일치 감지형 구조",
  "mainMessage": "성수지님은 자신을 문제로 단정하기보다, 겉으로 드러나는 자신과 실제 속내 사이의 차이를 감지하며 그 간격의 이유를 관찰하는 구조입니다.",
  "sajuOS": "성수지님의 사주OS는 운명 판단이 아니라 입력 필터입니다. 갑진년, 임신월, 기미일, 기사시의 구조는 현실 자극을 몸, 안정감, 책임, 내면 기준의 문제로 받아들이는 경향을 만듭니다. 성수지님은 외부 사건보다 그 사건이 자신의 내면과 얼마나 일치하는지를 먼저 감지합니다.",
  "energyPattern": "성수지님에게 강하게 작동하는 에너지는 토(土) 에너지와 수(水) 에너지입니다. 토(土) 에너지는 안정, 책임, 현실 유지의 감각으로 작동하고, 수(水) 에너지는 속내를 깊이 관찰하는 흐름으로 작동합니다. 그래서 성수지님은 돈, 몸의 피로, 휴식, 여행 같은 주제에서 ‘현실을 유지하는 나’와 ‘진짜 쉬고 싶은 나’ 사이의 간격을 민감하게 감지합니다.",
  "elementScores": [
    {
      "label": "목",
      "value": 33
    },
    {
      "label": "화",
      "value": 33
    },
    {
      "label": "토",
      "value": 100
    },
    {
      "label": "금",
      "value": 33
    },
    {
      "label": "수",
      "value": 33
    }
  ],
  "dominantElements": "토(土) 에너지와 수(水) 에너지",
  "scores": [
    {
      "label": "선택 가능성",
      "value": 72
    },
    {
      "label": "자동반응",

    }

  "summary": [
    "성수지님은 감정에 즉각 휩쓸리기보다, 자신의 반응을 관찰하는 힘이 살아 있습니다.",
    "성수지님은 문제를 단정하기보다 겉으로 보이는 모습과 속내의 차이를 구조적으로 감지합니다.",
    "성수지님에게 핵심 전환점은 해결을 서두르는 것이 아니라, 이 간격이 반복 구조임을 알아차리는 순간입니다."
  ],
  "osStructure": {
    "input": "성수지님은 돈, 몸의 피로, 안정감, 휴식 욕구 같은 현실 자극을 가슴과 육체 감각으로 먼저 입력합니다.",
    "interpretation": "성수지님은 그 자극을 ‘겉으로는 괜찮아 보이지만 속으로는 다른 욕구가 있다’는 방식으로 해석합니다.",
    "identification": "성수지님은 이 차이를 문제로 단정하지는 않지만, 왜 이런 간격이 생기는지 내면에서 오래 바라보는 구조가 있습니다.",
    "storage": "성수지님의 저장 패턴에는 책임을 유지해야 한다는 토(土)적 감각과, 조용히 쉬고 자연 속으로 물러나고 싶은 수(水)적 욕구가 함께 저장되어 있습니다.",

    "성수지님은 이 차이를 문제로 단정하지 않고 ‘왜 이럴까’라고 관찰합니다.",

    "성수지님이 이 흐름을 구조로 인식하는 순간, 반응과 선택 사이의 간격이 열립니다."

  "turningQuestions": [
    "성수지님, 지금 이 반응은 실제 문제인가, 아니면 반복되는 구조인가?",

    "성수지님, 지금 필요한 것은 결론인가, 아니면 구조를 알아차리는 시간인가?"

  "sevenDays": [
    "1일차: 성수지님은 오늘 가슴이 반응한 순간을 한 문장으로 기록합니다.",
    "2일차: 성수지님은 돈과 관련된 생각이 올라올 때 몸의 감각을 먼저 확인합니다.",
    "3일차: 성수지님은 겉으로 한 말과 속으로 느낀 말을 나란히 적어봅니다.",
    "4일차: 성수지님은 ‘이것은 문제인가, 구조인가?’라는 질문을 하루 한 번 사용합니다.",
    "5일차: 성수지님은 육체를 편히 쉬게 하는 행동 하나를 실제로 선택합니다.",
    "6일차: 성수지님은 자연, 여행, 휴식과 연결된 이미지를 보며 내면 욕구를 확인합니다.",
    "7일차: 성수지님은 이번 주 반복된 반응 하나를 선택의 자리에서 다시 읽어봅니다."
  ],
  "finalMessage": "성수지님은 고쳐야 할 사람이 아니라, 겉과 속의 차이를 섬세하게 감지하는 구조입니다. 그 구조가 보이면 자각이 생기고, 자각이 생기는 순간 선택의 간격이 열립니다."
};

    function escapeHtml(text) {
      return String(text ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function renderScores(scores) {
      if (!Array.isArray(scores)) return "";
      return scores.map(item => `
        <div class="score-row">
          <div class="score-label">
            <span>${escapeHtml(item.label)}</span>
            <span>${escapeHtml(item.value)}%</span>
          </div>
          <div class="bar"><span style="width:${Number(item.value) || 0}%"></span></div>
        </div>
      `).join("");
    }

    function renderList(items) {
      if (!Array.isArray(items)) return "";
      return "<ul>" + items.map(item => `
        <li>${escapeHtml(item)}</li>
      `).join("") + "</ul>";
    }

    function renderOsStructure(os) {
      if (!os || typeof os !== "object") return "";
      const labels = {
        input: "5식 입력",
        interpretation: "6식 해석",
        identification: "7식 동일시",
        storage: "8식 저장 패턴",
        choice: "9식 선택 지점"
      };
      return Object.keys(labels).map(key => `
        <h3>${labels[key]}</h3>
        <p>${escapeHtml(os[key])}</p>
      `).join("");
    }

    function renderReport(data) {
      const root = document.getElementById("report");

      root.innerHTML = `
        <section class="cover">
          <div class="label">CONSCIOUSNESS ARCHITECTURE LAB</div>
          <h1>${escapeHtml(data.clientName)} 의식OS 프리미엄 리포트</h1>
          <p>${escapeHtml(data.reportDate)} · ${escapeHtml(data.reportType)}</p>
        </section>

        <section class="card">
          <h2>전체 진단</h2>
          <p><strong>${escapeHtml(data.totalState)}</strong></p>
          <p>${escapeHtml(data.mainMessage)}</p>
        </section>

        <section class="card">
          <h2>사주OS 기반 구조 해석</h2>
          <p>${escapeHtml(data.sajuOS)}</p>
          <p>${escapeHtml(data.energyPattern)}</p>
          <p><strong>주요 작동 에너지:</strong> ${escapeHtml(data.dominantElements)}</p>
        </section>

        <section class="card">
          <h2>체크리스트 점수</h2>
          ${renderScores(data.scores)}
        </section>

        <section class="card">
          <h2>오행 에너지 점수</h2>
          ${renderScores(data.elementScores)}
        </section>

        <section class="card">
          <h2>핵심 요약</h2>
          ${renderList(data.summary)}
        </section>

        <section class="card">
          <h2>의식OS 작동 구조</h2>
          ${renderOsStructure(data.osStructure)}
        </section>

        <section class="card">
          <h2>반복 루프</h2>
          ${renderList(data.loop)}
        </section>

        <section class="card">
          <h2>전환 질문</h2>
          ${renderList(data.turningQuestions)}
        </section>

        <section class="card">
          <h2>7일 전환 루틴</h2>
          ${renderList(data.sevenDays)}
        </section>

        <section class="card">
          <h2>마무리 메시지</h2>
          <p>${escapeHtml(data.finalMessage)}</p>
        </section>

        <div class="footer">
          의식 구조 연구소 CAL · 현실은 사건이 아니라 구조입니다. 구조가 보이면 선택이 열립니다.
        </div>
      `;
    }

    renderReport(reportData);
  </script>
</body>
</html>
