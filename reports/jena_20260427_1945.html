<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JENA 의식OS 프리미엄 리포트</title>
  <style>
    :root{
      --bg:#f3eee6;
      --paper:#fffaf2;
      --ink:#241f1a;
      --muted:#7b7064;
      --gold:#b8944d;
      --line:#e3d8c8;
      --deep:#2d261f;
      --soft:#f7efe1;
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);font-family:"Noto Sans KR","Apple SD Gothic Neo",sans-serif;color:var(--ink);line-height:1.75}
    .wrap{max-width:900px;margin:0 auto;padding:28px 16px 70px}
    .cover{background:linear-gradient(135deg,#2d261f,#5b4937);color:#fffaf2;border-radius:32px;padding:54px 30px;margin-bottom:26px;box-shadow:0 20px 50px rgba(45,38,31,.25)}
    .label{display:inline-block;border:1px solid rgba(255,255,255,.4);border-radius:999px;padding:6px 14px;font-size:13px;letter-spacing:.08em;color:#ead8b8;margin-bottom:24px}
    h1{font-size:38px;line-height:1.25;margin:0 0 18px;letter-spacing:-.05em}
    h2{font-size:24px;margin:0 0 18px;letter-spacing:-.04em}
    h3{font-size:18px;margin:22px 0 8px}
    p{margin:0 0 14px}
    section{background:var(--paper);border:1px solid var(--line);border-radius:26px;padding:32px 26px;margin-bottom:22px;box-shadow:0 8px 28px rgba(80,60,40,.07)}
    .subtitle{font-size:18px;color:#ead8b8;margin-bottom:28px}
    .cover-line{width:68px;height:3px;background:var(--gold);margin:28px 0}
    .client{font-size:15px;color:#f5ead8}
    .note{background:var(--soft);border-left:5px solid var(--gold);padding:18px 20px;border-radius:16px;margin:18px 0;font-weight:600}
    .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-top:16px}
    .card{background:#fffdf8;border:1px solid var(--line);border-radius:18px;padding:18px}
    .card strong{display:block;color:var(--gold);margin-bottom:8px}
    .desc{font-size:13px;color:var(--muted);margin-bottom:6px}
    .bar-box{margin:16px 0}
    .bar-label{display:flex;justify-content:space-between;font-size:14px;color:var(--muted);font-weight:800;margin-bottom:7px}
    .bar{height:12px;background:#e8ddcf;border-radius:999px;overflow:hidden}
    .bar span{display:block;height:100%;background:linear-gradient(90deg,#b8944d,#6d5532);border-radius:999px}
    .summary{font-size:20px;font-weight:800;line-height:1.6}
    .list{padding-left:20px;margin:0}
    .list li{margin-bottom:10px}
    .footer{text-align:center;font-size:13px;color:var(--muted);padding:24px 0}

    .toolbar{
      position:sticky;
      top:0;
      z-index:20;
      display:flex;
      justify-content:center;
      gap:10px;
      padding:14px;
      background:rgba(243,238,230,.94);
      backdrop-filter:blur(10px);
      border-bottom:1px solid var(--line);
    }

    .toolbar button{
      border:0;
      border-radius:999px;
      padding:11px 18px;
      background:var(--deep);
      color:#fffaf2;
      font-weight:800;
      cursor:pointer;
    }

    @media print{
      .toolbar{display:none}
    }

    @media(max-width:640px){
      .wrap{padding:18px 12px 54px}
      .cover{padding:42px 22px;border-radius:26px}
      h1{font-size:31px}
      section{padding:26px 20px;border-radius:22px}
      .grid{grid-template-columns:1fr}
    }
  </style>
</head>

<body>
  <div class="toolbar">
    <button onclick="window.print()">PDF 저장 / 인쇄</button>
  </div>

  "finalMessage": "현재 당신은 상황판단이 흐려지는 순간, 가슴 답답함을 통해 자동반응이 먼저 작동하는 상태입니다.\n\n1. 현재 작동 중인 의식 구조\n당신의 의식 구조는 상황을 명료하게 보는 구조보다, 압박을 먼저 감지하는 구조로 작동하고 있습니다. 특히 돈, 일, 방과 연결된 현실 문제에서 판단해야 한다는 신호가 들어오면 몸이 먼저 반응합니다. 가슴 답답함은 단순한 감정이 아니라, 선택권이 자동반응으로 넘어갔다는 신체 신호입니다.\n\n2. 현실 출력 결과\n당신이 원하는 현실은 돈이 들어오고, 편안하고, 자유롭게 여행하는 상태입니다. 그러나 현재 구조에서는 자유를 원하면서도 압박이 먼저 올라와 선택이 늦어집니다. 그래서 현실에서는 편안함보다 답답함, 자유보다 판단 부담이 먼저 출력됩니다.\n\n3. 반복패턴 분석\n이 반응패턴은 특정 상황의 문제가 아니라,\n관계, 연애, 돈, 일 전반에 걸쳐\n의식하지 못한 채 지속적으로 작동하고 있는 백그라운드 알고리즘입니다.\n\n4. 구조적 비유\n당신의 현재 구조는 내비게이션이 목적지를 입력하기 전에 경고음부터 울리는 상태입니다. 목적지는 자유와 편안함인데, 시스템은 먼저 위험 신호를 켭니다. 그래서 이동이 늦어지고, 판단이 흐려지고, 몸이 답답해집니다.\n\n5. 지금 즉시 멈춰야 할 것\n지금 즉시 멈춰야 할 것은 더 잘 판단하려는 압박입니다. 판단을 더 밀어붙이면 가슴 답답함이 강해지고 자동반응이 강화됩니다. 먼저 멈춰야 합니다.\n\n6. 새로운 선택\n새로운 선택은 판단을 완성하는 것이 아니라, 답답함이 올라온 순간 7초 동안 반응을 멈추는 것입니다. 그다음 가장 작은 선택 하나만 실행합니다.\n\n7. 7x7x7 루틴\n7일 동안 단 하나만 반복합니다. 하루 최대 7회, 가슴 답답함이 올라오는 순간 7초 멈춥니다. 기록 항목은 상황, 영역, 반응패턴, 멈춤 여부, 새로운 선택입니다. 완벽보다 반복이 중요합니다.\n\n8. 효과 설명\n처음에는 잘 되지 않는 것이 정상입니다.\n지금까지의 반응패턴이 당신의 기본값이었기 때문입니다.\n\n하지만 이 기록과 멈춤의 반복은\n당신의 뇌와 의식에 새로운 회로를 만들어냅니다.\n\n생각보다 반응이 먼저 나오던 구조가,\n점점 ‘멈추고 선택하는 구조’로 바뀌기 시작합니다.\n\n이건 단순한 기분 변화가 아니라,\n실제 작동 방식이 바뀌는 과정입니다.\n\n양자도약은 한순간에 일어나지 않습니다.\n작은 멈춤과 선택이 쌓이면서,\n어느 순간 전혀 다른 현실로 전환됩니다.\n\n지금 이 한 번의 멈춤이\n당신의 현실을 바꾸는 시작입니다.\n\n9. 최종 선언\n지금까지 당신을 움직여온 것은 자동반응입니다.\n하지만 당신은 그렇게 작은 존재가 아닙니다.\n당신의 본질은, 그것을 언제든 멈추고 새롭게 선택할 수 있는 ‘의식하는 자아’입니다."

    function escapeHtml(text){
      return String(text ?? "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    function arr(v){return Array.isArray(v)?v:[]}

    function normalize(data){
      return {
        clientName:data.clientName || data.name || "고객",
        reportDate:data.reportDate || data.date || new Date().toLocaleDateString("ko-KR"),
        reportType:data.reportType || "의식OS 프리미엄 리포트",
        totalState:data.totalState || data.state || "구조 분석 진행",
        mainMessage:data.mainMessage || data.coreMessage || data.summaryMessage || "현재 작동 중인 의식 구조를 분석했습니다.",
        sajuOS:data.sajuOS || data.saju || data.initialSetting || "사주OS 또는 초기 설정값 분석 내용이 입력되지 않았습니다.",
        energyPattern:data.energyPattern || data.fiveElementPattern || data.ohangPattern || "오행 에너지 패턴 분석 내용이 입력되지 않았습니다.",
        elementScores:arr(data.elementScores),
        dominantElements:data.dominantElements || "",
        scores:arr(data.scores),
        summary:arr(data.summary),
        osStructure:data.osStructure || {},
        loop:arr(data.loop || data.autoLoop),
        turningQuestions:arr(data.turningQuestions || data.questions),
        sevenDays:arr(data.sevenDays || data.practice),
        finalMessage:data.finalMessage || "구조가 보이면 선택이 열립니다."
      };
    }

    function renderReport(raw){
      const data=normalize(raw);
      const os=data.osStructure;
      const e=data.elementScores || [];

      const getElementValue=(name)=>{
        const found=e.find(item=>String(item.label || "").includes(name));
        return Number(found?.value) || 0;
      };

      const wood=getElementValue("목");
      const fire=getElementValue("화");
      const earth=getElementValue("토");
      const metal=getElementValue("금");
      const water=getElementValue("수");

      const totalElement=wood+fire+earth+metal+water || 1;
      const p1=(wood/totalElement)*100;
      const p2=(fire/totalElement)*100;
      const p3=(earth/totalElement)*100;
      const p4=(metal/totalElement)*100;
      const c1=p1;
      const c2=p1+p2;
      const c3=p1+p2+p3;
      const c4=p1+p2+p3+p4;

      document.getElementById("report").innerHTML=`
        <div class="cover">
          <div>
            <div class="label">CONSCIOUSNESS OS PREMIUM REPORT</div>
            <h1>${escapeHtml(data.reportType)}<br>심화 분석 리포트</h1>
            <div class="subtitle">반복되는 감정과 선택 패턴을<br>의식 구조의 관점에서 해석합니다.</div>
            <div class="cover-line"></div>
            <div class="client">
              CLIENT NAME : ${escapeHtml(data.clientName)}<br>
              REPORT DATE : ${escapeHtml(data.reportDate)}<br>
              STATE : ${escapeHtml(data.totalState)}
            </div>
          </div>
        </div>

        <section>
          <h2>SECTION 1. 핵심 진단 요약</h2>
          <p class="summary">${escapeHtml(data.mainMessage)}</p>
          <div class="grid">
            ${data.summary.map(item=>`<div class="card">${escapeHtml(item)}</div>`).join("")}
          </div>
        </section>

        <section>
          <h2>SECTION 2. 점수 기반 단계 분석</h2>
          ${data.scores.map(s=>`
            <div class="bar-box">
              <div class="bar-label">
                <span>${escapeHtml(s.label)}</span>
                <span>${Number(s.value)||0}%</span>
              </div>
              <div class="bar">
                <span style="width:${Math.max(0,Math.min(100,Number(s.value)||0))}%"></span>
              </div>
            </div>
          `).join("")}
          <div class="note">점수는 정답이 아니라 방향입니다. 중요한 것은 어떤 상황에서 어떤 구조가 자동 실행되는지 보는 것입니다.</div>
        </section>

        <section>
          <h2>SECTION 3. 사주OS / 초기 설정값</h2>
          <p>${escapeHtml(data.sajuOS)}</p>
        </section>

        <section>
          <h2>SECTION 4. 오행 에너지 분포</h2>
          <div class="note">오행은 운명이 아니라, 반응을 만들어내는 ‘에너지 구조’입니다.</div>
          <p><strong style="font-size:18px;color:#b38b59;">${escapeHtml(data.clientName)}님의 핵심 반응 구조는 ${escapeHtml(data.dominantElements)} 중심으로 작동합니다.</strong></p>
          <div class="note">${escapeHtml(data.dominantElements)}는 반복되는 감정, 선택, 관계 패턴을 만들어내는 핵심 축으로 작동합니다.</div>

          <div style="display:flex;flex-direction:column;align-items:center;gap:20px;margin:24px 0;">
            <div style="
              width:220px;
              height:220px;
              border-radius:50%;
              background:conic-gradient(
                #4CAF50 0% ${c1}%,
                #F44336 ${c1}% ${c2}%,
                #A1887F ${c2}% ${c3}%,
                #9E9E9E ${c3}% ${c4}%,
                #2196F3 ${c4}% 100%
              );
              position:relative;
            ">
              <div style="
                position:absolute;
                top:50%;
                left:50%;
                transform:translate(-50%,-50%);
                width:120px;
                height:120px;
                border-radius:50%;
                background:#fffaf2;
              "></div>
            </div>

            <div style="width:100%;max-width:340px;font-weight:700;">
              <div style="display:flex;justify-content:space-between;margin-bottom:6px;"><span style="color:#4CAF50;">목(木) 에너지</span><span>${wood}</span></div>
              <div style="display:flex;justify-content:space-between;margin-bottom:6px;"><span style="color:#F44336;">화(火) 에너지</span><span>${fire}</span></div>
              <div style="display:flex;justify-content:space-between;margin-bottom:6px;"><span style="color:#A1887F;">토(土) 에너지</span><span>${earth}</span></div>
              <div style="display:flex;justify-content:space-between;margin-bottom:6px;"><span style="color:#9E9E9E;">금(金) 에너지</span><span>${metal}</span></div>
              <div style="display:flex;justify-content:space-between;"><span style="color:#2196F3;">수(水) 에너지</span><span>${water}</span></div>
            </div>
          </div>

          <p>${escapeHtml(data.clientName)}님의 구조에서 가장 강하게 작동하는 에너지는 <strong>${escapeHtml(data.dominantElements || "")}</strong>입니다.</p>
          <p>${escapeHtml(data.energyPattern)}</p>
        </section>

        <section>
          <h2>SECTION 5. 당신의 의식 구조 (5식~9식 해석)</h2>
          <div class="note">이 구조는 우리가 어떻게 반응하고 선택하는지를 보여주는 내면 시스템입니다.</div>
          <div class="grid">
            <div class="card"><strong>5식 (입력)</strong><p class="desc">외부 자극을 받아들이는 단계</p>${escapeHtml(os.input || os.five || "")}</div>
            <div class="card"><strong>6식 (해석·판단)</strong><p class="desc">그 자극에 의미를 붙이는 단계</p>${escapeHtml(os.interpretation || os.six || "")}</div>
            <div class="card"><strong>7식 (동일시)</strong><p class="desc">그 해석을 ‘나’라고 믿는 단계</p>${escapeHtml(os.identification || os.seven || "")}</div>
            <div class="card"><strong>8식 (저장 패턴)</strong><p class="desc">반복된 경험이 쌓여 자동화되는 단계</p>${escapeHtml(os.storage || os.eight || "")}</div>
            <div class="card"><strong>9식 (의식하는 자아)</strong><p class="desc">모든 과정을 알아차리고 선택하는 주체</p>${escapeHtml(os.choice || os.nine || "")}</div>
          </div>
          <div class="note">대부분의 사람은 5식~8식에서 자동으로 반응합니다.<br>하지만 당신은 9식, 즉 ‘선택의 자리’로 돌아올 수 있습니다.</div>
          <div class="note">당신의 변화는 감정을 없애는 것이 아니라, 이 구조를 알아차리는 순간 시작됩니다.</div>
        </section>

        <section>
          <h2>SECTION 6. 자동반응 루프</h2>
          <ul class="list">${data.loop.map(item=>`<li>${escapeHtml(item)}</li>`).join("")}</ul>
        </section>

        <section>
          <h2>SECTION 7. 선택의 자리로 돌아오는 전환 질문</h2>
          <ul class="list">${data.turningQuestions.map(item=>`<li>${escapeHtml(item)}</li>`).join("")}</ul>
        </section>

        <section>
          <h2>SECTION 8. 7일 실천 루틴</h2>
          <ul class="list">${data.sevenDays.map(item=>`<li>${escapeHtml(item)}</li>`).join("")}</ul>
        </section>

        <section>
          <h2>FINAL MESSAGE</h2>
          <p class="summary">${escapeHtml(data.finalMessage)}</p>
          <div class="note">이 리포트의 목적은 당신을 규정하는 것이 아니라,<br>당신이 스스로 선택의 자리로 돌아올 수 있도록 돕는 것입니다.</div>
        </section>

        <div class="footer">
          © Consciousness Architecture Lab · JENA CO.<br>
          Reality isn’t events. It’s structure.
        </div>
      `;
    }

    renderReport(reportData);
