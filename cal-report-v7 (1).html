const data = window.REPORT_DATA;
const $ = (s)=>document.querySelector(s);
function esc(v){return String(v??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));}
function pctStops(elements){const vals=Object.values(elements).map(Number);const sum=vals.reduce((a,b)=>a+b,0)||1;let acc=0;return vals.map(v=>{acc+=v/sum*100;return acc.toFixed(2)+'%'});}
function renderLists(lists){if(!lists)return '';return `<div class="grid">${Object.entries(lists).map(([k,arr])=>`<div class="mini"><h3>${esc(k)}</h3><ul>${arr.map(x=>`<li>${esc(x)}</li>`).join('')}</ul></div>`).join('')}</div>`}
function renderSteps(steps){if(!steps)return '';return `<div class="steps">${steps.map(s=>`<div class="step"><b>${esc(s.label)}</b><span>${esc(s.text)}</span></div>`).join('')}</div>`}
function renderSaju(saju){if(!saju)return '';const entries=Object.entries(saju.elements||{});const stops=pctStops(saju.elements||{});const cls=['wood','fire','earth','metal','water'];const max=Math.max(...entries.map(([,v])=>Number(v)||0),1);const dominant=saju.dominant||'';const barRows=entries.map(([k,v],i)=>{const c=cls[i]||'wood';const isDom=k===dominant;const width=Math.max(8,(Number(v)||0)/max*100).toFixed(1);return `<div class="bar-row ${isDom?'dominant':''}"><b>${esc(k)}</b><div class="bar-track"><span class="bar-fill ${c}" style="width:${width}%"></span></div><strong class="bar-value">${esc(v)}</strong></div>`}).join('');const side=entries.map(([k,v],i)=>{const c=cls[i]||'wood';const isDom=k===dominant;return `<div class="side-item ${isDom?'dominant':''}"><span class="dot ${c}"></span><span>${esc(k)}</span><strong>${esc(v)}</strong></div>`}).join('');return `<div class="saju-overview"><div class="saju-pillar-card"><div class="saju-label">원국 사주</div><div class="pillars">${esc(saju.pillars)}</div><div class="calendar">${esc(saju.calendar)}</div></div><div class="saju-side-list">${side}</div></div><div class="energy-map"><div><div class="energy-title">오행 분포</div><div class="bars">${barRows}</div></div><div class="donut-wrap"><div class="donut" style="--p1:${stops[0]};--p2:${stops[1]};--p3:${stops[2]};--p4:${stops[3]};"><div class="donut-center"><small>오행</small>에너지 맵</div></div></div></div><div class="saju-notes"><div class="note-card"><div class="note-icon">✓</div><div><h3>순기능 — ${esc(dominant)} 에너지</h3><p>${esc(saju.healthy)}</p></div></div><div class="note-card"><div class="note-icon">!</div><div><h3>왜곡 작동</h3><p>${esc(saju.distortion)}</p></div></div><div class="note-card"><div class="note-icon">↗</div><div><h3>렌즈 증폭</h3><p>${esc(saju.amplification)}</p></div></div></div>`}
function renderSection(s){let html=`<section class="section" id="s${esc(s.no)}"><div class="section-head"><div class="num">${esc(s.no)}</div><div><h2>${esc(s.title)}</h2>${s.headline?`<div class="lead">${esc(s.headline)}</div>`:''}</div></div>`;if(s.saju) html+=renderSaju(s.saju);if(s.lists) html+=renderLists(s.lists);if(s.steps) html+=renderSteps(s.steps);if(s.body) html+=`<div class="body">${s.body.map(p=>`<p>${esc(p)}</p>`).join('')}</div>`;if(s.keyMessage) html+=`<div class="key"><div class="label">Core Message</div><p>${esc(s.keyMessage)}</p></div>`;if(s.insight) html+=`<div class="insight"><div class="label">CAL Insight</div><p>${esc(s.insight)}</p></div>`;return html+'</section>'}
