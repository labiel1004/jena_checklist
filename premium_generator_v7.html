<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CAL Premium Generator v7.8 DEEP DATA MAP</title>
<style>
:root{--navy:#10182b;--paper:#f4eee3;--card:#fffaf0;--ink:#25221e;--muted:#756b5d;--gold:#c69a45;--line:#d7c39b}
*{box-sizing:border-box}
body{margin:0;font-family:'Noto Sans KR','Apple SD Gothic Neo',system-ui,sans-serif;background:var(--paper);color:var(--ink)}
.wrap{max-width:980px;margin:0 auto;padding:42px 20px 80px}
h1{font-size:40px;line-height:1.12;margin:0 0 12px;letter-spacing:-.04em}
p{font-size:17px;color:#665b4b;line-height:1.7;margin:0 0 18px}
textarea{width:100%;min-height:430px;border:1px solid var(--line);border-radius:20px;padding:18px;font:15px/1.65 ui-monospace,Consolas,monospace;background:#fffaf0;outline:none}
.actions,.result-actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:16px}
button,.btn{border:0;border-radius:999px;background:var(--navy);color:#fff;font-weight:900;padding:15px 24px;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;font-size:15px}
button.secondary{background:#6f5f43}
button.light,.btn.light{background:#fffaf0;color:var(--navy);border:1px solid var(--line)}
.box{background:#fffaf0;border:1px solid var(--line);border-radius:24px;padding:22px;margin-top:22px;line-height:1.8}
.ok{color:#116b38;font-weight:900}.err{color:#b91c1c;font-weight:900}
code{background:rgba(198,154,69,.14);padding:3px 7px;border-radius:7px}
.small{font-size:14px;color:#756b5d;margin-top:10px}
.template-status{font-size:14px;color:#756b5d}
</style>
</head>
<body>
<div class="wrap">
  <h1>CAL Premium Generator v7.8 DEEP DATA MAP</h1>
  <p>
    최종 템플릿 <code>cal_report_v7.html</code>을 직접 읽고, 붙여넣은 JSON을 v7 구조로 변환해 주입합니다.<br>
    고객명/날짜/사주/최종메시지 필드명이 달라도 최대한 자동 인식합니다.
  </p>
  <p class="template-status" id="templateStatus">템플릿 대기 중</p>

  <textarea id="jsonInput" placeholder="여기에 프리미엄 리포트 JSON을 붙여넣으세요."></textarea>

  <div class="actions">
    <button id="generateBtn">HTML 생성하기</button>
    <button class="secondary" id="sampleBtn">샘플 불러오기</button>
    <button class="light" id="clearBtn">비우기</button>
  </div>

  <div id="msg" class="box">대기 중</div>
</div>

<script>
const $ = (id)=>document.getElementById(id);
const TEMPLATE_PATHS = [
  './report_premium/cal_report_v7.html',
  './report_premium/cal-report-v7.html',
  './cal_report_v7.html',
  './cal-report-v7.html'
];

const SAMPLE = {
  clientName:"연삿갓",
  reportDate:"2026-05-08",
  reportId:"CAL-20260508-091543",
  totalState:"연삿갓님의 핵심 구조는 어린 시절 신체 충격 사건이 미완료 과제로 저장되며 불안과 압박을 반복 출력해온 구조입니다.",
  mainMessage:"현실은 사건이 아니라 반복 실행된 의식 구조의 출력입니다.",
  sajuOS:{
    pillars:"기축년 · 임신월 · 기묘일 · 기사시",
    calendar:"양력 · 사시",
    elements:{"목(木)":1,"화(火)":1,"토(土)":4,"금(金)":1,"수(水)":1},
    dominant:"토(土)",
    healthy:"토의 순기능은 안정감·지속성·책임감·현실을 붙잡는 힘입니다.",
    distortion:"토 에너지가 충격 경험과 결합하면 지나간 사건도 아직 정리되지 않은 현실 문제처럼 저장될 수 있습니다.",
    amplification:"사건 발생 시 사주OS 렌즈는 그것을 끝까지 해결해야 할 문제로 증폭했을 가능성이 큽니다.",
    keyMessage:"사주OS는 운명을 결정한 것이 아니라 사건을 해석하는 초기 렌즈입니다.",
    calInsight:"토가 강한 시스템은 파일을 쉽게 삭제하지 않고 오래 보관합니다."
  },
  finalMessage:{
    title:"Final Message",
    message:"나는 과거 사건을 부정하지 않는다. 그러나 그 사건을 나의 전체 정체성으로 저장하지 않는다.",
    declaration:"이제 핵심은 숙제를 평생 들고 가는 것이 아니라, 현재의 선택을 반복 저장하는 것입니다.",
    calInsight:"흠집은 기록입니다. 그러나 기록이 운전대를 잡게 둘 필요는 없습니다."
  },
  disclaimer:{text:"본 리포트는 의료·법률·투자 상담이 아닙니다. 자기 이해와 선택 전환을 위한 의식 구조 분석 자료이며, 선택은 본인의 몫입니다."}
};

function escapeHtml(v){return String(v ?? '').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function safeName(v){return String(v||'client').trim().replace(/[\\/:*?"<>|#%&{}$!'@+=`]/g,'').replace(/\s+/g,'_')||'client';}
function dateDigits(v){return String(v||'').replace(/\D/g,'').slice(0,8)||new Date().toISOString().slice(0,10).replace(/-/g,'');}
function toParas(v){if(!v)return[]; if(Array.isArray(v)) return v.flatMap(toParas); return String(v).split(/\n{2,}|\n/).map(x=>x.trim()).filter(Boolean);}
function isObj(v){return v && typeof v==='object' && !Array.isArray(v);}

function deepFind(obj, keys){
  const seen = new Set();
  function walk(o){
    if(!isObj(o) && !Array.isArray(o)) return undefined;
    if(seen.has(o)) return undefined;
    seen.add(o);
    if(isObj(o)){
      for(const k of keys){
        if(Object.prototype.hasOwnProperty.call(o,k) && o[k] !== undefined && o[k] !== null && o[k] !== '') return o[k];
      }
      for(const v of Object.values(o)){
        const found = walk(v);
        if(found !== undefined && found !== null && found !== '') return found;
      }
    } else {
      for(const v of o){
        const found = walk(v);
        if(found !== undefined && found !== null && found !== '') return found;
      }
    }
  }
  return walk(obj);
}

function pick(obj, keys, fallback=''){
  for(const k of keys){
    if(obj && obj[k] !== undefined && obj[k] !== null && obj[k] !== '') return obj[k];
  }
  const deep = deepFind(obj, keys);
  return deep !== undefined && deep !== null && deep !== '' ? deep : fallback;
}

function normalizeElements(v){
  if(!v) return {};
  if(typeof v === 'string'){
    const out = {};
    const re = /(목|화|토|금|수)\s*(?:\([^)]+\))?\s*[:：]?\s*\(?\s*(\d+)/g;
    let m;
    while((m = re.exec(v))){
      const label = {목:'목(木)',화:'화(火)',토:'토(土)',금:'금(金)',수:'수(水)'}[m[1]];
      out[label] = Number(m[2]);
    }
    return out;
  }
  if(isObj(v)){
    const out = {};
    Object.entries(v).forEach(([k,val])=>{
      const kk = k.includes('목')?'목(木)':k.includes('화')?'화(火)':k.includes('토')?'토(土)':k.includes('금')?'금(金)':k.includes('수')?'수(水)':k;
      out[kk] = Number(val) || 0;
    });
    return out;
  }
  return {};
}

function normalizeSteps(v){
  if(!v) return null;
  if(Array.isArray(v)) return v.map((x,i)=> isObj(x) ? {label:x.label||x.title||x.name||`${i+1}`, text:x.text||x.body||x.description||x.content||''} : {label:`${i+1}`, text:String(x)});
  if(isObj(v)) return Object.entries(v).map(([k,val])=>({label:k,text:isObj(val)?(val.text||val.body||JSON.stringify(val)):String(val)}));
  return null;
}

function normalizeLists(v){
  if(!isObj(v)) return null;
  const out = {};
  Object.entries(v).forEach(([k,val])=>{
    if(Array.isArray(val)) out[k]=val.map(x=>String(x));
    else if(typeof val === 'string') out[k]=toParas(val);
  });
  return Object.keys(out).length ? out : null;
}

function makeSection(no,title,obj={}){
  return {
    no, title,
    headline: pick(obj,['headline','summary','title','main','core','핵심','진단'],''),
    body: toParas(pick(obj,['body','message','text','content','description','analysis','본문'],'')),
    lists: normalizeLists(pick(obj,['lists','patterns','signals','items','list'],null)),
    steps: normalizeSteps(pick(obj,['steps','flow','loop','process'],null)),
    keyMessage: pick(obj,['keyMessage','coreMessage','coreInsight','declaration','closingSentence','핵심메시지'],''),
    insight: pick(obj,['insight','calInsight','CALInsight','cal_insight'],''),
    saju: obj.saju || null
  };
}

function normalizeData(raw){
  const d = JSON.parse(JSON.stringify(raw));

  const clientName = pick(d,['clientName','customerName','name','nickname','userName','applicantName','이름','닉네임','고객명','신청자명'],'고객');
  const reportDate = pick(d,['reportDate','date','createdAt','timestamp','submittedAt','타임스탬프','날짜'], new Date().toISOString().slice(0,10));
  const reportId = pick(d,['reportId','id','reportID','리포트ID'],'');
  const mainMessage = pick(d,['heroMessage','mainMessage','totalState','coreMessage','message','현실출력','메인메시지'],'현실은 사건이 아니라 반복 실행된 의식 구조의 출력입니다.');

  const out = {
    ...d,
    clientName,
    reportDate,
    reportId,
    reportVersion: pick(d,['reportVersion','version'],'CAL v7.0'),
    heroSubtitle: pick(d,['heroSubtitle','subtitle'],`${clientName}님의 현실 출력 구조 분석`),
    heroMessage: mainMessage,
    disclaimer: isObj(d.disclaimer) ? (d.disclaimer.text || '') : (d.disclaimer || pick(d,['disclaimerText'],''))
  };

  if(Array.isArray(d.sections) && d.sections.length){
    out.sections = d.sections;
    return out;
  }

  const sections = [];

  sections.push({
    ...makeSection("01","현실 출력 구조 요약",{
      headline: pick(d,['totalState','mainMessage','mainDiagnosis','coreDiagnosis','headline'],''),
      body: pick(d,['mainMessage','summary','mainAnalysis','diagnosisText','analysis'],''),
      keyMessage: pick(d,['coreMessage','keyMessage'],''),
      insight: pick(d,['calInsight','insight'],'')
    })
  });

  const repeated = pick(d,['repeatedPattern','repeatedPatterns','patternAnalysis','outputPattern','patternStructure'],null);
  if(repeated) sections.push(makeSection("02","반복 출력 패턴", repeated));

  const loop = pick(d,['autoLoop','loop','reactionLoop','automaticLoop'],null);
  if(loop) sections.push(makeSection("03","핵심 자동반응 루프", loop));

  const sajuSource = pick(d,['sajuOS','saju','sajuAnalysis','sajuSection','birthChart'],null);
  const elementsRaw = pick(d,['elements','elementScores','fiveElements','오행분포','오행분포도'],null);
  if(sajuSource || elementsRaw){
    const s = isObj(sajuSource) ? sajuSource : {};
    const elements = normalizeElements(pick(s,['elements','elementScores','fiveElements'], elementsRaw));
    const dominant = pick(s,['dominant','dominantElement','mainElement','순기능'], pick(d,['dominant','dominantElement'],''));
    sections.push({
      ...makeSection("04","사주OS — 초기 에너지 렌즈",{
        keyMessage:pick(s,['keyMessage','coreMessage'],''),
        insight:pick(s,['calInsight','insight'],'')
      }),
      saju:{
        pillars: pick(s,['pillars','pillarText','originalSaju','sajuText','원국사주'], pick(d,['pillars','originalSaju','사주'],'') ),
        calendar: pick(s,['calendar','birthType','calendarType','양음력'], pick(d,['calendar','birthType','양음력'],'')),
        elements,
        dominant: dominant || Object.entries(elements).sort((a,b)=>(b[1]||0)-(a[1]||0))[0]?.[0] || '',
        healthy: pick(s,['healthy','pureFunction','normal','순기능'],''),
        distortion: pick(s,['distortion','distorted','왜곡작동'],''),
        amplification: pick(s,['amplification','lensAmplification','렌즈증폭'],'')
      }
    });
  }

  const os = pick(d,['consciousnessOS','osStructure','consciousnessStructure','의식OS'],null);
  if(os) sections.push(makeSection("05","의식OS 구조 분석", os));

  const material = pick(d,['materialization','realityOutput','renderingFlow'],null);
  if(material) sections.push(makeSection("06","현실 물질화 흐름", material));

  const admin = pick(d,['ninthConsciousness','adminAuthority','managerAuthority'],null);
  if(admin) sections.push(makeSection("07","9식 — 관리자 권한 회복", admin));

  const protocol = pick(d,['reprogrammingProtocol','protocol','sevenDays','practice'],null);
  if(protocol) sections.push(makeSection("08","재프로그래밍 프로토콜", protocol));

  const finalMsg = pick(d,['finalMessage','closing','endingMessage'],null);
  if(finalMsg) sections.push(makeSection("10", isObj(finalMsg) ? (finalMsg.title || "Final Message") : "Final Message", finalMsg));

  out.sections = sections;
  return out;
}

async function fetchTemplate(){
  let lastError = '';
  for(const path of TEMPLATE_PATHS){
    try{
      const res = await fetch(path + '?v=' + Date.now(), {cache:'no-store'});
      if(res.ok){
        const text = await res.text();
        if(text.includes('window.REPORT_DATA')){
          $('templateStatus').innerHTML = `템플릿 연결됨: <code>${escapeHtml(path)}</code>`;
          return {text, path};
        }
        lastError = `${path} 파일 안에 window.REPORT_DATA가 없습니다.`;
      }else lastError = `${path} 없음 (${res.status})`;
    }catch(e){lastError=e.message;}
  }
  throw new Error('최종 템플릿 파일을 찾지 못했습니다. 마지막 오류: ' + lastError);
}

function injectDataIntoTemplate(templateHtml, data){
  const json = JSON.stringify(data, null, 2).replace(/<\//g, '<\\/');

  const directRe = /window\.REPORT_DATA\s*=\s*[\s\S]*?;\s*(?:const|let|var)\s+data\s*=\s*window\.REPORT_DATA\s*;/;
  if(directRe.test(templateHtml)){
    return templateHtml.replace(directRe, `window.REPORT_DATA = ${json};\nconst data = window.REPORT_DATA;`);
  }

  const reportOnlyRe = /window\.REPORT_DATA\s*=\s*[\s\S]*?;\s*(?=\n|<\/script>)/;
  if(reportOnlyRe.test(templateHtml)){
    let replaced = templateHtml.replace(reportOnlyRe, `window.REPORT_DATA = ${json};\n`);
    if(!/(?:const|let|var)\s+data\s*=\s*window\.REPORT_DATA\s*;/.test(replaced)){
      replaced = replaced.replace(/window\.REPORT_DATA\s*=\s*[\s\S]*?;\n/, `window.REPORT_DATA = ${json};\nconst data = window.REPORT_DATA;\n`);
    }
    return replaced;
  }

  throw new Error('템플릿에서 window.REPORT_DATA 위치를 찾지 못했습니다.');
}

async function generate(){
  const box = $('msg');
  box.innerHTML = '생성 중...';
  try{
    const raw = $('jsonInput').value.trim();
    if(!raw) throw new Error('JSON이 비어 있습니다.');

    const parsed = JSON.parse(raw);
    const data = normalizeData(parsed);
    const {text:templateHtml, path:templatePath} = await fetchTemplate();
    const reportHtml = injectDataIntoTemplate(templateHtml, data);

    const filename = `report_${safeName(data.clientName)}_${dateDigits(data.reportDate)}.html`;
    const blob = new Blob([reportHtml], {type:'text/html;charset=utf-8'});
    const url = URL.createObjectURL(blob);

    const a = document.createElement('a');
    a.href = url; a.download = filename; a.click();

    const githubUrl = `https://labiel1004.github.io/jena_checklist/report_premium/${encodeURIComponent(filename)}`;

    box.innerHTML = `
      <div class="ok">생성 성공!</div>
      <div>인식된 고객명: <code>${escapeHtml(data.clientName)}</code></div>
      <div>인식된 날짜: <code>${escapeHtml(data.reportDate)}</code></div>
      <div>사용 템플릿: <code>${escapeHtml(templatePath)}</code></div>
      <div>파일명: <code>${escapeHtml(filename)}</code></div>
      <div class="result-actions">
        <a class="btn" href="${url}" target="_blank" rel="noopener">바로 열어보기 ↗</a>
        <a class="btn light" href="${githubUrl}" target="_blank" rel="noopener">업로드 후 링크 ↗</a>
      </div>
      <div class="small">위의 ‘바로 열어보기’에서 고객명과 내용이 반영됐는지 먼저 확인한 뒤 업로드하세요.</div>
    `;
  }catch(e){
    box.innerHTML = `<span class="err">생성 실패:</span> ${escapeHtml(e.message)}`;
  }
}

$('generateBtn').addEventListener('click', generate);
$('sampleBtn').addEventListener('click', ()=>{$('jsonInput').value=JSON.stringify(SAMPLE,null,2);$('msg').innerHTML='샘플을 불러왔습니다.';});
$('clearBtn').addEventListener('click', ()=>{$('jsonInput').value='';$('msg').innerHTML='비웠습니다.';});
fetchTemplate().catch(e=>{$('templateStatus').innerHTML=`<span class="err">템플릿 미연결:</span> ${escapeHtml(e.message)}`;});
</script>
</body>
</html>
