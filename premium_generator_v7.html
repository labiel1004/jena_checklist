<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CAL Premium Generator v7.6 DATA BIND FIX</title>
<style>
:root{
  --navy:#111827;--paper:#f6f0e5;--card:#fffaf0;--ink:#25221e;--muted:#756b5d;
  --gold:#c69a45;--gold2:#e7c875;--line:rgba(198,154,69,.32);
}
*{box-sizing:border-box}
body{margin:0;font-family:'Noto Sans KR','Apple SD Gothic Neo',system-ui,sans-serif;background:#f4eee3;color:var(--ink)}
.wrap{max-width:980px;margin:0 auto;padding:42px 20px 80px}
h1{font-size:42px;line-height:1.1;margin:0 0 14px;letter-spacing:-.04em}
p{font-size:17px;color:#665b4b;margin:0 0 20px}
textarea{width:100%;min-height:430px;border:1px solid #d7c39b;border-radius:20px;padding:18px;font:15px/1.65 ui-monospace,Consolas,monospace;background:#fffaf0;outline:none}
.actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:16px}
button,.btn{border:0;border-radius:999px;background:#10182b;color:#fff;font-weight:900;padding:15px 24px;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;font-size:15px}
button.secondary{background:#6f5f43}
button.light,.btn.light{background:#fffaf0;color:#10182b;border:1px solid #d7c39b}
.box{background:#fffaf0;border:1px solid #d7c39b;border-radius:24px;padding:22px;margin-top:22px;line-height:1.8}
.ok{color:#116b38;font-weight:900}.err{color:#b91c1c;font-weight:900}
.result-actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:14px}
code{background:rgba(198,154,69,.13);padding:3px 6px;border-radius:7px}
.small{font-size:14px;color:#756b5d;margin-top:10px}
</style>
</head>
<body>
<div class="wrap">
  <h1>CAL Premium Generator v7.6 DATA BIND FIX</h1>
  <p>JSON을 넣고 생성하면 <b>cal-report-v7.html</b> 구조의 완성 HTML이 다운로드됩니다. 사주OS 오행 도넛 차트 포함.</p>

  <textarea id="jsonInput" placeholder="여기에 프리미엄 리포트 JSON을 붙여넣으세요."></textarea>

  <div class="actions">
    <button id="generateBtn">HTML 생성하기</button>
    <button class="secondary" id="sampleBtn">샘플 불러오기</button>
    <button class="light" id="clearBtn">비우기</button>
  </div>

  <div id="msg" class="box">대기 중</div>
</div>

<script>
const $ = (id)=>document.getElementById(id);

const SAMPLE = {
  clientName:"연삿갓",
  reportDate:"2026-05-08",
  reportId:"CAL-20260508-091543",
  reportVersion:"CAL v7.6",
  heroSubtitle:"연삿갓님의 현실 출력 구조 분석",
  heroMessage:"현실은 사건이 아니라 반복 실행된 의식 구조의 출력입니다.",
  sections:[
    {no:"01",title:"현실 출력 구조 요약",headline:"핵심 구조는 오래된 사건이 미완료 과제로 저장되며 불안과 압박을 반복 출력해온 구조입니다.",body:["사건은 단순한 경험으로 끝나지 않고 마음속에서 아직 완료되지 않은 과제처럼 저장되었습니다."],keyMessage:"반복된 불안은 현재 위험의 증거가 아니라, 과거 사건이 미완료 파일처럼 저장된 결과입니다.",insight:"파일은 닫혔는데 작업 표시줄에 계속 떠 있으면 시스템은 계속 에너지를 사용합니다."},
    {no:"04",title:"사주OS — 초기 에너지 렌즈",saju:{pillars:"기축년 · 임신월 · 기묘일 · 기사시",calendar:"양력 · 사시",elements:{"목(木)":1,"화(火)":1,"토(土)":4,"금(金)":1,"수(水)":1},dominant:"토(土)",healthy:"토의 순기능은 안정감·지속성·책임감·현실을 붙잡는 힘입니다.",distortion:"토 에너지가 충격 경험과 결합하면 지나간 사건도 아직 정리되지 않은 현실 문제처럼 저장될 수 있습니다.",amplification:"사건 발생 시 사주OS 렌즈는 그것을 끝까지 해결해야 할 문제로 증폭했을 가능성이 큽니다."},keyMessage:"사주OS는 운명을 결정한 것이 아니라 사건을 해석하는 초기 렌즈입니다.",insight:"토가 강한 시스템은 파일을 쉽게 삭제하지 않고 오래 보관합니다."},
    {no:"10",title:"Final Message",body:["나는 과거 사건을 부정하지 않는다. 그러나 그 사건을 나의 전체 정체성으로 저장하지 않는다.","이제 핵심은 숙제를 평생 들고 가는 것이 아니라, 현재의 선택을 반복 저장하는 것입니다."],insight:"흠집은 기록입니다. 그러나 기록이 운전대를 잡게 둘 필요는 없습니다."}
  ],
  disclaimer:"본 리포트는 의료, 법률, 투자 상담이 아닙니다. 자기 이해와 선택 전환을 위한 의식 구조 분석 자료이며, 선택은 본인의 몫입니다."
};

function escapeHtml(v){
  return String(v ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function safeName(v){
  return String(v || 'client').trim().replace(/[\\/:*?"<>|#%&{}$!'@+=`]/g,'').replace(/\s+/g,'_') || 'client';
}
function digits(v){
  return String(v || '').replace(/\D/g,'').slice(0,8) || new Date().toISOString().slice(0,10).replace(/-/g,'');
}
function findDeep(obj, keys){
  const wanted = keys.map(k=>String(k).toLowerCase());
  const seen = new Set();
  function walk(x){
    if(!x || typeof x !== 'object' || seen.has(x)) return '';
    seen.add(x);
    if(Array.isArray(x)){
      for(const item of x){ const r = walk(item); if(r) return r; }
      return '';
    }
    for(const [k,v] of Object.entries(x)){
      if(wanted.includes(String(k).toLowerCase()) && v !== null && v !== undefined && typeof v !== 'object') return String(v);
    }
    for(const v of Object.values(x)){ const r = walk(v); if(r) return r; }
    return '';
  }
  return walk(obj);
}
function getAny(obj, keys){
  if(!obj || typeof obj !== 'object') return '';
  for(const k of keys){ if(obj[k] !== undefined && obj[k] !== null && obj[k] !== '') return obj[k]; }
  return '';
}
function prettyKey(k){
  const map = {
    mainDiagnosis:'핵심 진단 요약', realityOutput:'현실 출력 구조 요약', realityOutputSummary:'현실 출력 구조 요약', outputSummary:'현실 출력 구조 요약',
    repeatedPattern:'반복 출력 패턴', repeatedPatterns:'반복 출력 패턴', patternAnalysis:'반복 출력 패턴', reactionPattern:'반복 출력 패턴',
    autoLoop:'핵심 자동반응 루프', loop:'핵심 자동반응 루프', automaticLoop:'핵심 자동반응 루프',
    sajuOS:'사주OS — 초기 에너지 렌즈', saju:'사주OS — 초기 에너지 렌즈', sajuAnalysis:'사주OS — 초기 에너지 렌즈',
    consciousnessOS:'의식OS 구조 분석', osStructure:'의식OS 구조 분석', consciousnessStructure:'의식OS 구조 분석',
    materialization:'현실 물질화 흐름', realityRendering:'현실 물질화 흐름',
    observer:'9식 — 관리자 권한 회복', ninthConsciousness:'9식 — 관리자 권한 회복', managerAuthority:'9식 — 관리자 권한 회복',
    reprogrammingProtocol:'재프로그래밍 프로토콜', protocol:'재프로그래밍 프로토콜', sevenDays:'7일 관찰 프로토콜',
    finalMessage:'Final Message'
  };
  return map[k] || String(k).replace(/([A-Z])/g,' $1').replace(/_/g,' ').trim();
}
function normalizeParagraphs(v){
  if(!v) return [];
  if(Array.isArray(v)) return v.flatMap(x=>normalizeParagraphs(x));
  if(typeof v === 'object'){
    const priority = getAny(v, ['body','message','text','description','content','summary','analysis','meaning','explanation','declaration','closingSentence']);
    if(priority) return normalizeParagraphs(priority);
    return Object.entries(v)
      .filter(([k,val]) => val && typeof val !== 'object' && !['title','headline','keyMessage','coreMessage','insight','calInsight'].includes(k))
      .map(([k,val]) => `${prettyKey(k)}: ${String(val)}`);
  }
  return String(v).split(/\n{2,}|\n/).map(x=>x.trim()).filter(Boolean);
}
function normalizeListObject(obj){
  if(!obj || typeof obj !== 'object') return null;
  const out = {};
  Object.entries(obj).forEach(([k,v])=>{
    if(['title','headline','keyMessage','coreMessage','insight','calInsight','body','message','text','description','content','steps','saju'].includes(k)) return;
    if(Array.isArray(v)) out[prettyKey(k)] = v.map(x=> typeof x === 'object' ? JSON.stringify(x) : String(x));
    else if(v && typeof v === 'object'){
      const vals = Object.entries(v).map(([kk,vv])=> typeof vv === 'object' ? `${prettyKey(kk)}: ${JSON.stringify(vv)}` : `${prettyKey(kk)}: ${vv}`);
      if(vals.length) out[prettyKey(k)] = vals;
    } else if(v) out[prettyKey(k)] = [String(v)];
  });
  return Object.keys(out).length ? out : null;
}
function normalizeSteps(v){
  if(!v) return null;
  if(Array.isArray(v)) return v.map((s,i)=> typeof s === 'object' ? {label:s.label||s.title||s.name||`${i+1}`, text:s.text||s.body||s.description||s.message||JSON.stringify(s)} : {label:`${i+1}`, text:String(s)});
  if(typeof v === 'object') return Object.entries(v).map(([k,val])=>({label:prettyKey(k), text: typeof val === 'object' ? normalizeParagraphs(val).join(' ') || JSON.stringify(val) : String(val)}));
  return null;
}
function normalizeSaju(src, root){
  if(!src || typeof src !== 'object') return null;
  const elements = src.elements || src.elementScores || src.elementDistribution || root.elementScores || root.elements || {};
  return {
    pillars: src.pillars || src.pillarText || src.originalSaju || src.sajuText || root.pillars || root.originalSaju || '',
    calendar: src.calendar || src.birthType || src.birthCalendar || root.birthType || '',
    elements,
    dominant: src.dominant || src.dominantElement || root.dominantElement || '',
    healthy: src.healthy || src.pureFunction || src.normal || src.strength || src.positive || src.summary || '',
    distortion: src.distortion || src.distorted || src.risk || src.negative || '',
    amplification: src.amplification || src.lensAmplification || src.expansion || ''
  };
}
function normalizeSection(no, title, obj={}, root={}){
  obj = obj || {};
  const sec = {
    no, title,
    headline: getAny(obj, ['headline','title','summary','mainMessage','core','diagnosis']) || '',
    body: normalizeParagraphs(getAny(obj, ['body','message','text','description','content','analysis','meaning','declaration','closingSentence']) || obj),
    lists: normalizeListObject(getAny(obj, ['lists','patterns','signals','items','emotionalSignals','bodySignals','realityProblems']) || obj.lists),
    steps: normalizeSteps(getAny(obj, ['steps','flow','loop','protocol','process'])),
    keyMessage: getAny(obj, ['keyMessage','coreMessage','coreInsight','mainPoint']) || '',
    insight: getAny(obj, ['insight','calInsight','CALInsight']) || '',
    saju: obj.saju || null
  };
  if(title.includes('사주OS')) sec.saju = normalizeSaju(obj.saju || obj, root);
  if(sec.body.length > 8 && sec.lists) sec.body = sec.body.slice(0,4);
  return sec;
}
function normalizeData(raw){
  const data = {...raw};
  data.clientName = data.clientName || data.customerName || data.name || data.reportHeader?.clientName || data.profile?.clientName || findDeep(raw, ['clientName','customerName','client','name','고객명','이름']) || '고객';
  data.reportDate = data.reportDate || data.date || data.reportHeader?.reportDate || findDeep(raw, ['reportDate','date','createdAt','작성일','리포트날짜']) || new Date().toISOString().slice(0,10);
  data.reportId = data.reportId || data.id || data.reportHeader?.reportId || '';
  data.reportVersion = data.reportVersion || 'CAL v7.6';
  data.heroSubtitle = data.heroSubtitle || `${data.clientName}님의 현실 출력 구조 분석`;
  data.heroMessage = data.heroMessage || data.mainMessage || data.totalState || findDeep(raw, ['heroMessage','mainMessage','totalState']) || '현실은 사건이 아니라 반복 실행된 의식 구조의 출력입니다.';
  if(data.disclaimer && typeof data.disclaimer === 'object') data.disclaimer = data.disclaimer.text || data.disclaimer.message || '';

  if(Array.isArray(data.sections) && data.sections.length){
    data.sections = data.sections.map((s,i)=>normalizeSection(s.no || String(i+1).padStart(2,'0'), s.title || `Section ${i+1}`, s, data));
    return data;
  }

  const sectionDefs = [
    ['01','현실 출력 구조 요약',['mainDiagnosis','realityOutput','realityOutputSummary','outputSummary','summary']],
    ['02','반복 출력 패턴',['repeatedPattern','repeatedPatterns','patternAnalysis','reactionPattern','outputPattern']],
    ['03','핵심 자동반응 루프',['autoLoop','loop','automaticLoop','reactionLoop']],
    ['04','사주OS — 초기 에너지 렌즈',['sajuOS','saju','sajuAnalysis']],
    ['05','의식OS 구조 분석',['consciousnessOS','osStructure','consciousnessStructure']],
    ['06','현실 물질화 흐름',['materialization','realityRendering','manifestationFlow']],
    ['07','9식 — 관리자 권한 회복',['observer','ninthConsciousness','managerAuthority','choicePoint']],
    ['08','재프로그래밍 프로토콜',['reprogrammingProtocol','protocol','actionProtocol']],
    ['09','7일 관찰 프로토콜',['sevenDays','sevenDayProtocol','dailyPractice']],
    ['10','Final Message',['finalMessage','closing','conclusion']]
  ];
  const used = new Set();
  const sections = [];
  for(const [no,title,keys] of sectionDefs){
    let val = null, found = '';
    for(const k of keys){ if(data[k]){ val=data[k]; found=k; break; } }
    if(val){ sections.push(normalizeSection(no, title, val, data)); used.add(found); }
  }
  if(!sections.find(s=>s.no==='01')){
    sections.unshift(normalizeSection('01','현실 출력 구조 요약',{headline:data.totalState || data.mainMessage || '', body:data.mainMessage || data.summary || '', keyMessage:data.coreMessage || '', insight:data.calInsight || ''},data));
  }
  const skip = new Set(['clientName','customerName','name','reportDate','date','reportId','id','reportVersion','heroSubtitle','heroMessage','mainMessage','totalState','coreMessage','calInsight','disclaimer','elementScores','elements','pillars','originalSaju',...used]);
  for(const [k,v] of Object.entries(data)){
    if(sections.length >= 12) break;
    if(skip.has(k) || !v || typeof v !== 'object' || Array.isArray(v)) continue;
    if(normalizeParagraphs(v).length || normalizeListObject(v) || normalizeSteps(v)){
      sections.splice(Math.max(sections.length-1,1),0, normalizeSection(String(sections.length+1).padStart(2,'0'), prettyKey(k), v, data));
    }
  }
  data.sections = sections.length ? sections : [normalizeSection('01','리포트',{body:'입력된 JSON을 기본 구조로 변환했습니다.', insight:'필드명이 다르면 일부 내용은 표시되지 않을 수 있습니다.'},data)];
  data.sections = data.sections.map((s,i)=>({...s, no: s.no || String(i+1).padStart(2,'0')}));
  return data;
}

function pctStops(elements){
  const vals = Object.values(elements).map(v=>Number(v)||0);
  const sum = vals.reduce((a,b)=>a+b,0) || 1;
  let acc=0;
  return vals.map(v=>{acc += v/sum*100; return acc.toFixed(2)+'%';});
}

function renderSaju(saju){
  if(!saju) return '';
  const defaultElements = {"목(木)":0,"화(火)":0,"토(土)":0,"금(金)":0,"수(水)":0};
  const elements = {...defaultElements, ...(saju.elements || {})};
  const entries = Object.entries(elements);
  const max = Math.max(...entries.map(([,v])=>Number(v)||0), 1);
  const cls = ['wood','fire','earth','metal','water'];
  const stops = pctStops(elements);
  const dominant = saju.dominant || entries.reduce((a,b)=>(Number(a[1])>Number(b[1])?a:b), entries[0])[0];

  const side = entries.map(([k,v],i)=>`
    <div class="side-item ${k===dominant?'dominant':''}">
      <span class="dot ${cls[i]}"></span><span>${escapeHtml(k)}</span><strong>${escapeHtml(v)}</strong>
    </div>`).join('');

  const bars = entries.map(([k,v],i)=>{
    const width = Math.max(8, ((Number(v)||0)/max*100)).toFixed(1);
    return `<div class="bar-row ${k===dominant?'dominant':''}">
      <b>${escapeHtml(k)}</b>
      <div class="bar-track"><span class="bar-fill ${cls[i]}" style="width:${width}%"></span></div>
      <strong>${escapeHtml(v)}</strong>
    </div>`;
  }).join('');

  return `
    <div class="saju-overview">
      <div>
        <div class="saju-label">원국 사주</div>
        <div class="pillars">${escapeHtml(saju.pillars || '')}</div>
        <div class="calendar">${escapeHtml(saju.calendar || '')}</div>
      </div>
      <div class="saju-side-list">${side}</div>
    </div>

    <div class="energy-map">
      <div>
        <div class="energy-title">오행 분포</div>
        <div class="bars">${bars}</div>
      </div>
      <div class="donut-wrap">
        <div class="donut" style="--p1:${stops[0]};--p2:${stops[1]};--p3:${stops[2]};--p4:${stops[3]};">
          <div class="donut-center"><small>오행</small>에너지 맵</div>
        </div>
      </div>
    </div>

    <div class="saju-notes">
      <div class="note-card"><div class="note-icon">✓</div><div><h3>순기능 — ${escapeHtml(dominant)} 에너지</h3><p>${escapeHtml(saju.healthy || '')}</p></div></div>
      <div class="note-card"><div class="note-icon">!</div><div><h3>왜곡 작동</h3><p>${escapeHtml(saju.distortion || '')}</p></div></div>
      <div class="note-card"><div class="note-icon">↗</div><div><h3>렌즈 증폭</h3><p>${escapeHtml(saju.amplification || '')}</p></div></div>
    </div>`;
}

function renderLists(lists){
  if(!lists) return '';
  return `<div class="grid">${Object.entries(lists).map(([k,arr])=>`
    <div class="mini"><h3>${escapeHtml(k)}</h3><ul>${(arr||[]).map(x=>`<li>${escapeHtml(x)}</li>`).join('')}</ul></div>
  `).join('')}</div>`;
}
function renderSteps(steps){
  if(!Array.isArray(steps)) return '';
  return `<div class="steps">${steps.map(s=>`
    <div class="step"><b>${escapeHtml(s.label || s.title || '')}</b><span>${escapeHtml(s.text || s.body || s.description || '')}</span></div>
  `).join('')}</div>`;
}
function renderSection(s){
  return `<section class="section" id="s${escapeHtml(s.no)}">
    <div class="section-head">
      <div class="num">${escapeHtml(s.no || '')}</div>
      <div><h2>${escapeHtml(s.title || '')}</h2>${s.headline ? `<div class="lead">${escapeHtml(s.headline)}</div>` : ''}</div>
    </div>
    ${renderSaju(s.saju)}
    ${renderLists(s.lists)}
    ${renderSteps(s.steps)}
    ${s.body ? `<div class="body">${normalizeParagraphs(s.body).map(p=>`<p>${escapeHtml(p)}</p>`).join('')}</div>` : ''}
    ${s.keyMessage ? `<div class="key"><div class="label">Core Message</div><p>${escapeHtml(s.keyMessage)}</p></div>` : ''}
    ${s.insight ? `<div class="insight"><div class="label">CAL Insight</div><p>${escapeHtml(s.insight)}</p></div>` : ''}
  </section>`;
}

function buildReportHtml(inputData){
  const data = normalizeData(inputData);
  const nav = (data.sections || []).map(s=>`<a href="#s${escapeHtml(s.no)}">${escapeHtml(s.no)} ${escapeHtml(s.title)}</a>`).join('');
  const sections = (data.sections || []).map(renderSection).join('');
  const disclaimerText = typeof data.disclaimer === 'object' ? data.disclaimer.text : data.disclaimer;

  return `<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CAL 의식OS 프리미엄 리포트 v7</title>
<style>
:root{--navy:#111827;--navy2:#172033;--paper:#f6f0e5;--card:#fffaf0;--ink:#25221e;--muted:#756b5d;--gold:#c69a45;--gold2:#e7c875;--line:rgba(198,154,69,.28);--shadow:0 24px 70px rgba(23,32,51,.14);--radius:30px}
*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;font-family:'Noto Sans KR','Apple SD Gothic Neo',system-ui,sans-serif;background:radial-gradient(circle at 20% 0%,rgba(231,200,117,.18),transparent 36%),linear-gradient(180deg,#f8f2e7 0%,#eee4d4 100%);color:var(--ink);line-height:1.78;letter-spacing:-.025em}.wrap{max-width:980px;margin:0 auto;padding:34px 18px 80px}.hero{position:relative;overflow:hidden;border-radius:36px;padding:54px clamp(28px,6vw,72px);background:linear-gradient(135deg,#0e1728 0%,#1d283d 58%,#2d2416 100%);color:white;box-shadow:0 30px 80px rgba(17,24,39,.25)}.hero:before{content:"";position:absolute;inset:-40%;background:radial-gradient(circle,rgba(231,200,117,.24),transparent 34%);transform:translate(32%,-18%)}.kicker{position:relative;z-index:1;color:var(--gold2);font-size:13px;letter-spacing:.18em;text-transform:uppercase;font-weight:800}.hero h1{position:relative;z-index:1;margin:16px 0 10px;font-size:clamp(42px,8vw,76px);line-height:1.02;letter-spacing:-.07em}.hero h1 span{display:block;font-size:.48em;font-weight:600;color:rgba(255,255,255,.84);letter-spacing:-.04em;margin-top:8px}.hero p{position:relative;z-index:1;max-width:760px;font-size:clamp(18px,2.4vw,24px);color:rgba(255,255,255,.86);margin:18px 0 0}.meta{position:relative;z-index:1;display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:34px}.meta div{padding:16px 18px;border:1px solid rgba(231,200,117,.28);background:rgba(255,255,255,.08);border-radius:20px}.meta small{display:block;color:rgba(231,200,117,.92);font-size:12px;font-weight:700}.meta b{display:block;margin-top:4px;color:#fff;font-size:16px}.nav{display:flex;flex-wrap:wrap;gap:10px;margin:26px 0 30px}.nav a{text-decoration:none;color:#3b3328;background:rgba(255,250,240,.72);border:1px solid var(--line);padding:9px 13px;border-radius:999px;font-size:13px;font-weight:700}.section{margin:34px 0;padding:clamp(26px,4.8vw,46px);border-radius:var(--radius);background:linear-gradient(180deg,rgba(255,250,240,.96),rgba(255,247,232,.88));border:1px solid var(--line);box-shadow:var(--shadow)}.section-head{display:grid;grid-template-columns:72px 1fr;gap:18px;align-items:start;margin-bottom:24px}.num{width:62px;height:62px;border-radius:22px;display:grid;place-items:center;background:linear-gradient(135deg,#1a2438,#3a2c16);color:var(--gold2);font-weight:900;font-size:22px;box-shadow:0 14px 32px rgba(17,24,39,.18)}h2{margin:0;font-size:clamp(28px,4vw,42px);line-height:1.16;letter-spacing:-.055em}.lead{font-size:clamp(20px,2.4vw,25px);font-weight:800;line-height:1.55;margin:14px 0 20px;color:#2b241b}.body p{margin:14px 0;font-size:18px}.key{margin:24px 0;padding:24px;border-radius:24px;background:linear-gradient(135deg,rgba(23,32,51,.94),rgba(58,44,22,.9));color:#fff}.key .label,.insight .label{font-size:12px;font-weight:900;letter-spacing:.14em;text-transform:uppercase;color:var(--gold2);margin-bottom:8px}.key p{margin:0;font-size:18px;font-weight:700}.insight{margin-top:24px;padding:24px;border-radius:26px;background:linear-gradient(135deg,rgba(198,154,69,.14),rgba(255,255,255,.68));border:1px solid rgba(198,154,69,.35)}.insight p{margin:0;font-size:17px;color:#3a3024}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin:18px 0}.mini{padding:18px;border-radius:22px;background:rgba(255,255,255,.6);border:1px solid rgba(198,154,69,.18)}.mini h3{margin:0 0 8px;font-size:16px}.mini ul{margin:0;padding-left:20px}.mini li{margin:6px 0}.steps{display:grid;gap:14px;margin:20px 0}.step{display:grid;grid-template-columns:180px 1fr;gap:18px;padding:18px;border-radius:22px;background:rgba(255,255,255,.58);border:1px solid rgba(198,154,69,.2)}.step b{color:#1c2638}.saju-overview{display:grid;grid-template-columns:1.25fr .8fr;gap:30px;align-items:center;margin:10px 0 30px;padding:34px 38px;border-radius:30px;background:linear-gradient(135deg,#0b0f16 0%,#161616 58%,#242015 100%);color:#fff;box-shadow:0 26px 70px rgba(17,24,39,.22)}.saju-label{color:var(--gold2);font-weight:900;font-size:18px;margin-bottom:16px}.pillars{font-size:clamp(22px,3vw,30px);font-weight:900;line-height:1.45}.calendar{margin-top:12px;color:rgba(255,255,255,.55);font-size:17px;font-weight:700}.saju-side-list{border-left:1px solid rgba(255,255,255,.25);padding-left:32px;display:grid;gap:12px}.side-item{display:grid;grid-template-columns:18px 1fr auto;align-items:center;gap:14px;font-size:20px;font-weight:800}.dot{width:12px;height:12px;border-radius:50%;display:block}.wood{background:#43a35c}.fire{background:#df5d32}.earth{background:#d2a033}.metal{background:#aab3bd}.water{background:#2f76c2}.side-item.dominant strong{color:var(--gold2);font-size:26px}.energy-map{margin:0 0 28px;padding:30px;border-radius:28px;background:rgba(255,255,255,.72);border:1px solid rgba(198,154,69,.28);box-shadow:0 18px 44px rgba(23,32,51,.08);display:grid;grid-template-columns:1fr 300px;gap:34px;align-items:center}.energy-title{display:flex;align-items:center;gap:10px;margin:0 0 22px;font-size:25px;font-weight:900}.energy-title:before{content:'✦';width:34px;height:34px;border-radius:10px;display:grid;place-items:center;background:rgba(198,154,69,.15);color:var(--gold)}.bars{display:grid;gap:16px}.bar-row{display:grid;grid-template-columns:82px minmax(120px,1fr) 34px;align-items:center;gap:16px;font-size:20px;font-weight:800}.bar-track{height:13px;border-radius:999px;background:rgba(17,24,39,.07);overflow:hidden}.bar-fill{height:100%;border-radius:999px;display:block}.bar-row.dominant strong{color:var(--gold);font-size:25px}.donut-wrap{display:grid;place-items:center}.donut{width:260px;height:260px;border-radius:50%;background:conic-gradient(#43a35c 0 var(--p1),#df5d32 var(--p1) var(--p2),#d2a033 var(--p2) var(--p3),#aab3bd var(--p3) var(--p4),#2f76c2 var(--p4) 100%);position:relative;box-shadow:0 20px 50px rgba(23,32,51,.16)}.donut:after{content:"";position:absolute;inset:66px;background:#fffaf0;border-radius:50%;box-shadow:inset 0 0 0 1px rgba(198,154,69,.18)}.donut-center{position:absolute;inset:0;display:grid;place-items:center;text-align:center;z-index:2;font-size:24px;font-weight:900;color:#222;line-height:1.25}.donut-center small{display:block;font-size:18px}.saju-notes{display:grid;gap:16px;margin:10px 0}.note-card{display:grid;grid-template-columns:42px 1fr;gap:16px;padding:24px 26px;border-radius:24px;background:rgba(255,255,255,.66);border:1px solid rgba(198,154,69,.26);box-shadow:0 12px 36px rgba(23,32,51,.06)}.note-icon{width:38px;height:38px;border-radius:50%;display:grid;place-items:center;background:linear-gradient(135deg,#c69a45,#e7c875);color:white;font-weight:900}.note-card h3{margin:0 0 8px;font-size:24px;line-height:1.25;letter-spacing:-.045em}.note-card p{margin:0;font-size:18px;line-height:1.72}.footer{margin:40px auto 0;max-width:840px;text-align:center;color:var(--muted);font-size:14px}.legal-footer{margin:34px auto 0;padding:26px 0 0;max-width:840px;text-align:center;color:#8a8173;font-size:13px;line-height:1.8;border-top:1px solid rgba(198,154,69,.22)}.legal-footer .seal{color:rgba(198,154,69,.72);font-size:26px;line-height:1;margin-bottom:10px}@media(max-width:760px){.wrap{padding:18px 12px 60px}.hero{padding:38px 24px;border-radius:28px}.meta,.grid,.saju-overview,.energy-map{grid-template-columns:1fr}.section{padding:26px 20px;border-radius:26px}.section-head{grid-template-columns:1fr;gap:12px}.num{width:54px;height:54px}.step{grid-template-columns:1fr;gap:6px}.body p{font-size:17px}.saju-overview{padding:26px 24px;border-radius:24px;gap:22px}.saju-side-list{border-left:0;border-top:1px solid rgba(255,255,255,.2);padding-left:0;padding-top:20px}.energy-map{padding:24px 20px;gap:24px}.donut{width:220px;height:220px}.donut:after{inset:56px}.donut-center{font-size:20px}.bar-row{grid-template-columns:70px minmax(100px,1fr) 28px;font-size:18px;gap:10px}.note-card{grid-template-columns:1fr;padding:22px 20px}.note-card h3{font-size:22px}.note-card p{font-size:17px}}@media print{.nav{display:none}body{background:#fff}.section,.hero{box-shadow:none;break-inside:avoid}.wrap{max-width:none}}
</style>
</head>
<body>
<div class="wrap">
  <main>
    <header class="hero">
      <div class="kicker">Consciousness Architecture Lab</div>
      <h1>의식 OS<span>프리미엄 리포트</span></h1>
      <p>${escapeHtml(data.reportVersion || 'CAL v7.5')} · ${escapeHtml(data.heroSubtitle || '')}</p>
      <p>${escapeHtml(data.heroMessage || '')}</p>
      <div class="meta">
        <div><small>고객명</small><b>${escapeHtml(data.clientName)}</b></div>
        <div><small>리포트 날짜</small><b>${escapeHtml(data.reportDate)}</b></div>
        <div><small>리포트 ID</small><b>${escapeHtml(data.reportId || '')}</b></div>
      </div>
    </header>
    <nav class="nav">${nav}</nav>
    ${sections}
    <div class="footer">${escapeHtml(disclaimerText || '')}</div>
    <div class="legal-footer">
      <div class="seal">✧</div>
      <div>Written by <b>Consciousness Architecture Lab</b></div>
      <div>All contents in this report are protected by copyright.</div>
    </div>
  </main>
</div>
</body>
</html>`;
}

function generate(){
  const box = $('msg');
  box.innerHTML = '생성 중...';
  try{
    const raw = $('jsonInput').value.trim();
    if(!raw) throw new Error('JSON이 비어 있습니다.');
    const data = normalizeData(JSON.parse(raw));
    const reportHtml = buildReportHtml(data);
    const filename = `report_${safeName(data.clientName)}_${digits(data.reportDate)}.html`;

    const blob = new Blob([reportHtml], {type:'text/html;charset=utf-8'});
    const url = URL.createObjectURL(blob);

    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    a.click();

    const githubUrl = `https://labiel1004.github.io/jena_checklist/report_premium/${encodeURIComponent(filename)}`;

    box.innerHTML = `
      <div class="ok">생성 성공!</div>
      <div>파일명: <code>${escapeHtml(filename)}</code></div>
      <div class="result-actions">
        <a class="btn" href="${url}" target="_blank" rel="noopener">바로 열어보기 ↗</a>
        <a class="btn light" href="${githubUrl}" target="_blank" rel="noopener">업로드 후 링크 ↗</a>
      </div>
      <div class="small">생성된 HTML 파일을 GitHub의 <b>/report_premium/</b> 폴더에 업로드한 뒤, ‘업로드 후 링크’를 열면 됩니다.</div>
    `;
  }catch(e){
    box.innerHTML = `<span class="err">생성 실패:</span> ${escapeHtml(e.message)}`;
  }
}

$('generateBtn').addEventListener('click', generate);
$('sampleBtn').addEventListener('click', ()=>{$('jsonInput').value = JSON.stringify(SAMPLE,null,2); $('msg').innerHTML='샘플을 불러왔습니다.';});
$('clearBtn').addEventListener('click', ()=>{$('jsonInput').value=''; $('msg').innerHTML='비웠습니다.';});
</script>
</body>
</html>
