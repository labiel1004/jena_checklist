function setStatus(html){$("status").innerHTML=html}
function generate(){try{const raw=$("jsonInput").value.trim();if(!raw)throw new Error("JSON이 비어 있습니다.");parsedData=JSON.parse(raw);generatedHtml=createReportHtml(parsedData);generatedFileName=fileName(parsedData);let m=meta(parsedData);$("previewBtn").disabled=false;$("downloadBtn").disabled=false;$("pdfBtn").disabled=false;setStatus(`<strong>생성 성공!</strong><br>인식된 고객명: <code>${esc(m.client)}</code><br>인식된 날짜: <code>${esc(m.date)}</code><br>파일명: <code>${esc(generatedFileName)}</code><br>이제 <code>미리보기</code>로 확인한 뒤 다운로드하세요.`)}catch(e){generatedHtml="";parsedData=null;$("previewBtn").disabled=true;$("downloadBtn").disabled=true;$("pdfBtn").disabled=true;setStatus(`<span class="error">생성 실패:</span> ${esc(e.message)}`)}}
function preview(){if(!generatedHtml)return;$("previewWrap").style.display="block";$("previewFrame").srcdoc=generatedHtml;$("previewWrap").scrollIntoView({behavior:"smooth",block:"start"})}
function downloadHtml(){if(!generatedHtml)return;const blob=new Blob([generatedHtml],{type:"text/html;charset=utf-8"}),url=URL.createObjectURL(blob),a=document.createElement("a");a.href=url;a.download=generatedFileName;document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url)}
function savePdf(){if(!generatedHtml)return;let w=window.open("","_blank");if(!w){alert("팝업이 차단되었습니다. 팝업 허용 후 다시 시도하세요.");return}w.document.open();w.document.write(generatedHtml);w.document.close();setTimeout(()=>{w.focus();w.print()},600)}
function clearAll(){$("jsonInput").value="";generatedHtml="";parsedData=null;$("previewFrame").srcdoc="";$("previewWrap").style.display="none";$("previewBtn").disabled=true;$("downloadBtn").disabled=true;$("pdfBtn").disabled=true;setStatus(`JSON을 붙여넣은 뒤 <code>HTML 생성하기</code>를 누르세요. 미리보기는 자동 다운로드하지 않습니다.`)}
$("generateBtn").addEventListener("click",generate);$("previewBtn").addEventListener("click",preview);$("downloadBtn").addEventListener("click",downloadHtml);$("pdfBtn").addEventListener("click",savePdf);$("clearBtn").addEventListener("click",clearAll);
