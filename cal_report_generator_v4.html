<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CAL Report Generator v4</title>
  <style>
    :root{
      --navy:#07111f;
      --navy2:#101827;
      --gold:#c8932d;
      --gold2:#8a6b3d;
      --cream:#f7f1e7;
      --paper:#fffdf9;
      --line:#e7d6bc;
      --text:#171717;
      --muted:#6b6258;
      --soft:#f4ead9;
      --green:#087443;
      --red:#b42318;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:'Noto Sans KR',system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
      background:linear-gradient(135deg,#f8f1e6 0%,#f5efe5 45%,#efe2cf 100%);
      color:var(--text);
      line-height:1.75;
      word-break:keep-all;
    }
    .wrap{max-width:1180px;margin:0 auto;padding:28px 18px 80px}
    .panel{
      background:rgba(255,253,249,.92);
      border:1px solid var(--line);
      border-radius:26px;
      padding:28px;
      box-shadow:0 18px 45px rgba(43,32,18,.08);
      margin-bottom:26px;
    }
    h1{font-size:32px;margin:0 0 8px;color:var(--navy);letter-spacing:-.04em}
    h2{font-size:26px;margin:0 0 18px;color:var(--navy);letter-spacing:-.04em}
    .desc{color:var(--muted);margin:0 0 22px}
    textarea{
      width:100%;
      min-height:390px;
      border:1px solid var(--line);
      border-radius:18px;
      padding:18px;
      font-size:15px;
      line-height:1.7;
      background:#fffaf2;
      resize:vertical;
      outline:none;
      font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    }
    textarea:focus{border-color:var(--gold);box-shadow:0 0 0 4px rgba(200,147,45,.14)}
    .btns{display:flex;flex-wrap:wrap;gap:12px;margin-top:18px}
    button{
      border:0;
      border-radius:999px;
      padding:14px 24px;
      font-weight:800;
      font-size:16px;
      cursor:pointer;
      color:white;
      background:var(--navy);
      box-shadow:0 8px 16px rgba(0,0,0,.12);
    }
    button.secondary{background:var(--gold2)}
    button.light{background:#fffaf2;color:var(--navy);border:1px solid var(--line)}
    .status{
      margin-top:18px;
      padding:16px 18px;
      border-radius:16px;
      background:#fff8eb;
      border:1px solid var(--line);
      color:#4d3b22;
      display:none;
    }
    .status.ok{display:block;color:var(--green)}
    .status.err{display:block;color:var(--red)}
    iframe{
      width:100%;
      height:760px;
      border:1px solid var(--line);
      border-radius:22px;
      background:white;
    }

    /* Report style inside generated HTML */
    .report-body{
      margin:0;
      background:linear-gradient(135deg,#f8f1e6 0%,#f5efe5 52%,#ead9bf 100%);
      color:#171717;
      font-family:'Noto Sans KR',system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
      line-height:1.75;
      word-break:keep-all;
    }
    .report-wrap{max-width:980px;margin:0 auto;padding:42px 18px 70px}
    .cover{
      background:radial-gradient(circle at 82% 12%,rgba(200,147,45,.22),transparent 32%),
                 linear-gradient(135deg,#06101f 0%,#121925 54%,#252516 100%);
      border-radius:30px;
      padding:58px 52px;
      color:white;
      box-shadow:0 24px 55px rgba(0,0,0,.22);
      margin-bottom:34px;
      overflow:hidden;
      position:relative;
    }
    .cover:after{
      content:"";
      position:absolute;right:-80px;top:-90px;width:310px;height:310px;
      border:1px solid rgba(200,147,45,.25);border-radius:50%;
    }
    .brand{color:#f0b84b;letter-spacing:.18em;font-size:13px;font-weight:900;margin-bottom:38px}
    .cover h1{font-size:50px;line-height:1.15;margin:0 0 20px;letter-spacing:-.05em;color:white}
    .cover p{font-size:18px;color:#e9dfcf;margin:0;max-width:720px}
    .meta-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:34px}
    .meta-card{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);border-radius:16px;padding:14px}
    .meta-label{font-size:12px;color:#d8c59e;margin-bottom:4px}
    .meta-value{font-weight:800;color:white}
    .section{
      background:rgba(255,253,249,.94);
      border:1px solid #e7d6bc;
      border-radius:28px;
      padding:36px 38px;
      margin:28px 0;
      box-shadow:0 16px 42px rgba(43,32,18,.07);
    }
    .section-title{display:flex;align-items:baseline;gap:14px;margin:0 0 12px}
    .num{font-size:34px;font-weight:900;color:#c8932d;letter-spacing:-.05em}
    .section h2{font-size:31px;letter-spacing:-.05em;margin:0;color:#07111f;line-height:1.25}
    .section-desc{color:#6b6258;margin:0 0 26px}
    .accent-line{width:54px;height:2px;background:#c8932d;margin:20px 0 30px}
    .card{
      border:1px solid #e7d6bc;
      background:#fffaf2;
      border-radius:22px;
      padding:24px;
      margin:18px 0;
    }
    .card.white{background:#fff}
    .eyebrow{letter-spacing:.18em;font-weight:900;color:#b68222;font-size:13px;margin-bottom:12px;text-transform:uppercase}
    h3{font-size:22px;margin:0 0 12px;color:#07111f;letter-spacing:-.035em}
    p{margin:0 0 12px}
    .list{padding-left:0;margin:12px 0 0;list-style:none}
    .list li{position:relative;padding-left:18px;margin:7px 0}
    .list li:before{content:"";position:absolute;left:0;top:.78em;width:6px;height:6px;background:#c8932d;border-radius:50%}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
    .insight{
      background:#f1e3cc;
      border:1px solid #dcc49d;
      border-radius:18px;
      padding:18px 20px;
      margin-top:20px;
      color:#513917;
      font-weight:700;
    }
    .core{
      background:#fff7e8;
      border-left:4px solid #c8932d;
      padding:16px 18px;
      border-radius:14px;
      margin-top:16px;
      font-weight:700;
    }
    .flow{display:flex;flex-wrap:wrap;gap:8px;margin:16px 0}
    .pill{background:#07111f;color:white;border-radius:999px;padding:8px 13px;font-size:13px;font-weight:800}
    .element-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin:16px 0}
    .element{background:#fff;border:1px solid #e7d6bc;border-radius:16px;padding:14px;text-align:center}
    .element b{display:block;font-size:20px;color:#c8932d}
    .steps{counter-reset:step}
    .step{display:grid;grid-template-columns:54px 1fr;gap:14px;align-items:start;border-bottom:1px solid #eadcc8;padding:16px 0}
    .step:last-child{border-bottom:0}
    .step-num{width:46px;height:46px;border-radius:50%;background:#07111f;color:white;display:flex;align-items:center;justify-content:center;font-weight:900}
    .final{
      background:linear-gradient(135deg,#07111f,#1d2118);
      color:white;
      border:0;
    }
    .final h2,.final h3{color:white}
    .final .section-desc{color:#e7d9c4}
    .final .insight{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.15);color:#f7e9cc}
    .declaration{font-size:20px;font-weight:900;color:#f0b84b;margin:22px 0}
    .footer{font-size:13px;color:#6b6258;text-align:center;margin:34px 0}
    @media(max-width:760px){
      .cover{padding:42px 28px}
      .cover h1{font-size:36px}
      .section{padding:28px 22px}
      .grid2,.grid3,.meta-grid,.element-grid{grid-template-columns:1fr}
      .section h2{font-size:27px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="panel">
      <h1>CAL Report Generator v4</h1>
      <p class="desc">v4 JSON 템플릿용 생성기입니다. 기존 생성기는 그대로 두고, 새 GPT가 만든 <b>meta / executiveSummary / realityOutput / coreLoop</b> 구조를 읽습니다.</p>
      <h2>1. JSON 입력</h2>
      <textarea id="jsonInput" placeholder="여기에 v4 JSON을 붙여넣으세요."></textarea>
      <div class="btns">
        <button onclick="generate()">HTML 생성하기</button>
        <button class="secondary" onclick="preview()">미리보기</button>
        <button onclick="downloadHTML()">HTML 다운로드</button>
        <button class="secondary" onclick="savePDF()">PDF 저장</button>
        <button class="light" onclick="clearAll()">비우기</button>
      </div>
      <div id="status" class="status"></div>
    </div>
    <div class="panel">
      <h2>2. 미리보기</h2>
      <iframe id="previewFrame"></iframe>
    </div>
  </div>

<script>
let generatedHTML = "";
let generatedFileName = "cal_report_v4.html";

const safe = (v, fallback="") => (v === undefined || v === null || v === "") ? fallback : String(v);
const arr = (v) => Array.isArray(v) ? v : [];
const obj = (v) => (v && typeof v === "object" && !Array.isArray(v)) ? v : {};
const esc = (s) => safe(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
const slug = (s) => safe(s,"client").replace(/\s+/g,"_").replace(/[\\\/:*?"<>|()]/g,"").replace(/_{2,}/g,"_");

function parseJSON(){
  const raw = document.getElementById("jsonInput").value.trim();
  if(!raw) throw new Error("JSON을 입력해주세요.");
  return JSON.parse(raw);
}

function listHTML(items){
  return `<ul class="list">${arr(items).map(x=>`<li>${esc(x)}</li>`).join("")}</ul>`;
}

function card(title, body, cls=""){
  if(!body && body !== 0) return "";
  return `<div class="card ${cls}"><h3>${esc(title)}</h3><p>${esc(body)}</p></div>`;
}

function insight(text){
  return text ? `<div class="insight">CAL Insight · ${esc(text)}</div>` : "";
}
function core(text){
  return text ? `<div class="core">${esc(text)}</div>` : "";
}

function section(num, title, desc, inner, extraClass=""){
  return `<section class="section ${extraClass}">
    <div class="section-title"><div class="num">${num}</div><h2>${esc(title)}</h2></div>
    ${desc ? `<p class="section-desc">${esc(desc)}</p>` : ""}
    <div class="accent-line"></div>
    ${inner}
  </section>`;
}

function buildReport(data){
  const meta = obj(data.meta);
  const executiveSummary = obj(data.executiveSummary);
  const realityOutput = obj(data.realityOutput);
  const coreLoop = obj(data.coreLoop);
  const sajuLens = obj(data.sajuLens);
  const consciousnessOS = obj(data.consciousnessOS);
  const materializationFlow = obj(data.materializationFlow);
  const choiceRecovery = obj(data.choiceRecovery);
  const reprogrammingProtocol = obj(data.reprogrammingProtocol);
  const resistancePattern = obj(data.resistancePattern);
  const finalMessage = obj(data.finalMessage);
  const disclaimer = obj(data.disclaimer);

  const client = safe(meta.clientName, "고객");
  const date = safe(meta.reportDate, new Date().toISOString().slice(0,10));
  const reportId = safe(meta.reportId, "");
  generatedFileName = `cal_report_${slug(client)}_${date.replaceAll("-","")}.html`;

  const cover = `<section class="cover">
    <div class="brand">CONSCIOUSNESS ARCHITECTURE LAB</div>
    <h1>CAL 의식OS<br>프리미엄 리포트 v4.0</h1>
    <p>${esc(safe(meta.coreThesis,"현실은 사건이 아니라 반복 실행된 의식 구조의 출력입니다."))}</p>
    <div class="meta-grid">
      <div class="meta-card"><div class="meta-label">고객명</div><div class="meta-value">${esc(client)}</div></div>
      <div class="meta-card"><div class="meta-label">작성일</div><div class="meta-value">${esc(date)}</div></div>
      <div class="meta-card"><div class="meta-label">Report ID</div><div class="meta-value">${esc(reportId)}</div></div>
    </div>
  </section>`;

  const s1 = section("01", safe(executiveSummary.title,"현실 출력 구조 요약"), "현재 삶에서 반복적으로 출력되는 핵심 패턴을 확인합니다.",
    `<div class="card white"><div class="eyebrow">Reality Output</div><h3>${esc(safe(executiveSummary.oneLineDiagnosis,"현실 출력"))}</h3><p>${esc(executiveSummary.summaryBody)}</p>${core(executiveSummary.coreMessage)}${insight(executiveSummary.calInsight)}</div>`
  );

  const s2 = section("02", safe(realityOutput.title,"현재 현실에서 반복되는 출력 패턴"), "반복되는 문제, 감정 신호, 몸 신호, 관계/일의 출력을 연결합니다.",
    `<div class="card white"><h3>핵심 반복 패턴</h3><p>${esc(realityOutput.mainPattern)}</p>${core(realityOutput.coreInsight)}${insight(realityOutput.calInsight)}</div>
    <div class="grid2">
      <div class="card"><h3>보이는 문제</h3>${listHTML(realityOutput.visibleProblems)}</div>
      <div class="card"><h3>감정 신호</h3>${listHTML(realityOutput.emotionalSignals)}</div>
      <div class="card"><h3>몸 신호</h3>${listHTML(realityOutput.bodySignals)}</div>
      <div class="card"><h3>선택 패턴</h3><p>${esc(realityOutput.choicePattern)}</p></div>
    </div>
    ${card("관계 출력", realityOutput.relationshipOutput, "white")}
    ${card("돈/일 출력", realityOutput.moneyOrWorkOutput, "white")}`
  );

  const loopItems = [
    ["자극 입력", coreLoop.trigger],
    ["해석", coreLoop.interpretation],
    ["감정 상승", coreLoop.emotionRise],
    ["동일시", coreLoop.identification],
    ["자동반응", coreLoop.automaticReaction],
    ["반복 저장", coreLoop.storagePattern],
    ["현실 재출력", coreLoop.realityReOutput],
  ];
  const s3 = section("03", safe(coreLoop.title,"핵심 자동반응 루프"), "반복을 만드는 자동반응의 실행 순서를 확인합니다.",
    `<div class="flow">${arr(coreLoop.loopDiagram).map(x=>`<span class="pill">${esc(x)}</span>`).join("")}</div>
    <div class="card white">${loopItems.map(([t,b])=>`<h3>${esc(t)}</h3><p>${esc(b)}</p>`).join("")}${core(coreLoop.coreInsight)}${insight(coreLoop.calInsight)}</div>`
  );

  const elements = obj(sajuLens.elementScores);
  const s4 = section("04", safe(sajuLens.title,"사주OS — 초기 에너지 렌즈"), "사주는 운명이 아니라 자극에 반응하는 초기 입력 필터입니다.",
    `<div class="element-grid">
      <div class="element">목(木)<b>${esc(elements.wood ?? 0)}</b></div>
      <div class="element">화(火)<b>${esc(elements.fire ?? 0)}</b></div>
      <div class="element">토(土)<b>${esc(elements.earth ?? 0)}</b></div>
      <div class="element">금(金)<b>${esc(elements.metal ?? 0)}</b></div>
      <div class="element">수(水)<b>${esc(elements.water ?? 0)}</b></div>
    </div>
    <div class="grid2">
      <div class="card"><h3>강한 에너지</h3>${listHTML(sajuLens.dominantElements)}</div>
      <div class="card"><h3>약한 에너지</h3>${listHTML(sajuLens.weakElements)}</div>
    </div>
    ${card("정상 작동", sajuLens.normalOperation, "white")}
    ${card("왜곡 작동", sajuLens.distortedOperation, "white")}
    ${card("렌즈 증폭", sajuLens.lensAmplification, "white")}
    ${card("현실 출력 연결", sajuLens.connectionToRealityOutput, "white")}
    ${core(sajuLens.coreInsight)}${insight(sajuLens.calInsight)}`
  );

  const osItems = [
    consciousnessOS.fiveSenseInput,
    consciousnessOS.sixthInterpretation,
    consciousnessOS.seventhIdentification,
    consciousnessOS.eighthStorage,
    consciousnessOS.ninthConsciousChoice
  ].map(obj);
  const s5 = section("05", safe(consciousnessOS.title,"의식OS 구조 분석"), "5식에서 9식까지, 현실이 내부에서 처리되는 흐름을 확인합니다.",
    `<div class="grid2">${osItems.map(it=>`<div class="card"><h3>${esc(it.label)}</h3><p>${esc(it.description)}</p><p><b>개인 패턴</b><br>${esc(it.clientPattern)}</p>${it.choicePoint ? `<p><b>선택 지점</b><br>${esc(it.choicePoint)}</p>`:""}</div>`).join("")}</div>
    ${core(consciousnessOS.coreInsight)}${insight(consciousnessOS.calInsight)}`
  );

  const s6 = section("06", safe(materializationFlow.title,"현실은 어떻게 물질화되는가"), "반복 해석과 반복 선택이 현실 출력으로 굳어지는 과정을 봅니다.",
    `<div class="flow">${arr(materializationFlow.materializationDiagram).map(x=>`<span class="pill">${esc(x)}</span>`).join("")}</div>
    <div class="grid2">
      ${card("내부 패턴", materializationFlow.innerPattern)}
      ${card("반복 감정", materializationFlow.repeatedEmotion)}
      ${card("반복 선택", materializationFlow.repeatedChoice)}
      ${card("반복 행동", materializationFlow.repeatedBehavior)}
    </div>
    ${card("외부 결과", materializationFlow.outerResult, "white")}
    ${core(materializationFlow.coreInsight)}${insight(materializationFlow.calInsight)}`
  );

  const s7 = section("07", safe(choiceRecovery.title,"9식 — 관리자 권한 회복"), "자동반응과 자신 사이에 선택 공간을 회복합니다.",
    `<div class="card white">
      <h3>나는 구조 그 자체가 아니다</h3><p>${esc(choiceRecovery.notSelfStatement)}</p>
      <h3>관찰자 문장</h3><p>${esc(choiceRecovery.observerStatement)}</p>
      <h3>멈춤 지점</h3><p>${esc(choiceRecovery.pausePoint)}</p>
      <h3>새 선택 가능성</h3><p>${esc(choiceRecovery.newChoicePossibility)}</p>
      <h3>재프로그래밍 문장</h3><p>${esc(choiceRecovery.reprogrammingStatement)}</p>
      ${core(choiceRecovery.coreInsight)}${insight(choiceRecovery.calInsight)}
    </div>`
  );

  const steps = arr(reprogrammingProtocol.steps);
  const s8 = section("08", safe(reprogrammingProtocol.title,"현실 재프로그래밍 프로토콜"), "작은 감지와 작은 선택을 반복 저장하는 실행 프로토콜입니다.",
    `<div class="card white steps">${steps.map(st=>`<div class="step"><div class="step-num">${esc(st.step)}</div><div><h3>${esc(st.name)}</h3><p>${esc(st.instruction)}</p></div></div>`).join("")}</div>
    ${card("Daily Practice", reprogrammingProtocol.dailyPractice)}
    <div class="card"><h3>전환 질문</h3>${listHTML(reprogrammingProtocol.turningQuestions)}</div>
    ${core(reprogrammingProtocol.coreInsight)}${insight(reprogrammingProtocol.calInsight)}`
  );

  const s9 = section("09", safe(resistancePattern.title,"변화 과정에서 나타나는 저항"), "저항은 실패가 아니라 기존 저장 패턴의 관성입니다.",
    `<div class="card"><h3>예상 저항</h3>${listHTML(resistancePattern.expectedResistance)}</div>
    ${card("왜 나타나는가", resistancePattern.whyItHappens, "white")}
    ${card("어떻게 읽을 것인가", resistancePattern.howToReadResistance, "white")}
    ${card("대응 가이드", resistancePattern.responseGuide, "white")}
    ${core(resistancePattern.coreInsight)}${insight(resistancePattern.calInsight)}`
  );

  const s10 = section("10", safe(finalMessage.title,"Final Message"), "리포트의 전체 구조를 통합합니다.",
    `<p>${esc(finalMessage.message).replace(/\n/g,"<br>")}</p>
    ${finalMessage.declaration ? `<div class="declaration">${esc(finalMessage.declaration)}</div>`:""}
    ${finalMessage.closingSentence ? `<h3>${esc(finalMessage.closingSentence)}</h3>`:""}
    ${insight(finalMessage.calInsight)}`,
    "final"
  );

  const foot = `<div class="footer">${esc(disclaimer.text)}<br>© Consciousness Architecture Lab. All rights reserved.</div>`;

  return `<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>CAL 리포트 - ${esc(client)}</title><style>${document.querySelector("style").innerHTML}</style></head><body class="report-body"><div class="report-wrap">${cover}${s1}${s2}${s3}${s4}${s5}${s6}${s7}${s8}${s9}${s10}${foot}</div></body></html>`;
}

function generate(){
  const status = document.getElementById("status");
  try{
    const data = parseJSON();
    generatedHTML = buildReport(data);
    status.className = "status ok";
    status.innerHTML = `생성 성공!<br>인식된 고객명: <b>${esc(obj(data.meta).clientName)}</b><br>파일명: <b>${esc(generatedFileName)}</b>`;
    preview();
  }catch(e){
    generatedHTML = "";
    status.className = "status err";
    status.textContent = "생성 실패: " + e.message;
  }
}

function preview(){
  if(!generatedHTML) generate();
  if(!generatedHTML) return;
  const frame = document.getElementById("previewFrame");
  frame.srcdoc = generatedHTML;
}

function downloadHTML(){
  if(!generatedHTML) generate();
  if(!generatedHTML) return;
  const blob = new Blob([generatedHTML], {type:"text/html;charset=utf-8"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = generatedFileName;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(a.href);
}

function savePDF(){
  if(!generatedHTML) generate();
  if(!generatedHTML) return;
  const w = window.open("", "_blank");
  w.document.open();
  w.document.write(generatedHTML);
  w.document.close();
  setTimeout(()=>w.print(), 500);
}

function clearAll(){
  document.getElementById("jsonInput").value = "";
  generatedHTML = "";
  document.getElementById("previewFrame").srcdoc = "";
  const status = document.getElementById("status");
  status.className = "status";
  status.textContent = "";
}
</script>
</body>
</html>
