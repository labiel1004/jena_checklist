<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CAL 리포트가 준비되었습니다</title>
  <meta name="description" content="CAL 의식OS 리포트 안내 카드" />
  <style>
    :root {
      --accent: #C98FA0;
      --button: #C47F94;
      --shadow: rgba(196,127,148,.28);
      --ink: #463A34;
      --muted: #7C6F68;
      --paper: rgba(255, 252, 246, 0.86);
      --line: rgba(122, 102, 87, 0.18);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Noto Sans KR", "Apple SD Gothic Neo", system-ui, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 20% 15%, rgba(255,255,255,.95), transparent 28%),
        linear-gradient(135deg, #fff8ef 0%, #f6eadf 45%, #efe0d3 100%);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: min(420px, 100%);
      border-radius: 28px;
      overflow: hidden;
      background: var(--paper);
      border: 1px solid var(--line);
      box-shadow: 0 24px 80px rgba(76, 56, 42, 0.16);
      backdrop-filter: blur(8px);
    }

    .image-wrap {
      position: relative;
      height: 410px;
      overflow: hidden;
      background: #f7efe7;
    }

    .image-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .image-wrap::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, transparent 52%, rgba(255, 250, 244, .92) 100%);
    }

    .content {
      padding: 28px 26px 30px;
      text-align: center;
      margin-top: -34px;
      position: relative;
      z-index: 1;
    }

    .eyebrow {
      display: inline-block;
      margin-bottom: 12px;
      padding: 7px 13px;
      border-radius: 999px;
      color: var(--accent);
      background: rgba(255, 255, 255, 0.7);
      border: 1px solid var(--line);
      font-size: 12px;
      letter-spacing: .08em;
      font-weight: 700;
    }

    h1 {
      margin: 0 0 18px;
      font-family: "Georgia", "Times New Roman", serif;
      font-size: 29px;
      line-height: 1.22;
      font-weight: 500;
      letter-spacing: -0.02em;
    }

    .note {
      margin: 0 auto;
      max-width: 310px;
      font-size: 15.5px;
      line-height: 1.78;
      color: var(--muted);
      word-break: keep-all;
    }

    .sub {
      margin: 14px auto 24px;
      max-width: 310px;
      font-size: 14px;
      line-height: 1.65;
      color: #9A8B82;
      word-break: keep-all;
    }

    .report-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 54px;
      border-radius: 999px;
      text-decoration: none;
      background: var(--button);
      color: #fff;
      font-weight: 700;
      font-size: 15.5px;
      box-shadow: 0 14px 30px var(--shadow);
      transition: transform .18s ease, box-shadow .18s ease, opacity .18s ease;
    }

    .report-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 18px 36px var(--shadow);
      opacity: .96;
    }

    .footer {
      margin-top: 18px;
      font-size: 11.5px;
      color: #A99B92;
      letter-spacing: .02em;
    }

    @media (max-width: 420px) {
      body { padding: 14px; }
      .image-wrap { height: 360px; }
      .content { padding: 25px 22px 28px; }
      h1 { font-size: 26px; }
    }
  </style>
</head>
<body>
  <main class="card">
    <section class="image-wrap" aria-label="flower card image">
      <img src="../images/pink_tulip.png" alt="CAL 리포트 안내 꽃카드" />
    </section>

    <section class="content">
      <div class="eyebrow">CAL REPORT</div>
      <h1>CAL 리포트가 준비되었습니다</h1>

      <p class="note">당신의 내면 흐름을 부드럽게 비춰본 CAL 리포트가 준비되었어요.</p>
      <p class="sub">편안한 속도로, 자신에게 다정하게 읽어주세요.</p>

      <!-- 고객별 리포트 주소는 아래 href만 수정하세요. -->
 <a href="../../report_premium/cal_report_JJ_20260516.html" class="report-button">
              리포트 열어보기 →
      </a>

      <div class="footer">Consciousness Architecture Lab</div>
    </section>
  </main>
</body>
</html>
