<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CAL 리포트 생성기</title>

  <style>
    body{
      margin:0;
      font-family:Arial,"Noto Sans KR",sans-serif;
      background:#0f172a;
      color:#e5e7eb;
    }
    .wrap{
      max-width:980px;
      margin:0 auto;
      padding:32px 18px 80px;
    }
    h1{font-size:28px;margin-bottom:8px}
    p{color:#cbd5e1}
    label{
      display:block;
      margin-top:24px;
      margin-bottom:8px;
      font-weight:700;
    }
    input,textarea{
      width:100%;
      box-sizing:border-box;
      border:1px solid #334155;
      border-radius:12px;
      background:#020617;
      color:#e5e7eb;
      padding:14px;
      font-size:15px;
    }
    textarea{
      min-height:260px;
      font-family:Consolas,monospace;
    }
    button{
      margin-top:20px;
      margin-right:10px;
      padding:14px 20px;
      border:0;
      border-radius:999px;
      background:#facc15;
      color:#111827;
      font-weight:800;
      cursor:pointer;
    }
    .box{
      margin-top:28px;
      padding:18px;
      border-radius:16px;
      background:#111827;
      border:1px solid #334155;
    }
    .success{color:#86efac;font-weight:700;white-space:pre-wrap}
    .error{color:#fca5a5;font-weight:700;white-space:pre-wrap}
  </style>
</head>

<body>

<div class="wrap">
  <h1>CAL 프리미엄 리포트 생성기</h1>

  <label>파일명</label>
  <input id="filename" placeholder="예: pjh_20260425_1542.html">

  <label>프리미엄 JSON</label>
  <textarea id="jsonInput"></textarea>

  <button onclick="generateReport()">HTML 생성하기</button>
  <button onclick="copyResult()">HTML 복사</button>

  <div class="box">
    <div id="status">아직 생성 전입니다.</div>
  </div>

  <label>생성된 HTML</label>
  <textarea id="result" readonly></textarea>
</div>

<script>

function generateReport(){

  const filename=document.getElementById("filename").value.trim();
  const raw=document.getElementById("jsonInput").value.trim();
  const status=document.getElementById("status");
  const result=document.getElementById("result");

  if(!filename.endsWith(".html")){
    status.className="error";
    status.textContent="파일명은 .html로 끝나야 합니다";
    return;
  }

  let data;
  try{
    data=JSON.parse(raw);
  }catch(e){
    status.className="error";
    status.textContent="JSON 오류:\n"+e.message;
    return;
  }

  const html=createHtml(data);
  result.value=html;

  status.className="success";
  status.textContent="생성 완료!";
}

async function copyResult(){
  const result=document.getElementById("result");
  if(!result.value) return alert("먼저 생성하세요");
  await navigator.clipboard.writeText(result.value);
  alert("복사 완료");
}

function esc(t){
  return String(t||"")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;");
}

function createHtml(d){

return `<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>${esc(d.clientName)} 리포트</title>

<meta property="og:title" content="${esc(d.clientName)} 리포트">
<meta property="og:description" content="${esc(d.mainMessage)}">
<meta property="og:image" content="https://labiel1004.github.io/jena_checklist/cover.jpg">

<style>
body{margin:0;background:#f3eee6;font-family:"Noto Sans KR"}
.wrap{max-width:900px;margin:0 auto;padding:40px}
.cover{background:#2d261f;color:#fff;padding:40px;border-radius:30px}
section{background:#fff;padding:30px;margin-top:20px;border-radius:20px}
</style>

</head>

<body>

<div class="wrap">

<div class="cover">
<h1>${esc(d.clientName)}</h1>
<p>${esc(d.mainMessage)}</p>
</div>

<section>
<h2>상태</h2>
<p>${esc(d.totalState)}</p>
</section>

</div>

</body>
</html>`;
}

</script>

</body>
</html>
