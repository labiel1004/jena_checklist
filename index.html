<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta property="og:title" content="나는 지금 반응 중인가, 선택 중인가?" />
<meta property="og:description" content="지금 당신의 상태를 확인하세요." />
<meta property="og:image" content="https://labiel1004.github.io/jena_checklist/thumbnail.png" />
<meta property="og:url" content="https://labiel1004.github.io/jena_checklist/" />
<meta property="og:type" content="website" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>나는 지금 반응 중인가, 선택 중인가?</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell">
    <section class="card" id="app">
      <header class="hero">
        <p class="eyebrow">의식OS 체크리스트</p>
        <h1>나는 지금 반응 중인가, 선택 중인가?</h1>
        <p class="description">
          각 문항은 지금 내가 반응하고 있는지, 선택하고 있는지를 확인하는 질문입니다.
      </p>
      </header>

      <section class="progress-panel" aria-label="진행 상태">
        <div class="progress-copy">
          <span id="progressText">1 / 18</span>
          <span id="scoreText">YES 0개</span>
        </div>
        <div class="progress-track" aria-hidden="true">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </section>

      <section id="questionView" class="question-view">
        <div class="question-card">
          <p class="question-number" id="questionNumber">문항 1</p>
          <h2 id="questionText"></h2>
        </div>

        <div class="answer-group">
          <button class="answer-button yes" id="yesButton" type="button">예</button>
          <button class="answer-button no" id="noButton" type="button">아니오</button>
        </div>
      </section>

      <section id="resultView" class="result-view hidden" aria-live="polite">
        <div class="result-badge" id="resultBadge"></div>
        <h2 id="resultTitle"></h2>
        <p class="result-score" id="resultScore"></p>
        <p class="result-message" id="resultMessage"></p>

        <div class="result-block">
          <p class="result-label">핵심 문장</p>
          <p class="result-emphasis" id="coreSentence"></p>
        </div>

        <div class="result-block">
          <p class="result-label">마지막 질문</p>
          <p class="result-question" id="finalQuestion"></p>
        </div>

        <button class="reset-button" id="resetButton" type="button">다시 체크하기</button>
      </section>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
