<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta property="og:title" content="나는 지금 반응 중인가, 선택 중인가?" />
  <meta property="og:description" content="지금 당신의 상태를 확인하세요." />
  <meta property="og:image" content="https://labiel1004.github.io/jena_checklist/thumbnail.png" />
  <meta property="og:url" content="https://labiel1004.github.io/jena_checklist/" />
  <meta property="og:type" content="website" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>나는 지금 반응 중인가, 선택 중인가?</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <main class="app-shell">
    <section class="card" id="app">
      <header class="hero">
        <p class="eyebrow">의식OS 체크리스트</p>
        <h1>나는 지금 반응 중인가, 선택 중인가?</h1>
        <p class="description">
          각 문항은 지금 내가 반응하고 있는지, 선택하고 있는지를 확인하는 질문입니다.
        </p>
      </header>

      <section class="progress-panel" aria-label="진행 상태">
        <div class="progress-copy">
          <span id="progressText">1 / 18</span>
          <span id="scoreText">YES 0개</span>
        </div>
        <div class="progress-track" aria-hidden="true">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </section>

      <section id="questionView" class="question-view">
        <div class="question-card">
          <p class="question-number" id="questionNumber">문항 1</p>
          <h2 id="questionText"></h2>
        </div>

        <div class="answer-group">
          <button class="answer-button yes" id="yesButton" type="button">예</button>
          <button class="answer-button no" id="noButton" type="button">아니오</button>
        </div>
      </section>
    </section>
  </main>

  <script>
    const questions = [
      "지금 내 감정에 이름을 붙일 수 있다.",
      "나는 불편한 상황에서 바로 반응하기보다 잠시 멈출 수 있다.",
      "상대의 말에 기분이 흔들릴 때, 내 안의 반응을 알아차릴 수 있다.",
      "나는 감정이 올라와도 그것이 나 전체라고 느끼지 않는다.",
      "지금 내가 왜 이렇게 반응하는지 스스로 물어볼 수 있다.",
      "나는 선택하기 전에 이미 자동으로 움직이고 있음을 알아차릴 때가 있다.",
      "비슷한 상황이 반복될 때, 그 안의 패턴을 볼 수 있다.",
      "나는 상황이나 사람을 탓하기 전에 내 해석을 점검할 수 있다.",
      "불안하거나 초조할 때 더 빨리 행동하려는 경향을 알아차릴 수 있다.",
      "나는 멈추고 싶을 때 실제로 잠시 멈출 수 있다.",
      "인정받고 싶은 마음이 올라올 때 그것을 알아차릴 수 있다.",
      "실수하거나 틀릴까 봐 긴장하는 나를 볼 수 있다.",
      "통제하고 싶은 마음이 올라올 때 그것을 감지할 수 있다.",
      "비교가 시작될 때 내 안에서 무엇이 작동하는지 볼 수 있다.",
      "불편한 감정을 피하려는 흐름을 알아차릴 수 있다.",
      "나는 감정이 아니라 선택의 자리로 돌아올 수 있다.",
      "상대의 반응보다 내 중심을 먼저 확인할 수 있다.",
      "나는 지금 반응 중인지, 선택 중인지 구분할 수 있다."
    ];

    let currentIndex = 0;
    let totalYes = 0;

    const questionNumber = document.getElementById("questionNumber");
    const questionText = document.getElementById("questionText");
    const progressText = document.getElementById("progressText");
    const scoreText = document.getElementById("scoreText");
    const progressFill = document.getElementById("progressFill");
    const yesButton = document.getElementById("yesButton");
    const noButton = document.getElementById("noButton");
    const questionView = document.getElementById("questionView");

    function renderQuestion() {
      questionNumber.textContent = `문항 ${currentIndex + 1}`;
      questionText.textContent = questions[currentIndex];
      progressText.textContent = `${currentIndex + 1} / ${questions.length}`;
      scoreText.textContent = `YES ${totalYes}개`;
      progressFill.style.width = `${((currentIndex + 1) / questions.length) * 100}%`;
    }

    function answer(isYes) {
      if (isYes) {
        totalYes++;
      }

      currentIndex++;

      if (currentIndex >= questions.length) {
        showResult();
      } else {
        renderQuestion();
      }
    }

    function showResult() {
      progressText.textContent = `${questions.length} / ${questions.length}`;
      scoreText.textContent = `YES ${totalYes}개`;
      progressFill.style.width = "100%";

      questionView.innerHTML = `
        <div class="question-card">
          <p class="question-number">체크 완료</p>
          <h2>당신의 현재 반응 구조가 확인되었습니다.</h2>
          <p style="margin-top:18px; font-size:18px; line-height:1.7; color:#5f6b63;">
            총 ${questions.length}개 문항 중 <strong style="color:#1f7a5a;">YES ${totalYes}개</strong>입니다.
          </p>
        </div>

        <div style="margin-top:28px; padding:26px 24px; border-radius:24px; background:#f7f3ec; border:1px solid #e2dbcf;">
          <p style="margin:0 0 14px; line-height:1.7; color:#26312b; font-size:17px;">
            당신의 반응 패턴은 이미 드러났습니다.
          </p>
          <p style="margin:0 0 14px; line-height:1.7; color:#26312b; font-size:17px;">
            하지만 이건 시작일 뿐입니다.
          </p>
          <p style="margin:0; line-height:1.8; color:#26312b; font-size:17px;">
            왜 이런 반응이 반복되는지,<br>
            어떤 구조가 작동하고 있는지,<br>
            어떻게 선택의 자리로 돌아올 수 있는지<br>
            프리미엄 리포트에서 확인할 수 있습니다.
          </p>
        </div>

        <div class="answer-group" style="margin-top:24px;">
          <a href="report.html?score=${totalYes}&total=${questions.length}"
             class="answer-button no"
             style="text-align:center; text-decoration:none;">
            기본 리포트 보기
          </a>

          <a href="premium_apply.html?score=${totalYes}&total=${questions.length}"
   class="answer-button yes"
   style="text-align:center; text-decoration:none;">
  프리미엄 리포트 신청하기
</a>
        </div>
      `;
    }

    yesButton.addEventListener("click", () => answer(true));
    noButton.addEventListener("click", () => answer(false));

    renderQuestion();
  </script>
</body>
</html>
