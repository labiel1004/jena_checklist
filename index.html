<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta property="og:title" content="나는 지금 반응 중인가, 선택 중인가?" />
  <meta property="og:description" content="선택하며 살고 있는지, 반응에 끌려가고 있는지 확인하세요." />
  <meta property="og:image" content="https://labiel1004.github.io/jena_checklist/thumbnail.png" />
  <meta property="og:url" content="https://labiel1004.github.io/jena_checklist/" />
  <meta property="og:type" content="website" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Consciousness OS - 자가 진단</title>

  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />

  <style>
    :root {
      --bg-main: #f8f9fb;
      --navy-deep: #1a1f2c;
      --navy-light: #2d3446;
      --gold-point: #c5a368;
      --gold-soft: #e5d5b7;
      --white: #ffffff;
      --text-main: #2c3e50;
      --text-muted: #64748b;
      --border-color: #e2e8f0;
    }

    * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }

    body {
      margin: 0;
      background: var(--bg-main);
      color: var(--text-main);
      font-family: "Pretendard", sans-serif;
      line-height: 1.6;
    }

    .wrap {
      max-width: 600px;
      margin: 0 auto;
      padding: 40px 20px 80px;
    }

    /* 상단 헤더 */
    .header-badge {
      display: inline-block;
      background: var(--navy-deep);
      color: var(--gold-soft);
      padding: 6px 14px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.15em;
      margin-bottom: 20px;
      text-transform: uppercase;
    }

    h1 {
      font-size: 32px;
      font-weight: 800;
      color: var(--navy-deep);
      line-height: 1.3;
      margin: 0 0 24px;
      letter-spacing: -0.04em;
    }

    .intro-text {
      font-size: 16px;
      color: var(--text-muted);
      margin-bottom: 40px;
      line-height: 1.8;
      word-break: keep-all;
    }

    .intro-text b {
      color: var(--navy-deep);
      font-weight: 700;
    }

    /* 진행 상태 패널 */
    .progress-panel {
      background: var(--white);
      padding: 24px;
      border-radius: 20px 20px 0 0;
      border: 1px solid var(--border-color);
      border-bottom: none;
    }

    .progress-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      font-size: 13px;
      font-weight: 700;
      color: var(--text-muted);
    }

    .progress-track {
      height: 6px;
      background: var(--border-color);
      border-radius: 10px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: var(--navy-deep);
      transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* 질문 카드 */
    .question-card {
      background: var(--white);
      padding: 40px 30px;
      border-radius: 0 0 20px 20px;
      border: 1px solid var(--border-color);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
      min-height: 280px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      text-align: center;
    }

    .question-number {
      font-size: 14px;
      font-weight: 800;
      color: var(--gold-point);
      margin-bottom: 20px;
      letter-spacing: 0.1em;
    }

    h2 {
      font-size: 20px;
      font-weight: 600;
      color: var(--navy-deep);
      line-height: 1.7;
      margin: 0;
      white-space: pre-line;
      word-break: keep-all;
    }

    /* 답변 버튼 그룹 */
    .answer-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 30px;
    }

    .btn-answer {
      padding: 24px 20px;
      border-radius: 16px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      border: none;
      transition: all 0.2s ease;
    }

    .btn-answer.yes {
      background: var(--navy-deep);
      color: var(--white);
      box-shadow: 0 8px 20px rgba(26, 31, 44, 0.15);
    }

    .btn-answer.no {
      background: var(--gold-soft);
      color: var(--navy-deep);
    }

    .btn-answer:active {
      transform: scale(0.96);
    }

    /* 완료 시 결과 버튼 */
    .btn-result {
      display: block;
      background: var(--navy-deep);
      color: var(--white);
      padding: 20px;
      border-radius: 16px;
      text-align: center;
      text-decoration: none;
      font-weight: 800;
      font-size: 18px;
      margin-top: 20px;
      box-shadow: 0 10px 25px rgba(26, 31, 44, 0.2);
    }

    .score-badge {
      display: inline-block;
      margin: 20px auto;
      padding: 8px 20px;
      background: #f1f5f9;
      color: var(--navy-deep);
      border-radius: 999px;
      font-weight: 800;
      font-size: 14px;
    }

    @media (max-width: 520px) {
      .wrap { padding: 30px 16px; }
      h1 { font-size: 26px; }
      .question-card { padding: 35px 20px; }
      h2 { font-size: 18px; }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="header-badge">Consciousness OS</div>
    <h1>나는 지금 반응 중인가,<br>선택 중인가?</h1>

    <p class="intro-text">
      당신은 지금 <b>선택하며 살고 있습니까</b>, 아니면 반응에 끌려가고 있습니까?
      생각으로 판단하지 말고, 떠오르는 장면이 있다면 솔직하게 체크해 주세요.
    </p>

    <section class="progress-panel">
      <div class="progress-info">
        <span id="progressText">1 / 18</span>
        <span id="scoreText">반응 발견 0회</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </section>

    <section id="questionView">
      <div class="question-card">
        <p class="question-number" id="questionNumber">STEP 01</p>
        <h2 id="questionText">문항을 불러오는 중입니다...</h2>
      </div>

      <div class="answer-group">
        <button class="btn-answer no" id="noButton">해당 없음</button>
        <button class="btn-answer yes" id="yesButton">해당된다</button>
      </div>
    </section>

    <div style="text-align: center; margin-top: 40px; color: var(--text-muted); font-size: 12px; letter-spacing: 0.05em;">
      © Consciousness Architecture Lab · JENA CO.
    </div>
  </div>

  <script>
    const questions = [
      { text: "감정이 올라왔을 때\n나는 이미 한참 반응한 뒤에야 “아, 나 지금 화났네” 혹은 “슬프네”라고 깨닫는 경우가 있다.", category: "emotion" },
      { text: "특정 감정이 올라오면\n나는 그 감정에 완전히 잠식되어 다른 생각이 잘 떠오르지 않는 상태가 된다.", category: "emotion" },
      { text: "어떤 상황이 오면\n생각하기도 전에 가슴이 답답해지거나 몸이 먼저 긴장하는 반응이 튀어나온다.", category: "emotion" },
      { text: "불편한 감정이 올라오면\n나는 그것을 느끼기보다 이미 휴대폰이나 다른 자극으로 도망가고 있는 경우가 있다.", category: "emotion" },
      { text: "지금 일보다\n과거의 비슷한 기억이나 상처가 자동으로 떠오르면서 감정이 더 커지는 경우가 있다.", category: "emotion" },
      { text: "감정이 지나간 뒤에\n“내가 왜 그렇게까지 했지?”라는 생각이 들며 마치 정신이 들 듯한 순간이 있다.", category: "emotion" },
      { text: "상대의 말을 들을 때\n끝까지 듣기 전에 이미 내 대답이나 반박이 튀어나오는 경우가 있다.", category: "relation" },
      { text: "갈등이 생기면\n나는 내 상태를 보기 전에 이미 “상대가 문제야”라고 판단하고 있는 경우가 있다.", category: "relation" },
      { text: "누군가의 표정이나 말투 하나에\n내 기분이 쉽게 흔들리고 그 여파가 오래 가는 경우가 있다.", category: "relation" },
      { text: "인정받고 싶은 순간이 오면\n나는 이미 눈치를 보거나 나를 맞추고 있는 행동을 하고 있는 경우가 있다.", category: "relation" },
      { text: "비교가 시작되는 순간\n나는 선택의 여지 없이 바로 위축되거나 감정이 흔들린다.", category: "relation" },
      { text: "비슷한 관계나 상황에서\n“이번엔 다르게 해야지” 하면서도 결국 같은 방식으로 반응하는 경우가 있다.", category: "relation" },
      { text: "불안하거나 초조할 때\n나는 멈추기보다 평소보다 더 급하게 결정하고 움직이는 경우가 있다.", category: "choice" },
      { text: "일이 내 뜻대로 안 될 때\n나는 내려놓기보다 이미 조급해져서 상황을 억지로 바꾸려 하는 경우가 있다.", category: "choice" },
      { text: "내가 선택했다고 생각했지만\n돌이켜보면 비난받기 싫어서, 혹은 손해 보기 싫어서 그냥 따른 경우가 있다.", category: "choice" },
      { text: "실수하거나 틀릴까 봐\n나는 시도하기 전에 이미 긴장하고 위축되어 포기 쪽을 선택하는 경우가 있다.", category: "choice" },
      { text: "멈추고 싶다는 생각이 들어도\n나는 이미 익숙한 습관이나 반응 흐름에 끌려 계속 움직이고 있는 경우가 있다.", category: "choice" },
      { text: "지금 이 순간에도\n내가 선택하고 있는지, 반응하고 있는지 헷갈릴 때가 있다.", category: "choice" }
    ];

    let currentIndex = 0;
    let totalYes = 0;
    const categoryScores = { emotion: 0, relation: 0, choice: 0 };

    const qNum = document.getElementById("questionNumber");
    const qText = document.getElementById("questionText");
    const progText = document.getElementById("progressText");
    const scoreText = document.getElementById("scoreText");
    const progFill = document.getElementById("progressFill");
    const qView = document.getElementById("questionView");

    function render() {
      const q = questions[currentIndex];
      qNum.textContent = `STEP ${String(currentIndex + 1).padStart(2, '0')}`;
      qText.textContent = q.text;
      progText.textContent = `${currentIndex + 1} / ${questions.length}`;
      scoreText.textContent = `반응 발견 ${totalYes}회`;
      progFill.style.width = `${((currentIndex + 1) / questions.length) * 100}%`;
    }

    function handleAnswer(isYes) {
      if (isYes) {
        totalYes++;
        categoryScores[questions[currentIndex].category]++;
      }
      currentIndex++;
      if (currentIndex >= questions.length) {
        showComplete();
      } else {
        render();
      }
    }

    function showComplete() {
      const params = new URLSearchParams({
        score: totalYes,
        total: questions.length,
        emotion: categoryScores.emotion,
        relation: categoryScores.relation,
        choice: categoryScores.choice
      });

      qView.innerHTML = `
        <div class="question-card" style="min-height: auto;">
          <p class="question-number">COMPLETE</p>
          <h2>모든 문항 체크가 완료되었습니다.</h2>
          <p style="color: var(--text-muted); margin-top: 15px;">당신의 무의식 속에 숨겨진<br>자동반응 구조를 분석합니다.</p>
          <div class="score-badge">자동반응 총 ${totalYes}회 발견</div>
        </div>
        <a href="report.html?${params.toString()}" class="btn-result">분석 결과 확인하기</a>
      `;
    }

    document.getElementById("yesButton").onclick = () => handleAnswer(true);
    document.getElementById("noButton").onclick = () => handleAnswer(false);

    render();
  </script>
</body>
</html>
