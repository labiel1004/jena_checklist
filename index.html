<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta property="og:title" content="나는 지금 반응 중인가, 선택 중인가?" />
  <meta property="og:description" content="선택하며 살고 있는지, 반응에 끌려가고 있는지 확인하세요." />
  <meta property="og:image" content="https://labiel1004.github.io/jena_checklist/thumbnail.png" />
  <meta property="og:url" content="https://labiel1004.github.io/jena_checklist/" />
  <meta property="og:type" content="website" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>나는 지금 반응 중인가, 선택 중인가?</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-1: #f5efe7;
      --bg-2: #eee4d6;
      --panel: rgba(255, 250, 244, 0.82);
      --panel-strong: #fffaf4;
      --soft: #f7f0e7;
      --line: rgba(114, 92, 68, 0.14);
      --line-strong: rgba(91, 73, 54, 0.18);
      --text: #1f1d1a;
      --muted: #6a655e;
      --muted-2: #8a847b;
      --green: #224f42;
      --green-deep: #17382f;
      --gold: #b88a4a;
      --gold-soft: #e8d4b6;
      --shadow: 0 24px 70px rgba(74, 56, 39, 0.12);
      --shadow-soft: 0 12px 30px rgba(74, 56, 39, 0.08);
      --radius-xl: 32px;
      --radius-lg: 24px;
      --radius-md: 18px;
      --radius-sm: 14px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: "Noto Sans KR", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.7) 0%, rgba(255,255,255,0) 30%),
        radial-gradient(circle at 85% 12%, rgba(184, 138, 74, 0.10) 0%, rgba(184, 138, 74, 0) 24%),
        radial-gradient(circle at 20% 80%, rgba(34, 79, 66, 0.08) 0%, rgba(34, 79, 66, 0) 26%),
        linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 100%);
      letter-spacing: -0.02em;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,0.06), rgba(255,255,255,0.06)),
        radial-gradient(rgba(255,255,255,0.18) 0.6px, transparent 0.8px);
      background-size: auto, 18px 18px;
      mix-blend-mode: soft-light;
      opacity: 0.35;
    }

    .app-shell {
      width: 100%;
      padding: 30px 18px 56px;
      display: flex;
      justify-content: center;
    }

    .card {
      width: min(100%, 760px);
      position: relative;
      overflow: hidden;
      border-radius: var(--radius-xl);
      background: linear-gradient(180deg, rgba(255,255,255,0.82) 0%, rgba(255,250,244,0.9) 100%);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.45) 0%, rgba(255,255,255,0.06) 40%, rgba(255,255,255,0.18) 100%);
      opacity: 0.8;
    }

    .card::after {
      content: "";
      position: absolute;
      top: 0;
      left: 36px;
      right: 36px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(184, 138, 74, 0.55), transparent);
      z-index: 1;
    }

    #app {
      padding: 34px 24px 24px;
    }

    .hero,
    .progress-panel,
    .question-view {
      position: relative;
      z-index: 2;
    }

    .hero {
      padding: 6px 4px 18px;
    }

    .eyebrow-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 14px;
      border-radius: 999px;
      background: rgba(255, 248, 238, 0.86);
      border: 1px solid rgba(184, 138, 74, 0.22);
      color: var(--green);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      box-shadow: 0 6px 18px rgba(94, 72, 42, 0.06);
    }

    .eyebrow-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: linear-gradient(180deg, #c79b5d 0%, #9f743a 100%);
      box-shadow: 0 0 0 4px rgba(184, 138, 74, 0.12);
    }

    .hero h1 {
      margin: 0;
      padding: 28px 28px 26px;
      border-radius: 28px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.72) 0%, rgba(249,242,232,0.95) 100%);
      border: 1px solid var(--line);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.7);
      color: var(--text);
      line-height: 1.2;
      letter-spacing: -0.05em;
    }

    .headline-kicker {
      display: block;
      margin-bottom: 10px;
      color: var(--muted-2);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .headline-main {
      display: block;
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(34px, 5vw, 54px);
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--green-deep);
    }

    .headline-sub {
      display: block;
      margin-top: 8px;
      font-size: clamp(24px, 4vw, 34px);
      font-weight: 800;
      line-height: 1.32;
      letter-spacing: -0.055em;
    }

    .hero .description {
      margin: 24px 6px 0;
      color: var(--muted);
      font-size: 16px;
      font-weight: 500;
      line-height: 1.95;
      letter-spacing: -0.03em;
    }

    .intro-strong {
      color: var(--text);
      font-weight: 800;
    }

    .intro-accent {
      color: var(--green);
      font-weight: 800;
    }

    .intro-divider {
      width: 72px;
      height: 1px;
      margin: 22px 0 0 6px;
      background: linear-gradient(90deg, rgba(184,138,74,0.65), rgba(184,138,74,0.08));
    }

    .progress-panel {
      margin-top: 18px;
      padding: 18px 18px 16px;
      border-radius: 22px;
      background: rgba(255, 252, 247, 0.7);
      border: 1px solid var(--line);
      box-shadow: var(--shadow-soft);
    }

    .progress-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .progress-copy {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .progress-step {
      color: var(--text);
      font-size: 15px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .progress-score {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    .progress-chip {
      flex-shrink: 0;
      padding: 8px 12px;
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(34,79,66,0.10) 0%, rgba(34,79,66,0.06) 100%);
      color: var(--green);
      border: 1px solid rgba(34,79,66,0.12);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.04em;
    }

    .progress-track {
      position: relative;
      width: 100%;
      height: 10px;
      border-radius: 999px;
      overflow: hidden;
      background: linear-gradient(90deg, rgba(224,212,197,0.9) 0%, rgba(239,230,220,0.9) 100%);
      box-shadow: inset 0 1px 2px rgba(92, 67, 42, 0.06);
    }

    .progress-fill {
      width: 0;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #214f42 0%, #2f6857 55%, #b88a4a 100%);
      box-shadow: 0 6px 18px rgba(34, 79, 66, 0.28);
      transition: width 0.4s ease;
    }

    .question-view {
      margin-top: 18px;
    }

    .question-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
      padding: 0 4px;
      flex-wrap: wrap;
    }

    .question-number {
      color: var(--green);
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .question-category {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255, 249, 240, 0.88);
      border: 1px solid rgba(184, 138, 74, 0.22);
      color: #8a6535;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.04em;
    }

    .question-card {
      position: relative;
      overflow: hidden;
      padding: 30px 24px;
      border-radius: 28px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.78) 0%, rgba(250,244,236,0.96) 100%);
      border: 1px solid var(--line-strong);
      box-shadow: var(--shadow-soft);
      min-height: 240px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .question-card::before {
      content: "“";
      position: absolute;
      top: 8px;
      left: 18px;
      font-family: "Cormorant Garamond", serif;
      font-size: 88px;
      line-height: 1;
      color: rgba(184, 138, 74, 0.12);
    }

    .question-card h2 {
      position: relative;
      margin: 0;
      white-space: pre-line;
      color: var(--text);
      font-size: clamp(20px, 3vw, 28px);
      font-weight: 500;
      line-height: 1.92;
      letter-spacing: -0.04em;
    }

    .question-subcopy {
      margin-top: 18px;
      color: var(--muted-2);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    .answer-group {
      margin-top: 16px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .answer-button {
      position: relative;
      overflow: hidden;
      min-height: 64px;
      border: 0;
      border-radius: 20px;
      padding: 18px 20px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 800;
      letter-spacing: -0.03em;
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    }

    .answer-button::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.26), rgba(255,255,255,0));
      opacity: 0.8;
      pointer-events: none;
    }

    .answer-button:hover {
      transform: translateY(-2px);
    }

    .answer-button:active {
      transform: translateY(0);
    }

    .answer-button:focus-visible {
      outline: 3px solid rgba(184, 138, 74, 0.35);
      outline-offset: 3px;
    }

    .answer-button.yes {
      background: linear-gradient(135deg, #1f4b3f 0%, #295d4f 65%, #376f5f 100%);
      color: #fff;
      box-shadow: 0 14px 28px rgba(31, 75, 63, 0.24);
    }

    .answer-button.no {
      background: linear-gradient(180deg, #f7efe3 0%, #f0e4d3 100%);
      color: var(--green-deep);
      border: 1px solid rgba(130, 104, 73, 0.14);
      box-shadow: 0 10px 24px rgba(114, 88, 59, 0.08);
    }

    .answer-caption {
      display: block;
      margin-top: 5px;
      font-size: 12px;
      font-weight: 700;
      opacity: 0.82;
      letter-spacing: -0.01em;
    }

    .score-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 18px;
      padding: 10px 15px;
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(184,138,74,0.14), rgba(184,138,74,0.08));
      color: #7d5b30;
      border: 1px solid rgba(184,138,74,0.2);
      font-size: 14px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .result-summary {
      margin-top: 16px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.85;
      font-weight: 500;
    }

    .breakdown-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-top: 18px;
    }

    .breakdown-card {
      padding: 16px 14px;
      border-radius: 20px;
      background: rgba(255, 251, 246, 0.84);
      border: 1px solid var(--line);
      text-align: left;
    }

    .breakdown-label {
      display: block;
      color: var(--muted-2);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.05em;
      margin-bottom: 10px;
    }

    .breakdown-value {
      display: block;
      color: var(--green-deep);
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -0.04em;
    }

    .breakdown-unit {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      margin-left: 3px;
    }

    .cta-wrap {
      margin-top: 22px;
      display: grid;
      gap: 12px;
    }

    .cta-button {
      display: block;
      width: 100%;
      padding: 18px 20px;
      border-radius: 20px;
      text-align: center;
      text-decoration: none;
      font-size: 16px;
      font-weight: 800;
      line-height: 1.5;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, #1f4b3f 0%, #2c6152 60%, #b88a4a 130%);
      color: #fff;
      box-shadow: 0 16px 32px rgba(34, 79, 66, 0.22);
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    .cta-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 18px 36px rgba(34, 79, 66, 0.26);
    }

    .footer-note {
      margin-top: 12px;
      color: var(--muted-2);
      font-size: 12px;
      text-align: center;
      line-height: 1.7;
    }

    .fade-up {
      animation: fadeUp 0.38s ease;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 640px) {
      #app {
        padding: 22px 16px 18px;
      }

      .hero h1 {
        padding: 22px 20px 20px;
        border-radius: 24px;
      }

      .hero .description {
        margin-top: 20px;
        font-size: 15px;
        line-height: 1.88;
      }

      .progress-panel {
        padding: 16px 14px 14px;
        border-radius: 18px;
      }

      .progress-top {
        align-items: flex-start;
        flex-direction: column;
      }

      .question-card {
        padding: 26px 18px;
        min-height: 220px;
        border-radius: 24px;
      }

      .question-card::before {
        font-size: 70px;
        top: 10px;
        left: 14px;
      }

      .question-card h2 {
        font-size: 19px;
        line-height: 1.85;
      }

      .answer-group {
        grid-template-columns: 1fr;
      }

      .breakdown-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        animation: none !important;
        transition: none !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>

<body>
  <main class="app-shell">
    <section class="card" id="app">
      <header class="hero">
        <div class="eyebrow-wrap">
          <p class="eyebrow">
            <span class="eyebrow-dot"></span>
            의식OS 체크리스트
          </p>
        </div>

        <h1>
          <span class="headline-kicker">Self-awareness Checklist</span>
          <span class="headline-main">Reaction or Choice</span>
          <span class="headline-sub">나는 지금 반응 중인가, 선택 중인가?</span>
        </h1>

        <p class="description">
          당신은 지금<br>
          <span class="intro-strong">선택하며 살고 있습니까,</span><br>
          아니면 <span class="intro-accent">반응에 끌려가고 있습니까.</span><br><br>

          이 체크리스트는 그 차이를<br>
          조용하지만 선명하게 드러냅니다.<br><br>

          생각으로 분석하기보다,<br>
          <span class="intro-strong">실제로 떠오르는 장면</span>에 따라 선택해 주세요.
        </p>

        <div class="intro-divider" aria-hidden="true"></div>
      </header>

      <section class="progress-panel" aria-label="진행 상태">
        <div class="progress-top">
          <div class="progress-copy">
            <span class="progress-step" id="progressText">01 / 18</span>
            <span class="progress-score" id="scoreText">반응 포착 0회</span>
          </div>
          <span class="progress-chip" id="currentCategoryChip">감정 반응</span>
        </div>

        <div class="progress-track" aria-hidden="true">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </section>

      <section id="questionView" class="question-view fade-up">
        <div class="question-meta">
          <p class="question-number" id="questionNumber">QUESTION 01</p>
          <span class="question-category" id="questionCategory">감정 반응</span>
        </div>

        <div class="question-card">
          <h2 id="questionText"></h2>
          <p class="question-subcopy">정답은 없습니다. 지금의 패턴을 있는 그대로 확인해 보세요.</p>
        </div>

        <div class="answer-group">
          <button class="answer-button yes" id="yesButton" type="button">
            해당된다
            <span class="answer-caption">익숙한 자동반응이 보인다</span>
          </button>
          <button class="answer-button no" id="noButton" type="button">
            해당 없음
            <span class="answer-caption">지금의 나와는 거리가 있다</span>
          </button>
        </div>
      </section>
    </section>
  </main>

  <script>
    const questions = [
      { text: "감정이 올라왔을 때\n나는 이미 한참 반응한 뒤에야 “아, 나 지금 화났네” 혹은 “슬프네”라고 깨닫는 경우가 있다.", category: "emotion" },
      { text: "특정 감정이 올라오면\n나는 그 감정에 완전히 잠식되어 다른 생각이 잘 떠오르지 않는 상태가 된다.", category: "emotion" },
      { text: "어떤 상황이 오면\n생각하기도 전에 가슴이 답답해지거나 몸이 먼저 긴장하는 반응이 튀어나온다.", category: "emotion" },
      { text: "불편한 감정이 올라오면\n나는 그것을 느끼기보다 이미 휴대폰이나 다른 자극으로 도망가고 있는 경우가 있다.", category: "emotion" },
      { text: "지금 일보다\n과거의 비슷한 기억이나 상처가 자동으로 떠오르면서 감정이 더 커지는 경우가 있다.", category: "emotion" },
      { text: "감정이 지나간 뒤에\n“내가 왜 그렇게까지 했지?”라는 생각이 들며 마치 정신이 들 듯한 순간이 있다.", category: "emotion" },
      { text: "상대의 말을 들을 때\n끝까지 듣기 전에 이미 내 대답이나 반박이 튀어나오는 경우가 있다.", category: "relation" },
      { text: "갈등이 생기면\n나는 내 상태를 보기 전에 이미 “상대가 문제야”라고 판단하고 있는 경우가 있다.", category: "relation" },
      { text: "누군가의 표정이나 말투 하나에\n내 기분이 쉽게 흔들리고 그 여파가 오래 가는 경우가 있다.", category: "relation" },
      { text: "인정받고 싶은 순간이 오면\n나는 이미 눈치를 보거나 나를 맞추고 있는 행동을 하고 있는 경우가 있다.", category: "relation" },
      { text: "비교가 시작되는 순간\n나는 선택의 여지 없이 바로 위축되거나 감정이 흔들린다.", category: "relation" },
      { text: "비슷한 관계나 상황에서\n“이번엔 다르게 해야지” 하면서도 결국 같은 방식으로 반응하는 경우가 있다.", category: "relation" },
      { text: "불안하거나 초조할 때\n나는 멈추기보다 평소보다 더 급하게 결정하고 움직이는 경우가 있다.", category: "choice" },
      { text: "일이 내 뜻대로 안 될 때\n나는 내려놓기보다 이미 조급해져서 상황을 억지로 바꾸려 하는 경우가 있다.", category: "choice" },
      { text: "내가 선택했다고 생각했지만\n돌이켜보면 비난받기 싫어서, 혹은 손해 보기 싫어서 그냥 따른 경우가 있다.", category: "choice" },
      { text: "실수하거나 틀릴까 봐\n나는 시도하기 전에 이미 긴장하고 위축되어 포기 쪽을 선택하는 경우가 있다.", category: "choice" },
      { text: "멈추고 싶다는 생각이 들어도\n나는 이미 익숙한 습관이나 반응 흐름에 끌려 계속 움직이고 있는 경우가 있다.", category: "choice" },
      { text: "지금 이 순간에도\n내가 선택하고 있는지, 반응하고 있는지 헷갈릴 때가 있다.", category: "choice" }
    ];

    const categoryLabels = {
      emotion: "감정 반응",
      relation: "관계 반응",
      choice: "선택 패턴"
    };

    let currentIndex = 0;
    let totalYes = 0;

    const categoryScores = {
      emotion: 0,
      relation: 0,
      choice: 0
    };

    const questionNumber = document.getElementById("questionNumber");
    const questionText = document.getElementById("questionText");
    const progressText = document.getElementById("progressText");
    const scoreText = document.getElementById("scoreText");
    const progressFill = document.getElementById("progressFill");
    const yesButton = document.getElementById("yesButton");
    const noButton = document.getElementById("noButton");
    const questionView = document.getElementById("questionView");
    const questionCategory = document.getElementById("questionCategory");
    const currentCategoryChip = document.getElementById("currentCategoryChip");

    function pad(num) {
      return String(num).padStart(2, "0");
    }

    function animateView() {
      questionView.classList.remove("fade-up");
      void questionView.offsetWidth;
      questionView.classList.add("fade-up");
    }

    function renderQuestion() {
      const current = questions[currentIndex];
      const ratio = ((currentIndex + 1) / questions.length) * 100;
      const categoryLabel = categoryLabels[current.category];

      questionNumber.textContent = `QUESTION ${pad(currentIndex + 1)}`;
      questionText.textContent = current.text;
      questionCategory.textContent = categoryLabel;
      currentCategoryChip.textContent = categoryLabel;
      progressText.textContent = `${pad(currentIndex + 1)} / ${questions.length}`;
      scoreText.textContent = `반응 포착 ${totalYes}회`;
      progressFill.style.width = `${ratio}%`;

      animateView();
    }

    function answer(isYes) {
      if (isYes) {
        totalYes++;
        categoryScores[questions[currentIndex].category]++;
      }

      currentIndex++;

      if (currentIndex >= questions.length) {
        showResult();
      } else {
        renderQuestion();
      }
    }

    function getResultMessage(score) {
      if (score <= 5) {
        return "현재는 자동반응에 완전히 끌려가기보다, 어느 정도 선택의 감각을 유지하고 있는 상태에 가깝습니다.";
      }
      if (score <= 11) {
        return "선택과 반응이 함께 작동하고 있는 구간입니다. 특정 상황에서는 의식적으로 선택하지만, 익숙한 장면에서는 자동반응이 먼저 나타날 수 있습니다.";
      }
      return "지금은 자동반응의 패턴이 비교적 강하게 작동하고 있을 가능성이 큽니다. 특히 감정, 관계, 결정의 순간에 반응이 선택보다 먼저 움직일 수 있습니다.";
    }

    function showResult() {
      progressText.textContent = `${questions.length} / ${questions.length}`;
      scoreText.textContent = `반응 포착 ${totalYes}회`;
      currentCategoryChip.textContent = "체크 완료";
      progressFill.style.width = "100%";

      const params = new URLSearchParams({
        score: totalYes,
        total: questions.length,
        emotion: categoryScores.emotion,
        relation: categoryScores.relation,
        choice: categoryScores.choice
      });

      const summary = getResultMessage(totalYes);

      questionView.innerHTML = `
        <div class="question-meta">
          <p class="question-number">COMPLETE</p>
          <span class="question-category">결과 준비 완료</span>
        </div>

        <div class="question-card">
          <h2>선택 vs 반응 체크가 완료되었습니다.\n이제 당신의 현재 반응 구조를 확인해 보세요.</h2>

          <div class="score-badge">
            자동반응 포착 ${totalYes}회
          </div>

          <p class="result-summary">${summary}</p>

          <div class="breakdown-grid">
            <div class="breakdown-card">
              <span class="breakdown-label">감정 반응</span>
              <span class="breakdown-value">${categoryScores.emotion}<span class="breakdown-unit">회</span></span>
            </div>
            <div class="breakdown-card">
              <span class="breakdown-label">관계 반응</span>
              <span class="breakdown-value">${categoryScores.relation}<span class="breakdown-unit">회</span></span>
            </div>
            <div class="breakdown-card">
              <span class="breakdown-label">선택 패턴</span>
              <span class="breakdown-value">${categoryScores.choice}<span class="breakdown-unit">회</span></span>
            </div>
          </div>
        </div>

        <div class="cta-wrap">
          <a href="report.html?${params.toString()}" class="cta-button">
            기본 결과 확인하기
          </a>
          <p class="footer-note">현재 점수와 카테고리별 결과가 함께 전달됩니다.</p>
        </div>
      `;

      animateView();
    }

    yesButton.addEventListener("click", () => answer(true));
    noButton.addEventListener("click", () => answer(false));

    renderQuestion();
  </script>
</body>
</html>
