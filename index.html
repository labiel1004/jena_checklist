<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta property="og:title" content="나는 지금 반응 중인가, 선택 중인가?" />
  <meta property="og:description" content="선택하며 살고 있는지, 반응에 끌려가고 있는지 확인하세요." />
  <meta property="og:image" content="https://labiel1004.github.io/jena_checklist/thumbnail.png" />
  <meta property="og:url" content="https://labiel1004.github.io/jena_checklist/" />
  <meta property="og:type" content="website" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>나는 지금 반응 중인가, 선택 중인가?</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">

 <style>
  :root {
    --bg: #f3eee6;
    --card: #fffdf8;
    --card-soft: #f8f3ea;
    --line: #e4d8c8;
    --text: #20251f;
    --muted: #5f675f;
    --green: #1f5f49;
    --green-dark: #153f32;
    --brown: #4f3d2e;
    --brown-soft: #eee5d8;
  }

  body {
    background: var(--bg);
  }

  .app-shell {
    padding-top: 12px;
    padding-bottom: 48px;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--line);
    box-shadow: 0 22px 54px rgba(79, 61, 46, 0.08);
  }

  .hero {
    padding-top: 4px;
  }

  .hero .eyebrow {
    margin-bottom: 14px;
    color: var(--green);
    font-size: 14px;
    font-weight: 800;
    letter-spacing: 0.02em;
  }

  .hero h1 {
    display: block;
    padding: 22px 22px;
    border-radius: 28px;
    background: var(--card-soft);
    border: 1px solid var(--line);
    color: var(--text);
    font-size: 30px;
    font-weight: 800;
    line-height: 1.38;
    letter-spacing: -0.055em;
  }

  .hero .description {
    margin-top: 26px;
    font-size: 16px;
    line-height: 1.85;
    color: var(--muted);
    font-weight: 500;
    letter-spacing: -0.035em;
  }

  .intro-strong {
    color: var(--text);
    font-weight: 800;
  }

  .progress-panel {
    background: var(--card);
    border: 1px solid var(--line);
    box-shadow: none;
  }

  .progress-copy {
    color: var(--muted);
    font-size: 14px;
    font-weight: 700;
    letter-spacing: -0.02em;
  }

  .progress-track {
    background: #e8dfd3;
  }

  .progress-fill {
    background: var(--green);
  }

  .question-card {
    background: var(--card);
    border: 1px solid var(--line);
    box-shadow: none;
  }

  .question-number {
    color: var(--green);
    font-size: 14px;
    font-weight: 800;
    letter-spacing: 0.01em;
  }

  .question-card h2 {
    white-space: pre-line;
    color: var(--text);
    font-size: 18px;
    font-weight: 500;
    line-height: 1.88;
    letter-spacing: -0.035em;
  }

  .answer-button {
    font-size: 16px;
    font-weight: 800;
    letter-spacing: -0.03em;
  }

  .answer-button.yes {
    background: var(--green);
    color: #fff;
    box-shadow: 0 12px 24px rgba(31, 95, 73, 0.18);
  }

  .answer-button.no {
    background: var(--brown-soft);
    color: var(--brown);
    border: 1px solid #dfd1c0;
  }

  .result-box {
    margin-top: 22px;
    padding: 28px 24px;
    border-radius: 28px;
    background: var(--card);
    border: 1px solid var(--line);
    box-shadow: none;
  }

  .result-box.soft {
    background: var(--card-soft);
    border: 1px solid var(--line);
  }

  .result-title {
    margin: 0 0 16px;
    color: var(--text);
    font-size: 21px;
    font-weight: 800;
    line-height: 1.5;
    letter-spacing: -0.045em;
  }

  .result-box p {
    margin: 0 0 14px;
    color: var(--muted);
    font-size: 16px;
    font-weight: 500;
    line-height: 1.82;
    letter-spacing: -0.035em;
  }

  .score-badge {
    display: inline-block;
    margin-top: 18px;
    padding: 9px 15px;
    border-radius: 999px;
    background: var(--brown-soft);
    color: var(--brown);
    font-size: 14px;
    font-weight: 800;
    letter-spacing: -0.03em;
  }

  .highlight-line {
    display: block;
    margin: 8px 0 16px;
    padding: 14px 16px;
    border-radius: 18px;
    background: #eef4ef;
    border-left: 4px solid var(--green);
    color: var(--green-dark) !important;
    font-weight: 800 !important;
  }

  .cta-wrap {
    margin-top: 30px;
    display: grid;
    gap: 12px;
  }

  .cta-button {
    display: block;
    width: 100%;
    box-sizing: border-box;
    padding: 18px 18px;
    border-radius: 18px;
    text-align: center;
    text-decoration: none;
    font-size: 16px;
    font-weight: 800;
    line-height: 1.5;
    letter-spacing: -0.035em;
  }

  .cta-primary {
    background: var(--brown);
    color: #fff;
    box-shadow: 0 14px 28px rgba(79, 61, 46, 0.22);
  }

  .cta-secondary {
    background: var(--card);
    color: var(--muted);
    border: 1px solid var(--line);
  }

  @media (max-width: 520px) {
    .app-shell {
      padding-top: 10px;
    }

    .hero h1 {
      font-size: 28px;
      padding: 20px 20px;
      border-radius: 26px;
    }

    .hero .description {
      font-size: 15.8px;
    }

    .question-card h2 {
      font-size: 18px;
    }

    .result-title {
      font-size: 20px;
    }

    .result-box p {
      font-size: 15.8px;
    }
  }
</style>
  
</head>

<body>
  <main class="app-shell">
    <section class="card" id="app">
      <header class="hero">
        <p class="eyebrow">의식OS 체크리스트</p>
        <h1>나는 지금 반응 중인가, 선택 중인가?</h1>

        <p class="description">
          당신은 지금<br>
          <span class="intro-strong">선택하며 살고 있습니까,</span><br>
          아니면 반응에 끌려가고 있습니까.<br><br>

          이 체크리스트는<br>
          그 차이를 명확하게 드러냅니다.<br><br>

          생각으로 판단하지 말고,<br>
          떠오르는 장면이 있다면 체크해 주세요.
        </p>
      </header>

      <section class="progress-panel" aria-label="진행 상태">
        <div class="progress-copy">
          <span id="progressText">1 / 18</span>
          <span id="scoreText">체크 0개</span>
        </div>
        <div class="progress-track" aria-hidden="true">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </section>

      <section id="questionView" class="question-view">
        <div class="question-card">
          <p class="question-number" id="questionNumber">문항 1</p>
          <h2 id="questionText"></h2>
        </div>

        <div class="answer-group">
          <button class="answer-button yes" id="yesButton" type="button">체크</button>
          <button class="answer-button no" id="noButton" type="button">해당 없음</button>
        </div>
      </section>
    </section>
  </main>

  <script>
    const questions = [
      { text: "감정이 올라왔을 때\n나는 이미 한참 반응한 뒤에야 “아, 나 지금 화났네” 혹은 “슬프네”라고 깨닫는 경우가 있다.", category: "emotion" },
      { text: "특정 감정이 올라오면\n나는 그 감정에 완전히 잠식되어 다른 생각이 잘 떠오르지 않는 상태가 된다.", category: "emotion" },
      { text: "어떤 상황이 오면\n생각하기도 전에 가슴이 답답해지거나 몸이 먼저 긴장하는 반응이 튀어나온다.", category: "emotion" },
      { text: "불편한 감정이 올라오면\n나는 그것을 느끼기보다 이미 휴대폰이나 다른 자극으로 도망가고 있는 경우가 있다.", category: "emotion" },
      { text: "지금 일보다\n과거의 비슷한 기억이나 상처가 자동으로 떠오르면서 감정이 더 커지는 경우가 있다.", category: "emotion" },
      { text: "감정이 지나간 뒤에\n“내가 왜 그렇게까지 했지?”라는 생각이 들며 마치 정신이 들 듯한 순간이 있다.", category: "emotion" },
      { text: "상대의 말을 들을 때\n끝까지 듣기 전에 이미 내 대답이나 반박이 튀어나오는 경우가 있다.", category: "relation" },
      { text: "갈등이 생기면\n나는 내 상태를 보기 전에 이미 “상대가 문제야”라고 판단하고 있는 경우가 있다.", category: "relation" },
      { text: "누군가의 표정이나 말투 하나에\n내 기분이 쉽게 흔들리고 그 여파가 오래 가는 경우가 있다.", category: "relation" },
      { text: "인정받고 싶은 순간이 오면\n나는 이미 눈치를 보거나 나를 맞추고 있는 행동을 하고 있는 경우가 있다.", category: "relation" },
      { text: "비교가 시작되는 순간\n나는 선택의 여지 없이 바로 위축되거나 감정이 흔들린다.", category: "relation" },
      { text: "비슷한 관계나 상황에서\n“이번엔 다르게 해야지” 하면서도 결국 같은 방식으로 반응하는 경우가 있다.", category: "relation" },
      { text: "불안하거나 초조할 때\n나는 멈추기보다 평소보다 더 급하게 결정하고 움직이는 경우가 있다.", category: "choice" },
      { text: "일이 내 뜻대로 안 될 때\n나는 내려놓기보다 이미 조급해져서 상황을 억지로 바꾸려 하는 경우가 있다.", category: "choice" },
      { text: "내가 선택했다고 생각했지만\n돌이켜보면 비난받기 싫어서, 혹은 손해 보기 싫어서 그냥 따른 경우가 있다.", category: "choice" },
      { text: "실수하거나 틀릴까 봐\n나는 시도하기 전에 이미 긴장하고 위축되어 포기 쪽을 선택하는 경우가 있다.", category: "choice" },
      { text: "멈추고 싶다는 생각이 들어도\n나는 이미 익숙한 습관이나 반응 흐름에 끌려 계속 움직이고 있는 경우가 있다.", category: "choice" },
      { text: "지금 이 순간에도\n내가 선택하고 있는지, 반응하고 있는지 헷갈릴 때가 있다.", category: "choice" }
    ];

    let currentIndex = 0;
    let totalYes = 0;

    const categoryScores = {
      emotion: 0,
      relation: 0,
      choice: 0
    };

    const questionNumber = document.getElementById("questionNumber");
    const questionText = document.getElementById("questionText");
    const progressText = document.getElementById("progressText");
    const scoreText = document.getElementById("scoreText");
    const progressFill = document.getElementById("progressFill");
    const yesButton = document.getElementById("yesButton");
    const noButton = document.getElementById("noButton");
    const questionView = document.getElementById("questionView");

    function renderQuestion() {
      questionNumber.textContent = `문항 ${currentIndex + 1}`;
      questionText.textContent = questions[currentIndex].text;
      progressText.textContent = `${currentIndex + 1} / ${questions.length}`;
      scoreText.textContent = `체크 ${totalYes}개`;
      progressFill.style.width = `${((currentIndex + 1) / questions.length) * 100}%`;
    }

    function getOverallStatus(score) {
      if (score <= 5) {
        return {
          title: "부분적 선택 상태",
          text: "당신은 비교적 자신의 반응을 인식하고 선택할 수 있는 상태에 가까워지고 있습니다. 다만 특정 트리거 상황에서는 여전히 자동반응이 개입할 가능성이 있습니다."
        };
      }

      if (score <= 11) {
        return {
          title: "전환 구간",
          text: "당신은 이미 일부 순간에서 자신의 반응을 알아차리고 있습니다. 하지만 중요한 상황에서는 여전히 자동반응이 먼저 작동하는 패턴이 남아 있습니다."
        };
      }

      return {
        title: "자동반응 지배 상태",
        text: "당신은 현재 여러 영역에서 자동반응이 먼저 작동하고 있는 상태입니다. 선택하고 있다고 느끼는 순간에도 이미 반응이 선행된 뒤일 가능성이 높습니다."
      };
    }

    function getDominantType() {
      const entries = Object.entries(categoryScores);
      entries.sort((a, b) => b[1] - a[1]);

      const topKey = entries[0][0];
      const topScore = entries[0][1];

      if (topScore === 0) {
        return {
          title: "뚜렷한 자동반응 영역은 낮음",
          text: "현재 체크 결과만 보면 특정 영역의 자동반응이 강하게 드러나지는 않습니다. 다만 실제 삶에서 반복되는 불편함이 있다면, 그 상황을 기준으로 다시 점검할 필요가 있습니다."
        };
      }

      const typeMap = {
        emotion: {
          title: "감정 자동반응형",
          text: "당신의 반응은 주로 감정이 먼저 올라오고, 그 뒤에 인식이 따라오는 구조에서 시작됩니다. 감정을 느끼는 순간이 아니라 이미 반응이 진행된 뒤에야 알아차리는 패턴이 핵심입니다."
        },
        relation: {
          title: "관계 트리거형",
          text: "당신의 반응은 주로 타인의 말과 행동에 의해 촉발되는 구조입니다. 내 상태보다 상대의 반응이 먼저 기준이 되는 패턴이 반복되고 있습니다."
        },
        choice: {
          title: "선택 착각형",
          text: "당신은 선택하고 있다고 느끼지만, 실제로는 불안, 회피, 손해 회피, 비난 회피 등의 반응에 의해 결정이 이루어지는 구조가 작동하고 있을 수 있습니다."
        }
      };

      return {
        title: typeMap[topKey].title,
        text: typeMap[topKey].text
      };
    }

    function answer(isYes) {
      if (isYes) {
        totalYes++;
        categoryScores[questions[currentIndex].category]++;
      }

      currentIndex++;

      if (currentIndex >= questions.length) {
        showResult();
      } else {
        renderQuestion();
      }
    }

    function showResult() {
      progressText.textContent = `${questions.length} / ${questions.length}`;
  scoreText.textContent = `체크 ${totalYes}개`;
  progressFill.style.width = "100%";

  const status = getOverallStatus(totalYes);
  const dominant = getDominantType();

  const params = new URLSearchParams({
    score: totalYes,
    total: questions.length,
    emotion: categoryScores.emotion,
    relation: categoryScores.relation,
    choice: categoryScores.choice,
    status: status.title,
    type: dominant.title
  });

  questionView.innerHTML = `
    <div class="question-card">
      <p class="question-number">체크 완료</p>
      <h2>
        선택 vs 반응 체크가 완료되었습니다.

        이제 당신의 현재 반응 구조를
        기본 결과에서 확인할 수 있습니다.
      </h2>

      <div class="score-badge">
        총 ${questions.length}개 문항 중 체크 ${totalYes}개
      </div>
    </div>

    <div class="cta-wrap">
      <a href="report.html?${params.toString()}" class="cta-button cta-primary">
        기본 결과 확인하기
      </a>
    </div>
  `;
}
    
    yesButton.addEventListener("click", () => answer(true));
    noButton.addEventListener("click", () => answer(false));

    renderQuestion();
  </script>
</body>
</html>
