<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CAL 의식OS 모바일 리포트</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#06111f;
  --navy2:#091520;
  --gold:#c89734;
  --gold2:#e3b85c;
  --cream:#f5f1e8;
  --paper:#fffdf9;
  --paper2:#f7efe1;
  --line:#eadfce;
  --text:#171717;
  --muted:#5f574e;
  --soft:#4e4841;
}
*{box-sizing:border-box;margin:0;padding:0}
html{background:var(--cream);}
body{
  font-family:'Noto Sans KR',sans-serif;
  background:var(--cream);
  color:var(--text);
  line-height:1.72;
  word-break:keep-all;
  overflow-wrap:break-word;
}
body::before{
  content:"";position:fixed;inset:0;pointer-events:none;
  background:radial-gradient(circle at 10% 0%,rgba(200,151,52,.10),transparent 28%),radial-gradient(circle at 100% 20%,rgba(6,17,31,.08),transparent 32%);
  z-index:-1;
}
.app{width:100%;max-width:430px;margin:0 auto;background:var(--cream);min-height:100vh;}
.cover{
  min-height:100vh;display:flex;flex-direction:column;justify-content:space-between;
  padding:34px 24px 30px;color:#fff;overflow:hidden;position:relative;
  background:radial-gradient(circle at 88% 18%,rgba(225,180,78,.23),transparent 26%),linear-gradient(135deg,#06111f 0%,#07101a 48%,#12120f 100%);
}
.cover::after{content:"";position:absolute;right:-130px;bottom:-100px;width:420px;height:420px;opacity:.34;transform:rotate(-28deg);background:repeating-radial-gradient(ellipse at center,rgba(218,166,56,.34) 0 1px,transparent 2px 18px)}
.kicker{position:relative;z-index:1;font-size:10px;font-weight:900;letter-spacing:.12em;color:var(--gold2);white-space:nowrap;}
.cover-main{position:relative;z-index:1;margin-top:40px}
.cover-title{font-size:42px;line-height:1.12;letter-spacing:-.07em;font-weight:900;margin-bottom:18px}
.cover-sub{font-size:18px;line-height:1.75;color:rgba(255,255,255,.78);font-weight:500}
.cover-info-grid{position:relative;z-index:1;display:grid;gap:10px;margin-top:42px}
.cover-info{padding:16px 18px;border-radius:18px;background:rgba(255,255,255,.055);border:1px solid rgba(255,255,255,.14);backdrop-filter:blur(8px)}
.cover-info-label{font-size:12px;color:#d5b66f;font-weight:800;margin-bottom:4px}.cover-info-value{font-size:18px;color:#fff;font-weight:900;line-height:1.35}
.chapter-bridge{padding:42px 24px 18px;background:linear-gradient(180deg,rgba(245,241,232,0),rgba(245,241,232,1) 45%)}
.bridge-line{height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin-bottom:20px}.bridge-num{font-size:46px;font-weight:900;color:#b98522;line-height:1;letter-spacing:-.05em}.bridge-label{margin-top:7px;font-size:11px;font-weight:900;letter-spacing:.16em;color:#9a6a18;text-transform:uppercase}.bridge-title{margin-top:8px;font-size:25px;font-weight:900;letter-spacing:-.055em;line-height:1.28}.bridge-desc{margin-top:9px;color:#6a5e50;font-size:14px;line-height:1.65}
.section{margin:0 14px 22px;padding:24px 18px 26px;border-radius:26px;background:var(--paper);border:1px solid var(--line);box-shadow:0 10px 28px rgba(80,55,20,.06)}
.section.deep,.section.final{color:#fff;background:radial-gradient(circle at 95% 0%,rgba(215,160,55,.16),transparent 34%),linear-gradient(135deg,var(--navy) 0%,var(--navy2) 100%);border:1px solid rgba(218,178,89,.24)}
.section.final{background:radial-gradient(circle at 12% 18%,rgba(215,160,55,.13),transparent 28%),linear-gradient(135deg,#06080d 0%,#10100d 100%)}
.label{display:inline-flex;align-items:center;gap:8px;margin-bottom:18px;color:#b98522;font-size:11px;font-weight:900;letter-spacing:.16em}.label::before{content:"";width:8px;height:8px;border-radius:50%;background:var(--gold)}
.deep .label,.final .label{color:var(--gold2)}
.inner-card{padding:20px 16px;border-radius:22px;background:rgba(255,255,255,.78);border:1px solid var(--line)}.inner-card+.inner-card{margin-top:16px}.deep .inner-card,.final .inner-card{background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.13)}
.output-item{padding:22px 0;border-bottom:1px solid var(--line)}.output-item:first-of-type{padding-top:0}.output-item:last-child{border-bottom:0;padding-bottom:0}.deep .output-item,.final .output-item{border-bottom:1px solid rgba(255,255,255,.12)}
.icon-circle{width:44px;height:44px;border-radius:50%;background:#f2e8d7;border:1px solid #e5d6c0;display:flex;align-items:center;justify-content:center;color:#b98522;font-size:20px;font-weight:900;margin-bottom:12px}.deep .icon-circle,.final .icon-circle{background:rgba(255,255,255,.07);border-color:rgba(255,255,255,.14);color:#d8ad50}
.item-title,.block-title{font-size:18px;font-weight:900;letter-spacing:-.03em;margin-bottom:8px}.item-text,.block-text{font-size:15px;color:var(--soft);line-height:1.85}.deep .item-text,.deep .block-text,.final .item-text,.final .block-text{color:rgba(255,255,255,.79)}
ul.bullet-list{list-style:none;display:grid;gap:9px}ul.bullet-list li{position:relative;padding-left:16px;color:var(--soft);font-size:14.8px;line-height:1.78}ul.bullet-list li::before{content:"";position:absolute;left:0;top:.75em;width:6px;height:6px;border-radius:50%;background:var(--gold)}.deep ul.bullet-list li,.final ul.bullet-list li{color:rgba(255,255,255,.79)}
.callout{margin-top:16px;padding:18px 16px;border-radius:18px;background:#f4ead9;border:1px solid #e5d3ba}.deep .callout,.final .callout{background:rgba(216,173,80,.08);border:1px solid rgba(216,173,80,.22)}.callout-title{color:#a06d17;font-size:14px;font-weight:900;margin-bottom:6px}.deep .callout-title,.final .callout-title{color:var(--gold2)}.callout-text{font-size:14.8px;line-height:1.8;color:var(--soft)}.deep .callout-text,.final .callout-text{color:rgba(255,255,255,.82)}
.loop-diagram{display:flex;gap:8px;overflow-x:auto;padding:2px 0 14px;margin-bottom:16px;scrollbar-width:none}.loop-diagram::-webkit-scrollbar{display:none}.loop-pill{flex:0 0 auto;min-width:92px;padding:9px 12px;border-radius:999px;background:#f1e7d6;border:1px solid #e2d3bd;font-size:12px;font-weight:900;text-align:center}.loop-arrow{flex:0 0 auto;color:#b98522;font-size:16px;font-weight:900;display:flex;align-items:center}.loop-detail-full{display:grid;gap:12px}.loop-step,.protocol-step,.os-step{display:grid;grid-template-columns:38px 1fr;gap:12px;padding:16px;border-radius:17px;background:var(--paper2);border:1px solid #eadcc7}.loop-step-num,.step-num{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:#1d2632;color:var(--gold2);font-size:13px;font-weight:900}.loop-step h3,.protocol-step h3,.os-body h3{font-size:16px;font-weight:900;margin-bottom:4px;letter-spacing:-.02em}.loop-step p,.protocol-step p,.os-body p{font-size:14.5px;color:var(--soft);line-height:1.75}
.saju-table{width:100%;border-collapse:collapse;margin:8px 0 18px}.saju-table th,.saju-table td{border:1px solid rgba(255,255,255,.14);text-align:center;padding:12px 6px}.saju-table th{color:#d8ad50;font-size:12px;font-weight:900}.saju-table td{color:#fff;font-size:18px;font-weight:900}.sub-title{font-size:15px;color:var(--gold2);font-weight:900;margin:20px 0 12px}.energy-row{display:grid;grid-template-columns:56px 1fr 26px 44px;align-items:center;gap:8px;margin-bottom:10px;color:#fff}.energy-name{font-size:13px;font-weight:900}.energy-bar{height:9px;border-radius:999px;background:rgba(255,255,255,.12);overflow:hidden}.energy-fill{height:100%;border-radius:999px}.wood{background:#5da05a}.fire{background:#d94f3d}.earth{background:#d7a534}.metal{background:#cfd2d4}.water{background:#3478c9}.energy-count,.energy-percent{font-size:12px;font-weight:900;color:rgba(255,255,255,.9);text-align:right}.donut-wrap{display:flex;justify-content:center;align-items:center;margin:22px 0 4px}.donut{width:184px;height:184px;border-radius:50%;position:relative;background:conic-gradient(#5da05a 0deg 36deg,#d94f3d 36deg 72deg,#d7a534 72deg 216deg,#cfd2d4 216deg 252deg,#3478c9 252deg 360deg);box-shadow:0 18px 40px rgba(0,0,0,.22)}.donut::after{content:"";position:absolute;inset:48px;border-radius:50%;background:#07111f;border:1px solid rgba(255,255,255,.12)}.donut-center{position:absolute;inset:0;z-index:1;display:flex;align-items:center;justify-content:center;flex-direction:column}.donut-center small{font-size:12px;font-weight:800;color:rgba(255,255,255,.72)}.donut-center strong{font-size:28px;font-weight:900;color:#fff;line-height:1.1}.deep-mini-card,.admin-card,.resistance-card{padding:18px 16px;border-radius:18px;background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.13);margin-top:12px}.deep-mini-card h3,.admin-card h3{color:var(--gold2);font-size:16px;font-weight:900;margin-bottom:6px}.deep-mini-card p,.admin-card p{color:rgba(255,255,255,.79);font-size:14.5px;line-height:1.78}.resistance-card{background:#f7efe1;border:1px solid #eadcc7}.resistance-card h3{font-size:16px;font-weight:900;color:#a06d17;margin-bottom:6px}.resistance-card p{font-size:14.5px;color:var(--soft);line-height:1.78}
.os-grid{display:grid;gap:12px;margin-top:18px}.os-name{font-size:19px;font-weight:900;color:#a06d17;line-height:1.2}.os-name small{display:block;font-size:11px;margin-top:3px;color:#7b6d5c;font-weight:900}.admin-statement{font-size:19px;line-height:1.72;font-weight:700;letter-spacing:-.035em;color:#fff;margin-bottom:18px}.protocol-list{display:grid;gap:12px}.question-list{margin-top:14px;display:grid;gap:8px}.final-message{font-size:18px;line-height:1.86;font-weight:600;letter-spacing:-.035em;color:#fff}.final-message span{color:var(--gold2);font-weight:800}.footer-note{margin-top:24px;padding-top:18px;border-top:1px solid rgba(255,255,255,.12);font-size:12px;color:rgba(255,255,255,.52);line-height:1.7}
.empty{display:none!important}.spacer-small{height:10px}
@media print{
  @page{size:390px 844px;margin:0}
  html,body{width:390px;background:var(--cream)!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .app{width:390px;max-width:390px}.cover{page-break-after:always}.chapter-bridge{break-before:page}.section{break-inside:avoid;box-shadow:none}.callout,.loop-step,.protocol-step,.os-step,.resistance-card,.admin-card,.deep-mini-card{break-inside:avoid}
}
</style>
</head>
<body>
<div id="app" class="app"></div>
<script>
/*
  CAL 모바일 리포트 마스터 호환형 템플릿
  - 기존 01~08 마스터 구조 유지
  - 기존 JSON 필드가 있으면 자동 렌더링
  - 필드명이 조금 달라도 title/summary/coreLoop/calInsight 등 주요 키를 유연하게 탐색
  - 생성기에서는 아래 CAL_REPORT_DATA 객체만 교체하면 됨
*/
const CAL_REPORT_DATA = {
  clientName:"비타민유",
  reportDate:"2026-05-12",
  reportId:"CAL-20260512-001",
  reportType:"CAL 의식OS 프리미엄 리포트 v1.0",
  mainMessage:"현실은 사건이 아니라 반복 실행된 의식 구조의 출력입니다.",
  section01_realityOutput:{
    title:"현실 출력 구조 요약",
    desc:"현재 삶에서 반복적으로 출력되는 현실 패턴을 확인합니다.",
    realityOutput:"비타민유님의 현실은 ‘증명해야 안전하다’는 자동반응을 중심으로 반복 출력되고 있습니다. 돈과 일의 영역에서 압박이 활성화되며, 능력을 의심받는 순간 빠르게 증명·통제 모드로 전환됩니다.",
    corePatterns:["능력 의심 → 즉각적인 증명 반응","압박 상황 → 계산·통제·과잉 준비","실패 가능성 → 수치심과 자기 공격 활성화","돈 문제 → 존재 가치 검증처럼 해석됨","반복 압박 → 몸의 긴장과 경직으로 출력"],
    coreMessage:"현재 반복되는 현실은 무능함의 증거가 아니라, ‘증명해야 안전하다’는 생존형 의식OS의 출력입니다.",
    calInsight:"경고등은 시스템 이상 신호이지, 존재 자체의 결함을 의미하지 않습니다."
  },
  section02_autoReaction:{
    title:"핵심 자동반응 구조",
    desc:"반복을 만드는 자동반응 루프 전체를 분석합니다.",
    coreLoop:["사건 입력","위협 해석","감정 활성화","신체 긴장","자기 동일시","자동반응 실행","반복 저장","현실 재출력"],
    loopDetails:[
      {title:"사건 입력", text:"돈과 일의 압박 장면, 능력을 의심받는 순간, 실패 가능성이 보이는 상황이 주요 입력으로 작동합니다."},
      {title:"위협 해석", text:"의식OS는 현재 사건을 단순 상황으로 처리하지 않고 위험 신호로 해석합니다."},
      {title:"감정 활성화", text:"압박, 죄책감, 좌절, 답답함이 올라오며 존재와 능력이 검증되는 장면처럼 느껴집니다."},
      {title:"신체 긴장", text:"몸은 가슴 압박과 경직으로 반응하기 시작합니다."},
      {title:"자기 동일시", text:"문제는 ‘내가 처리할 일’을 넘어 ‘내 존재와 능력이 검증되는 장면’으로 바뀝니다."},
      {title:"자동반응 실행", text:"계속 계산하고, 더 준비하고, 통제하고, 혼자 책임지는 방향으로 자동 실행됩니다."},
      {title:"반복 저장", text:"이 반응 결과가 다시 저장되면서 다음 압박 장면에서는 자동반응 속도가 더 빨라집니다."},
      {title:"현실 재출력", text:"현실은 반복 저장된 자동반응 구조를 통해 다시 출력됩니다."}
    ],
    calInsight:"자동반응은 오래된 보안 프로그램처럼 작동합니다. 위험하지 않은 신호에도 생존 방어 모드를 먼저 실행합니다."
  },
  section03_sajuOS:{
    title:"사주OS — 초기 에너지 렌즈",
    desc:"사주는 운명이 아니라 세상을 바라보는 초기 입력 필터입니다.",
    intro:"사주는 운명이 아니라 초기 입력 필터입니다. 사람마다 세상을 바라보는 처음 안경이 다르기 때문에, 관계·안전·책임·일·돈에 대한 민감성이 다르게 형성됩니다. 하지만 안경은 안경일 뿐, 안경을 쓴 주인까지 결정하지는 않습니다.",
    birthChart:{hour:"기사",day:"기묘",month:"임신",year:"기축"},
    elementScores:{wood:1,fire:1,earth:4,metal:1,water:3},
    dominantText:"토(土)의 에너지가 강하게 작동하며 안정, 책임, 버팀, 구조화의 방향이 강조됩니다.",
    miniCards:[
      {title:"순기능", text:"현실을 버티는 힘, 책임감, 지속성, 구조화 능력으로 작동할 수 있습니다."},
      {title:"왜곡 작동", text:"불안과 압박이 결합되면 과잉 책임, 자기검열, 경직으로 과열될 수 있습니다."},
      {title:"렌즈 증폭", text:"현재 자동반응 구조와 결합되면 ‘내가 증명하고 책임져야 안전하다’는 해석을 증폭합니다."},
      {title:"현실 출력 연결", text:"돈과 일의 압박은 존재 가치를 증명해야 하는 장면처럼 출력되기 쉽습니다."}
    ],
    coreMessage:"사주OS는 사람을 결정하는 운명이 아니라, 특정 방향의 민감성을 보여주는 초기 에너지 렌즈입니다.",
    calInsight:"사주는 처음 장착된 안경입니다. 안경은 세상을 특정 색으로 보이게 만들지만, 선택은 여전히 의식하는 자아의 권한입니다."
  },
  section04_consciousnessOS:{
    title:"의식OS 구조 — 인간 의식 사용설명서",
    desc:"인간 의식이 현실을 입력하고 해석하고 저장하는 기본 작동 구조를 확인합니다.",
    intro:"인간 의식은 같은 구조로 작동합니다. 사건이 들어오면 몸과 감각이 먼저 반응하고(5식), 그 반응에는 해석이 붙고(6식), 반복된 감정과 기억은 저장됩니다(8식). 이 과정이 반복되면 사람은 익숙한 반응을 자기 성격처럼 느끼기 시작합니다. 우리는 이것을 동일시(7식)라고 부릅니다. 하지만 인간 안에는 이 흐름을 알아차리고 선택할 수 있는 의식의 자리 또한 존재합니다(9식).",
    osSteps:[
      {name:"5식", sub:"입력 감지", title:"몸과 감각으로 먼저 반응합니다", text:"표정, 말투, 분위기, 압박감 같은 입력은 생각보다 먼저 몸에 들어옵니다."},
      {name:"6식", sub:"해석과 판단", title:"입력에는 의미가 붙습니다", text:"위험하다, 무시당했다, 준비가 부족하다 같은 해석이 여기서 만들어집니다."},
      {name:"7식", sub:"동일시", title:"해석은 자기 자신과 연결됩니다", text:"문제가 생긴 것이 아니라 ‘내가 문제다’처럼 느껴지기 시작합니다."},
      {name:"8식", sub:"저장된 자동패턴", title:"반복된 해석과 감정은 저장됩니다", text:"비슷한 상황이 올 때 자동으로 다시 실행됩니다."},
      {name:"9식", sub:"의식하는 자아", title:"반응과 자신 사이에 공간을 회복합니다", text:"반응을 알아차리고, 반응과 자신 사이에 공간을 회복하는 자리입니다."}

const $ = (v)=> v ?? "";
const arr = (v)=> Array.isArray(v) ? v : (v ? [v] : []);
const esc = (s)=> String(s ?? "").replace(/[&<>"']/g, m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[m]));
const nl = (s)=> esc(s).replace(/\n\n/g,"<br><br>").replace(/\n/g,"<br>");
const li = (items)=> arr(items).map(x=>`<li>${esc(typeof x === 'string' ? x : x.text || x.title || '')}</li>`).join('');
const callout = (title,text)=> text ? `<div class="callout"><div class="callout-title">${esc(title)}</div><div class="callout-text">${nl(text)}</div></div>` : "";
const bridge = (num,title,label,desc)=> `<div class="chapter-bridge"><div class="bridge-line"></div><div class="bridge-num">${num}</div><div class="bridge-label">${esc(label)}</div><div class="bridge-title">${esc(title)}</div>${desc?`<div class="bridge-desc">${esc(desc)}</div>`:""}</div>`;
const section = (cls, inner)=> `<section class="section ${cls||''}">${inner}</section>`;

function cover(d){return `<section class="cover"><div><div class="kicker">CONSCIOUSNESS ARCHITECTURE LAB</div><div class="cover-main"><h1 class="cover-title">CAL 의식OS<br>프리미엄 리포트</h1><p class="cover-sub">${nl(d.mainMessage || '현실은 사건이 아니라 반복 실행된 의식 구조의 출력입니다.')}</p></div></div><div class="cover-info-grid"><div class="cover-info"><div class="cover-info-label">고객명</div><div class="cover-info-value">${esc(d.clientName)}</div></div><div class="cover-info"><div class="cover-info-label">리포트 날짜</div><div class="cover-info-value">${esc(d.reportDate)}</div></div><div class="cover-info"><div class="cover-info-label">리포트 ID</div><div class="cover-info-value">${esc(d.reportId || d.reportID || '')}</div></div></div></section>`}
function sec01(s){return bridge('01',s.title,'REALITY OUTPUT',s.desc)+section('',`<div class="inner-card"><div class="label">REALITY OUTPUT</div><div class="output-item"><div class="icon-circle">◎</div><h3 class="item-title">현실 출력</h3><p class="item-text">${nl(s.realityOutput || s.summary?.[0] || '')}</p></div><div class="output-item"><div class="icon-circle">⌁</div><h3 class="item-title">핵심 출력 패턴</h3><ul class="bullet-list">${li(s.corePatterns || s.summary?.slice?.(1) || [])}</ul></div>${callout('Core Message',s.coreMessage)}${callout('CAL Insight',s.calInsight)}</div>`)}
function sec02(s){const loop=arr(s.coreLoop);const detail=arr(s.loopDetails || s.loop || s.details);return bridge('02',s.title,'AUTO LOOP',s.desc)+section('',`<div class="inner-card"><div class="label">AUTO LOOP</div><div class="loop-diagram">${loop.map((x,i)=>`${i?'<div class="loop-arrow">→</div>':''}<div class="loop-pill">${esc(x)}</div>`).join('')}</div><div class="loop-detail-full">${detail.map((x,i)=>`<div class="loop-step"><div class="loop-step-num">${i+1}</div><div><h3>${esc(x.title || x.step || loop[i] || '')}</h3><p>${nl(x.text || x.desc || x.description || '')}</p></div></div>`).join('')}</div>${callout('Core Message',s.coreMessage)}${callout('CAL Insight',s.calInsight)}</div>`)}
function sec03(s){const e=s.elementScores||{}; const vals=[['목(木)','wood',e.wood||e['목']||1],['화(火)','fire',e.fire||e['화']||1],['토(土)','earth',e.earth||e['토']||4],['금(金)','metal',e.metal||e['금']||1],['수(水)','water',e.water||e['수']||3]]; const total=vals.reduce((a,b)=>a+Number(b[2]||0),0)||1; const bc=s.birthChart||{};return bridge('03',s.title,'SAJU OS',s.desc)+section('deep',`<div class="inner-card"><div class="label">SAJU OS</div><p class="block-text">${nl(s.intro||s.text||'')}</p></div><div class="inner-card"><div class="sub-title">Birth Chart · 원국</div><table class="saju-table"><tr><th>시주</th><th>일주</th><th>월주</th><th>년주</th></tr><tr><td>${esc(bc.hour||'')}</td><td>${esc(bc.day||'')}</td><td>${esc(bc.month||'')}</td><td>${esc(bc.year||'')}</td></tr></table><div class="sub-title">오행 에너지 분포</div>${vals.map(v=>{const pct=Math.round(Number(v[2]||0)/total*100);return `<div class="energy-row"><div class="energy-name">${v[0]}</div><div class="energy-bar"><div class="energy-fill ${v[1]}" style="width:${Math.max(8,pct)}%"></div></div><div class="energy-count">${v[2]}</div><div class="energy-percent">(${pct}%)</div></div>`}).join('')}<div class="donut-wrap"><div class="donut"><div class="donut-center"><small>오행 균형</small><strong>${Math.max(...vals.map(v=>Math.round(Number(v[2]||0)/total*100)))}%</strong><small>주요 에너지</small></div></div></div>${callout('에너지 해석',s.dominantText)}</div><div>${arr(s.miniCards||s.cards).map(c=>`<div class="deep-mini-card"><h3>${esc(c.title)}</h3><p>${nl(c.text)}</p></div>`).join('')}</div>${callout('Core Message',s.coreMessage)}${callout('CAL Insight',s.calInsight)}`)}
function sec04(s){return bridge('04',s.title,'CONSCIOUSNESS OS',s.desc)+section('',`<div class="inner-card"><div class="label">CONSCIOUSNESS OS</div><p class="block-text">${nl(s.intro||s.text||'')}</p><div class="os-grid">${arr(s.osSteps||s.steps).map(x=>`<div class="os-step"><div class="os-name">${esc(x.name)}<small>${esc(x.sub||'')}</small></div><div class="os-body"><h3>${esc(x.title)}</h3><p>${nl(x.text)}</p></div></div>`).join('')}</div>${callout('Core Message',s.coreMessage)}${callout('CAL Insight',s.calInsight)}</div>`)}
function sec05(s){return bridge('05',s.title,'ADMIN AUTHORITY',s.desc)+section('deep',`<div class="inner-card"><p class="admin-statement">${nl(s.statement||'')}</p>${arr(s.cards).map(c=>`<div class="admin-card"><h3>${esc(c.title)}</h3><p>${nl(c.text)}</p></div>`).join('')}${callout('Core Message',s.coreMessage)}${callout('CAL Insight',s.calInsight)}</div>`)}
function sec06(s){return bridge('06',s.title,'REPROGRAMMING',s.desc)+section('',`<div class="inner-card"><div class="label">REPROGRAMMING PROTOCOL</div><div class="protocol-list">${arr(s.steps).map((x,i)=>`<div class="protocol-step"><div class="step-num">${i+1}</div><div><h3>${esc(x.title)}</h3><p>${nl(x.text)}</p></div></div>`).join('')}</div>${callout('Daily Practice · 데일리 실천',s.dailyPractice)}${arr(s.questions).length?`<div class="callout"><div class="callout-title">Questions · 전환 질문</div><ul class="bullet-list">${li(s.questions)}</ul></div>`:''}${callout('Core Message',s.coreMessage)}${callout('CAL Insight',s.calInsight)}</div>`)}
function sec07(s){return bridge('07',s.title,'RESISTANCE',s.desc)+section('',`<div class="inner-card"><div class="label">RESISTANCE PATTERN</div>${arr(s.cards).map(c=>`<div class="resistance-card"><h3>${esc(c.title)}</h3><p>${nl(c.text)}</p></div>`).join('')}${callout('Core Message',s.coreMessage)}${callout('CAL Insight',s.calInsight)}</div>`)}
function sec08(s,d){return bridge('08',s.title,'FINAL MESSAGE',s.desc)+section('final',`<div class="inner-card"><p class="final-message">${nl(s.message||'')}</p>${callout('CAL Insight',s.calInsight)}<div class="footer-note">${nl(d.footer?.disclaimer||'')}<br><br>${nl(d.footer?.copyright||'© 2026 Consciousness Architecture Lab')}<br>본 리포트의 구조, 문장, 분석 방식, 시각 구성은 CAL 의식OS 리포트 시스템의 고유 저작물입니다. 무단 복제, 재배포, 상업적 사용, 2차 가공을 금합니다.</div></div>`)}
function render(d){
  const app=document.getElementById('app');
  app.innerHTML = [
    cover(d),
    sec01(d.section01_realityOutput||{}),
    sec02(d.section02_autoReaction||{}),
    sec03(d.section03_sajuOS||{}),
    sec04(d.section04_consciousnessOS||d.section04_osStructure||{}),
    sec05(d.section05_admin||d.section05_adminAuthority||{}),
    sec06(d.section06_protocol||d.section06_reprogramming||{}),
    sec07(d.section07_resistance||{}),
    sec08(d.section08_final||d.finalMessage||{},d)
  ].join('');
}
render(CAL_REPORT_DATA);
</script>
