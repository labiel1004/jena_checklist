<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>의식OS 자동 리포트</title>
  <style>
    :root {
      --bg: #f6f1ea;
      --paper: #fffaf3;
      --ink: #26211c;
      --muted: #7a6f63;
      --line: #e4d8c8;
      --accent: #8b6f47;
      --accent-soft: #efe3d1;
      --danger: #9b5147;
      --radius: 22px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.65;
    }

    .toolbar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      justify-content: center;
      gap: 10px;
      padding: 14px;
      background: rgba(246, 241, 234, 0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--line);
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 11px 18px;
      background: var(--ink);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
    }

    button.secondary {
      background: var(--accent-soft);
      color: var(--ink);
    }

    .report {
      width: min(920px, 100%);
      margin: 0 auto;
      padding: 28px 18px 80px;
    }

    .page {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 30px;
      padding: 42px;
      margin: 24px auto;
      box-shadow: 0 18px 50px rgba(61, 45, 28, 0.08);
    }

    .cover {
      min-height: 760px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      background:
        radial-gradient(circle at 80% 15%, rgba(139,111,71,.22), transparent 32%),
        linear-gradient(145deg, #fffaf3 0%, #f0e3d1 100%);
    }

    .brand {
      font-size: 13px;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 800;
    }

    h1 {
      font-size: clamp(36px, 7vw, 68px);
      line-height: 1.08;
      letter-spacing: -0.04em;
      margin: 22px 0;
    }

    h2 {
      font-size: clamp(26px, 4.8vw, 42px);
      line-height: 1.18;
      letter-spacing: -0.035em;
      margin: 0 0 18px;
    }

    h3 {
      font-size: 20px;
      margin: 0 0 10px;
    }

    .subtitle {
      font-size: 20px;
      color: var(--muted);
      max-width: 620px;
    }

    .meta {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-top: 42px;
    }

    .meta-card, .card {
      border: 1px solid var(--line);
      background: rgba(255,255,255,.45);
      border-radius: var(--radius);
      padding: 20px;
    }

    .label {
      font-size: 12px;
      color: var(--muted);
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .value {
      font-size: 22px;
      font-weight: 850;
      letter-spacing: -0.02em;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      margin-top: 22px;
    }

    .full { grid-column: 1 / -1; }

    .score-row {
      display: grid;
      grid-template-columns: 120px 1fr 52px;
      align-items: center;
      gap: 14px;
      margin: 18px 0;
    }

    .bar {
      height: 12px;
      border-radius: 99px;
      background: #eadfce;
      overflow: hidden;
    }

    .bar > span {
      display: block;
      height: 100%;
      width: var(--w);
      border-radius: inherit;
      background: var(--accent);
    }

    .score {
      text-align: right;
      font-weight: 850;
    }

    .callout {
      border-left: 6px solid var(--accent);
      background: var(--accent-soft);
      border-radius: 18px;
      padding: 20px 22px;
      font-size: 19px;
      font-weight: 750;
      letter-spacing: -0.015em;
      margin: 24px 0;
    }

    .flow {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 20px 0;
    }

    .flow span {
      padding: 10px 14px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 999px;
      font-weight: 750;
      font-size: 14px;
    }

    .pattern-list {
      counter-reset: pattern;
      display: grid;
      gap: 14px;
      margin-top: 20px;
    }

    .pattern {
      position: relative;
      padding: 20px 20px 20px 64px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255,255,255,.5);
    }

    .pattern::before {
      counter-increment: pattern;
      content: counter(pattern);
      position: absolute;
      left: 20px;
      top: 22px;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: var(--ink);
      color: #fff;
      font-size: 14px;
      font-weight: 900;
    }

    .guide {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 14px;
      margin-top: 22px;
    }

    .guide .card {
      min-height: 180px;
    }

    .footer-note {
      color: var(--muted);
      font-size: 13px;
      margin-top: 30px;
      border-top: 1px solid var(--line);
      padding-top: 16px;
    }

    @media (max-width: 720px) {
      .page { padding: 28px 20px; border-radius: 24px; }
      .cover { min-height: 640px; }
      .meta, .grid, .guide { grid-template-columns: 1fr; }
      .score-row { grid-template-columns: 1fr; gap: 6px; }
      .score { text-align: left; }
    }

    @media print {
      body { background: #fff; }
      .toolbar { display: none; }
      .report { width: 100%; padding: 0; }
      .page {
        min-height: 100vh;
        margin: 0;
        border: 0;
        border-radius: 0;
        box-shadow: none;
        page-break-after: always;
      }
      .page:last-child { page-break-after: auto; }
      @page { size: A4; margin: 0; }
    }/* ===== JSON 입력 패널 ===== */

.json-panel {
  display: none;
  width: min(920px, 100%);
  margin: 20px auto 0;
  padding: 24px 18px;
}

.json-panel.open {
  display: block;
}

.json-panel h2 {
  font-size: 24px;
  margin-bottom: 8px;
}

.json-panel p {
  color: var(--muted);
}

#jsonInput {
  width: 100%;
  min-height: 240px;
  margin: 14px 0;
  padding: 18px;
  border: 1px solid var(--line);
  border-radius: 18px;
  background: #fffaf7;
  color: var(--ink);
  font-family: monospace;
  font-size: 14px;
  line-height: 1.6;
}

.json-actions {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.json-error {
  color: var(--danger);
  font-weight: 700;
  margin-top: 10px;
}
  </style>
</head>
<body>
  <div class="toolbar">
    <button onclick="window.print()">PDF로 저장</button>
    <button class="secondary" onclick="toggleJsonPanel()">JSON 붙여넣기</button>
    <button class="secondary" onclick="renderReport(sampleData)">샘플 보기</button>
  </div>

  <section id="jsonPanel" class="json-panel">
    <h2>커스텀 GPT JSON 붙여넣기</h2>
    <p>커스텀 GPT가 생성한 JSON 전체를 아래 칸에 붙여넣고 “리포트 생성”을 누르세요.</p>
    <textarea id="jsonInput" placeholder='{"clientName":"홍길동", "reportType":"의식OS 구조 분석", ...}'></textarea>
    <div class="json-actions">
      <button onclick="loadJsonReport()">리포트 생성</button>
      <button class="secondary" onclick="clearJsonInput()">비우기</button>
    </div>
    <p id="jsonError" class="json-error"></p>
  </section>

  <main id="report" class="report"></main>

  <script>
    const sampleData = {
      clientName: "홍길동",
      reportDate: "2026.04.24",
      reportType: "의식OS 구조 분석",
      totalState: "생존 알고리즘 우세",
      mainMessage: "현재 구조는 선택이 없는 것이 아니라, 선택 전에 자동반응이 먼저 실행되는 상태입니다.",
      scores: [
        { label: "선택 vs 반응", value: 78 },
        { label: "생존 알고리즘", value: 72 },
        { label: "이원성", value: 66 },
        { label: "전환 가능성", value: 54 }
      ],
      summary: [
        "감정이 올라올 때 해석보다 반응이 먼저 실행되는 경향이 있습니다.",
        "타인의 평가나 반응이 입력되면 자기 기준보다 외부 기준이 먼저 활성화됩니다.",
        "불편한 상황에서 벗어나려는 회피 흐름과, 동시에 설명하고 증명하려는 방어 흐름이 함께 작동합니다."
      ],
      trigger: "평가받는 상황, 관계 안에서 오해받는 느낌, 통제할 수 없는 변화가 생길 때 자동반응이 빠르게 켜집니다.",
      patterns: [
        {
          title: "평가 입력 → 자기방어 실행",
          body: "상대의 말이 단순한 의견이어도, 내부에서는 ‘나를 판단한다’는 신호로 해석될 수 있습니다. 이때 설명하거나 증명하려는 반응이 빨라집니다."
        },
        {
          title: "불편 감정 → 회피 또는 지연",
          body: "감정이 커지면 문제를 직접 보는 대신 잠시 미루거나 다른 곳으로 에너지를 돌리는 흐름이 작동합니다."
        },
        {
          title: "인정 욕구 → 기준 외주화",
          body: "내 기준보다 타인의 반응을 먼저 확인하려는 경향이 있습니다. 이 구조에서는 선택보다 허락을 기다리는 느낌이 강해질 수 있습니다."
        }
      ],
      turningPoint: "전환 지점은 ‘반응하지 않는 것’이 아니라, 반응이 올라오는 첫 3초를 알아차리는 것입니다. 그 순간 의식OS의 사용자 권한이 다시 열립니다.",
      guides: [
        {
          title: "감정이 올라올 때",
          body: "바로 해석하지 말고 먼저 몸의 위치를 확인하세요. 가슴, 목, 얼굴, 배 중 어디에서 반응이 시작되는지 보는 것이 첫 번째 멈춤입니다."
        },
        {
          title: "관계에서 흔들릴 때",
          body: "‘상대가 나를 어떻게 보나?’보다 ‘지금 내 안에서 어떤 자동반응이 켜졌나?’를 먼저 묻습니다. 질문이 바뀌면 구조가 보입니다."
        },
        {
          title: "선택을 회복할 때",
          body: "완벽한 선택을 하려 하지 마세요. 자동반응을 10초 늦추는 것만으로도 이미 시스템은 재정렬되기 시작합니다."
        }
      ]
    };

    function escapeHtml(text) {
      return String(text ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function safeArray(value, fallback = []) {
      return Array.isArray(value) ? value : fallback;
    }

    function normalizeReportData(data) {
      return {
        clientName: data.clientName || "고객",
        reportDate: data.reportDate || new Date().toLocaleDateString('ko-KR'),
        reportType: data.reportType || "의식OS 구조 분석",
        totalState: data.totalState || "시스템 상태 분석",
        mainMessage: data.mainMessage || "현재 작동 중인 의식 구조를 기반으로 리포트를 생성했습니다.",
        scores: safeArray(data.scores, []),
        summary: safeArray(data.summary, []),
        trigger: data.trigger || "자동반응이 활성화되는 주요 상황을 분석합니다.",
        patterns: safeArray(data.patterns, []),
        turningPoint: data.turningPoint || "반응이 올라오는 순간을 알아차리는 것이 전환의 시작입니다.",
        guides: safeArray(data.guides, [])
      };
    }

    function toggleJsonPanel() {
      const panel = document.getElementById('jsonPanel');
      panel.classList.toggle('open');
    }

    function clearJsonInput() {
      document.getElementById('jsonInput').value = '';
      document.getElementById('jsonError').textContent = '';
    }

    function loadJsonReport() {
      const input = document.getElementById('jsonInput').value.trim();
      const error = document.getElementById('jsonError');
      error.textContent = '';

      if (!input) {
        error.textContent = 'JSON 내용을 붙여넣어 주세요.';
        return;
      }

      try {
        const parsed = JSON.parse(input);
        const normalized = normalizeReportData(parsed);
        renderReport(normalized);
        document.getElementById('jsonPanel').classList.remove('open');
        window.scrollTo({ top: 0, behavior: 'smooth' });
      } catch (e) {
        error.textContent = 'JSON 형식에 오류가 있습니다. 따옴표, 쉼표, 중괄호를 확인해 주세요.';
      }
    }

    function renderReport(rawData) {
      const data = normalizeReportData(rawData);
      const report = document.getElementById('report');
      report.innerHTML = `
        <section class="page cover">
          <div>
            <div class="brand">Consciousness Architecture Lab</div>
            <h1>${escapeHtml(data.reportType)}<br/>자동 리포트</h1>
            <p class="subtitle">현실은 사건이 아니라 구조입니다. 이 리포트는 현재 작동 중인 자동반응 구조를 읽고, 선택이 열리는 지점을 보여줍니다.</p>
          </div>
          <div class="meta">
            <div class="meta-card"><div class="label">Name</div><div class="value">${escapeHtml(data.clientName)}</div></div>
            <div class="meta-card"><div class="label">Date</div><div class="value">${escapeHtml(data.reportDate)}</div></div>
            <div class="meta-card"><div class="label">State</div><div class="value">${escapeHtml(data.totalState)}</div></div>
          </div>
        </section>

        <section class="page">
          <div class="brand">Section 01</div>
          <h2>시스템 상태 요약</h2>
          <div class="callout">${escapeHtml(data.mainMessage)}</div>
          <div class="grid">
            ${data.summary.map(item => `<div class="card">${escapeHtml(item)}</div>`).join('')}
          </div>
          <div class="footer-note">이 리포트는 성격을 판단하지 않습니다. 반복되는 반응의 작동 구조를 보여주는 도구입니다.</div>
        </section>

        <section class="page">
          <div class="brand">Section 02</div>
          <h2>점수 기반 구조 지도</h2>
          ${data.scores.map(s => `
            <div class="score-row">
              <div><strong>${escapeHtml(s.label)}</strong></div>
              <div class="bar" style="--w:${Math.max(0, Math.min(100, Number(s.value) || 0))}%"><span></span></div>
              <div class="score">${Math.max(0, Math.min(100, Number(s.value) || 0))}</div>
            </div>
          `).join('')}
          <div class="callout">점수는 정답이 아니라 방향입니다. 높고 낮음보다 중요한 것은 어떤 상황에서 어떤 흐름이 자동 실행되는가입니다.</div>
        </section>

        <section class="page">
          <div class="brand">Section 03</div>
          <h2>자동반응 흐름</h2>
          <p>${escapeHtml(data.trigger)}</p>
          <div class="flow">
            <span>입력</span><span>해석</span><span>동일시</span><span>감정</span><span>반응</span><span>반복 저장</span>
          </div>
          <div class="pattern-list">
            ${data.patterns.map(p => `
              <div class="pattern">
                <h3>${escapeHtml(p.title)}</h3>
                <p>${escapeHtml(p.body)}</p>
              </div>
            `).join('')}
          </div>
        </section>

        <section class="page">
          <div class="brand">Section 04</div>
          <h2>전환 포인트</h2>
          <div class="callout">${escapeHtml(data.turningPoint)}</div>
          <div class="guide">
            ${data.guides.map(g => `
              <div class="card">
                <h3>${escapeHtml(g.title)}</h3>
                <p>${escapeHtml(g.body)}</p>
              </div>
            `).join('')}
          </div>
          <div class="footer-note">구조가 보이면 선택이 열립니다. 의식 구조 연구소.</div>
        </section>
      `;
    }

    renderReport(sampleData);
  </script>
</body>
</html>
