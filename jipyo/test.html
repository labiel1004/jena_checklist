<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CAL Parent Scan Report FORM v3</title>
<style>
:root {
  /* 세련된 의식 아키텍트 테마: deep green, warm sand, soft cream */
  --bg: #f9f7f2;
  --paper: #ffffff;
  --paper2: #faf8f4;
  --ink: #1a241f;
  --muted: #626d66;
  --green: #0b261e;
  --green2: #163f33;
  --gold: #aa8038;
  --gold2: #edd7a6;
  --line: #e3ded5;
  --shadow: 0 20px 40px rgba(11,38,30,0.06);
  --radius: 24px;
}

* { box-sizing: border-box; }
body { 
  margin: 0; 
  font-family: -apple-system, BlinkMacSystemFont, "Pretendard", "Noto Sans KR", sans-serif; 
  background: var(--bg); 
  color: var(--ink); 
  line-height: 1.85; /* 모바일 가독성을 위한 여유로운 행간 */
  letter-spacing: -0.01em;
  word-break: keep-all;
}

.wrap { width: min(960px, calc(100% - 36px)); margin: 0 auto; }

/* 에디터 영역 스타일 */
.editor { background: var(--green); color: #fff; padding: 40px 0; border-bottom: 4px solid var(--gold); }
.editor h1 { margin: 0 0 12px; font-size: clamp(1.8rem, 4vw, 2.8rem); font-weight: 800; color: var(--gold2); letter-spacing: -0.03em; }
.editor p { margin: 0 0 20px; color: rgba(255,255,255,0.75); font-size: 1.05rem; }
textarea { 
  width: 100%; min-height: 220px; 
  border: 1px solid rgba(255,255,255,0.25); border-radius: 16px; 
  padding: 20px; background: #061612; color: #eadecc; 
  font-family: monospace; font-size: 0.95rem; line-height: 1.6; resize: vertical; 
}
.buttons { display: flex; gap: 14px; flex-wrap: wrap; margin-top: 18px; }
button { 
  border: 0; border-radius: 999px; padding: 16px 28px; 
  font-weight: 700; cursor: pointer; font-size: 1.05rem; transition: transform 0.2s;
}
button:active { transform: scale(0.98); }
.primary { background: var(--gold2); color: var(--green); }
.secondary { background: transparent; color: #fff; border: 1px solid rgba(255,255,255,0.4); }
.error { color: #ffbaba; margin-top: 14px; font-weight: 700; display: none; }

/* 리포트 출력 영역 스타일 */
.report { padding: 50px 0 100px; }

/* 커버 디자인: 모바일에서 더 간결하고 시네마틱하게 변경 */
.cover { 
  background: linear-gradient(145deg, var(--green), #123329); color: white; 
  border-radius: var(--radius); padding: clamp(34px, 7vw, 64px); 
  box-shadow: var(--shadow); position: relative; overflow: hidden; 
  min-height: 520px; display: flex; flex-direction: column; justify-content: space-between; 
}
.cover-inner { position: relative; z-index: 2; }
.eyebrow { color: var(--gold2); letter-spacing: 0.18em; text-transform: uppercase; font-weight: 700; font-size: 0.85rem; margin-bottom: 24px; }
.cover h2 { margin: 0; font-size: clamp(2.4rem, 6vw, 4.4rem); font-weight: 800; line-height: 1.15; letter-spacing: -0.04em; color: #ffffff; }
.subtitle { margin-top: 20px; max-width: 680px; color: rgba(255,255,255,0.85); font-size: clamp(1.2rem, 2.5vw, 1.65rem); font-weight: 500; line-height: 1.45; }
.meta-grid { margin-top: 50px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
.meta { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); border-radius: 16px; padding: 18px; }
.meta span { display: block; color: var(--gold2); font-size: 0.78rem; font-weight: 700; letter-spacing: 0.05em; margin-bottom: 6px; }
.meta strong { display: block; color: #fff; font-size: 1.1rem; font-weight: 600; }
.tagline { position: relative; z-index: 2; margin-top: 50px; padding-top: 24px; border-top: 1px solid rgba(255,255,255,0.15); font-size: clamp(1.1rem, 2.2vw, 1.45rem); font-weight: 500; line-height: 1.6; color: var(--gold2); }

/* 섹션 기본 구조 */
.section { background: var(--paper); border: 1px solid var(--line); border-radius: var(--radius); padding: clamp(24px, 5vw, 48px); margin-top: 32px; box-shadow: var(--shadow); }
.section-head { display: flex; gap: 20px; align-items: flex-start; border-bottom: 2px solid var(--line); padding-bottom: 24px; margin-bottom: 28px; }
.num { min-width: 48px; height: 48px; border-radius: 16px; background: var(--bg); color: var(--green); display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 1.2rem; border: 1px solid var(--line); }
h3 { margin: 0; color: var(--green); font-size: clamp(1.45rem, 3.5vw, 2rem); font-weight: 800; line-height: 1.3; letter-spacing: -0.03em; }
.desc { margin: 10px 0 0; color: var(--muted); font-size: 1.05rem; line-height: 1.65; white-space: pre-line; }

/* 데이터 배치 그리드 시스템 */
.grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
.field { background: var(--paper2); border: 1px solid var(--line); border-radius: 18px; padding: 22px; }
.field.full { grid-column: 1 / -1; }
.label { color: var(--gold); font-size: 0.88rem; font-weight: 700; letter-spacing: 0.02em; margin-bottom: 10px; text-transform: uppercase; }
.value { white-space: pre-line; color: var(--ink); font-size: 1.1rem; font-weight: 400; line-height: 1.75; }

/* 최상단 메인 요약 상태 카드 */
.output-card { background: var(--paper2); border: 2px solid var(--green); border-radius: 20px; padding: 26px; margin-bottom: 20px; }
.output-card .big { font-size: clamp(1.15rem, 2.5vw, 1.4rem); color: var(--green); font-weight: 700; line-height: 1.7; white-space: pre-line; }

.loop { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }

/* CAL Insight 영역: 시네마틱 유머 무드 강조 */
.insight { 
  margin-top: 32px; background: linear-gradient(135deg, #f7f3eb, #ede6d9); 
  color: var(--green); border-radius: 20px; padding: 26px; 
  font-size: clamp(1.1rem, 2.4vw, 1.25rem); font-weight: 600; line-height: 1.75; 
  text-align: center; border-left: 5px solid var(--gold);
}
.insight .label { color: var(--gold); margin-bottom: 6px; font-size: 0.8rem; font-weight: 800; letter-spacing: 0.1em; }

/* 사주 OS 레이아웃 */
.saju-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
.saju-visual { background: var(--paper2); border: 1px solid var(--line); border-radius: 20px; padding: 24px; }
.donut-wrap { display: flex; justify-content: center; align-items: center; min-height: 240px; }
.donut { width: 210px; height: 210px; border-radius: 50%; position: relative; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.03); }
.donut:after { 
  content: "사주 OS"; position: absolute; inset: 46px; border-radius: 50%; 
  background: var(--paper2); display: flex; align-items: center; justify-content: center; 
  color: var(--green); font-weight: 800; font-size: 1.05rem; letter-spacing: -0.02em; 
}
.bar-list { display: grid; gap: 14px; margin-top: 10px; }
.bar-row { display: grid; grid-template-columns: 58px 1fr 30px; align-items: center; gap: 12px; font-size: 1.02rem; }
.bar-label { font-weight: 700; color: var(--green); }
.bar-track { height: 14px; background: #eadecc; border-radius: 999px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 999px; }
.bar-num { text-align: right; font-weight: 700; color: var(--muted); }
.legend { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 20px; border-top: 1px solid var(--line); padding-top: 14px; }
.legend span { display: inline-flex; gap: 6px; align-items: center; font-size: 0.9rem; color: var(--muted); font-weight: 500; }
.dot { width: 12px; height: 12px; border-radius: 4px; display: inline-block; }

/* 최종 코멘트 스타일 */
.final-message { font-size: 1.15rem; line-height: 1.85; background: var(--paper2); border-radius: 20px; padding: 30px; border: 1px solid var(--line); white-space: pre-line; color: #222; }
.mirror { 
  margin-top: 20px; background: rgba(11,38,30,0.04); border: 1px dashed var(--green); 
  border-radius: 20px; padding: 26px; color: var(--green); font-weight: 700; 
  font-size: 1.15rem; line-height: 1.8; white-space: pre-line; text-align: center;
}

.footer { text-align: center; color: var(--muted); font-size: 0.95rem; margin-top: 50px; line-height: 1.6; }

/* 미디어 쿼리: 모바일 최적화 (가독성 증폭 핵심) */
@media (max-width: 768px) {
  body { font-size: 1.05rem; } /* 모바일에서 텍스트 기반 정보 확인이 원활하도록 전체 폰트 확장 */
  .wrap { width: calc(100% - 24px); }
  .report { padding: 24px 0 60px; }
  .cover { min-height: auto; padding: 32px 24px; border-radius: 20px; }
  .meta-grid { grid-template-columns: 1fr; gap: 10px; margin-top: 30px; }
  .meta { padding: 14px; }
  
  .section { padding: 24px 18px; border-radius: 20px; margin-top: 20px; }
  .section-head { gap: 14px; padding-bottom: 16px; margin-bottom: 20px; }
  .num { min-width: 38px; height: 38px; font-size: 1.05rem; border-radius: 12px; }
  
  /* 모바일 가독성의 핵심: 모든 요소를 1열 배치로 떨어뜨려 시선 분산을 완벽히 차단 */
  .grid, .loop, .saju-layout { grid-template-columns: 1fr; gap: 14px; }
  .field { padding: 18px; border-radius: 14px; }
  .value { font-size: 1.05rem; }
  
  .donut { width: 190px; height: 190px; }
  .donut:after { inset: 40px; font-size: 0.95rem; }
  .insight { padding: 20px; margin-top: 24px; }
  .final-message { padding: 20px; font-size: 1.05rem; }
  .mirror { padding: 20px; font-size: 1.05rem; }
}

@media print {
  .editor { display: none; }
  body { background: white; }
  .report { padding: 0; }
  .section, .cover { box-shadow: none; break-inside: avoid; page-break-inside: avoid; }
}
</style>
</head>
<body>
<section class="editor">
  <div class="wrap">
    <h1>CAL Parent Scan<br/>Report FORM v3</h1>
    <p>GPT가 생성한 Parent Scan JSON을 붙여넣고 리포트를 생성하세요.</p>
    <textarea id="jsonInput" placeholder="여기에 Parent Scan JSON을 붙여넣으세요."></textarea>
    <div class="buttons">
      <button class="primary" onclick="renderReport()">리포트 생성</button>
      <button class="secondary" onclick="window.print()">PDF로 저장/인쇄</button>
    </div>
    <div id="error" class="error"></div>
  </div>
</section>
<main class="report">
  <div class="wrap" id="reportRoot"></div>
</main>
<script>
const sampleData={"clientName":"조얀","createdDate":"2026.06.09","reportNo":"CAL-PS-20260609-조얀","reportTitle":"CAL Parent Scan","reportSubtitle":"아이를 통해 드러나는 부모의 반응 알고리즘 리포트","section01_currentOutput":{"title":"아이를 통해 드러난 현재의 출력 상태","description":"아이의 어떤 행동 앞에서 부모인 당신에게 반복적으로 나타나는 감정과 반응을 살펴봅니다. 이 페이지는 현재 부모 안에서 출력되고 있는 반응 패턴을 압축하여 보여주는 요약 화면입니다.","triggerScene":"아이가 자기 생각을 말하지 못하거나 자신감이 부족해 보일 때, 생활습관과 건강이 안정적으로 관리되지 않는다고 느껴질 때","currentEmotion":"답답함","currentReaction":"반복해서 설명하고, 아이에게 ‘스스로 해봐’라고 말하는 반응","outputSummary":"아이의 독립성과 자기표현이 약해 보이는 순간, 부모님은 기다리기보다 설명과 교정으로 들어가기 쉽습니다. 겉으로는 아이가 스스로 하기를 바라는 말이지만, 안쪽에는 ‘제대로 된 가르침이 필요하다’는 오래된 요구가 함께 작동합니다.","calInsight":""},"section02_reactionAlgorithm":{"title":"부모의 반응 알고리즘","description":"우리는 특정 상황에서 자동으로 반응합니다. 이 섹션에서는 아이의 행동이 어떤 해석과 감정을 거쳐 현재의 반응으로 이어지는지 살펴봅니다.","trigger":"아이가 자기 생각을 분명히 말하지 못하거나 자신감 없이 보이는 장면","automaticInterpretation":"지금 바로잡아 주지 않으면 아이가 계속 의존적이거나 약하게 자랄 수 있다.","hiddenPremise":"스스로 해내려면 제대로 배워야 하고, 약한 모습으로는 세상에서 존재감 있게 살아가기 어렵다.","emotion":"답답함, 조급함, 걱, 책임감","reactionBehavior":"반복해서 설명하기, 방법을 알려주기, 아이가 스스로 하도록 요구하기, 부족해 보이는 부분을 빠르게 교정하려 하기","reinforcementLoop":"아이가 자신 있게 표현하지 못함 → 부모가 답답함을 느낌 → 반복 설명과 ‘스스로 해봐’라는 메시지가 나감 → 아이는 더 평가받는 느낌을 받음 → 아이의 표현이 더 조심스러워짐 → 부모는 다시 더 설명해야 한다고 느낌","calInsight":""},"section03_childMessage":{"title":"부모의 반응이 아이에게 전달하는 메시지","description":"부모의 의도와는 별개로, 아이는 부모의 반복된 반응을 자신만의 방식으로 해석합니다. 그 신호가 아이에게 어떻게 전달되었는지는 부모가 관찰한 아이의 행동 결과를 통해 확인할 수 있습니다. 이 섹션에서는 부모의 반응이 아이에게 어떤 메시지로 남고, 아이가 어떤 방식으로 반응하게 되는지 살펴봅니다.","parentIntention":"아이가 독립적으로 성장하고, 자신의 생각을 말하며, 건강하고 행복하게 살아가기를 바람","repeatedReaction":"반복 설명, 교정, 스스로 하라는 요구","messageToChild":"너는 스스로 해야 해. 지금보다 더 자신 있게 말해야 해. 부족한 부분은 고쳐야 해.","childInterpretation":"내가 말하면 틀릴 수 있다. 엄마가 답답해할 수 있다. 아직 나는 충분하지 않은 것 같다.","observedChildBehavior":"자기 생각을 말하지 못하거나 자신감이 부족해 보임","possiblePattern":"아이는 스스로 하라는 말을 들을수록 독립적으로 움직이기보다, 먼저 맞는지 확인하거나 표현을 조심할 수 있습니다.","calInsight":"어린 새는 날개를 펼칠 공간이 있을 때, 바람을 배우기 시작합니다."},"section04_originPattern":{"title":"이 반응은 어디에서 시작되었을까요?","description":"현재의 반응은 어느 날 갑자기 만들어진 것이 아닙니다. 어린 시절 경험과 반복적으로 들었던 말들은 지금의 생각과 반응에 영향을 줍니다. 이 섹션에서는 현재의 반응이 어떤 경험 속에서 형성되었는지 살펴봅니다.","oftenHeardWords":"내 강아지, 피곤해 보인다. 너무 애쓰지 말고 그냥저냥 살아라.","wantedToHearWords":"제대로 된 가르침","earlyExperiencePattern":"보호받고 걱정받는 느낌은 있었지만, 삶을 주체적으로 살아가도록 기준과 방향을 배웠다는 느낌은 부족했을 수 있습니다.","currentConnection":"아이에게서 자신감 부족이나 자기표현의 어려움이 보이면, 부모님 안의 오래된 결핍이 함께 건드려질 수 있습니다.","calInsight":""},"section05_sajuOS":{"title":"사주OS 초기 입력 필터","description":"우리는 모두 서로 다른 에너지 구조와 해석 필터를 가지고 세상을 바라봅니다. 사주OS는 부모가 어떤 방식으로 세상을 해석하고 반응하는지 보여주는 초기 입력값입니다. 또한 그 에너지가 건강하게 작동할 때와 왜곡되어 작동할 때의 차이를 함께 확인합니다.","whySajuOS":"사주OS는 부모님의 반응을 결정하는 운명이 아니라, 어떤 장면에서 더 민감하게 반응하기 쉬운지를 이해하기 위한 참고 자료입니다.","energyChart":{"wood":1,"fire":1,"earth":1,"metal":4,"water":2},"currentEnergyStructure":"금(金) OS가 강하게 활성화되어 기준, 질서, 교정, 분별의 에너지가 두드러집니다. 수(水) OS도 함께 작동하여 아이의 미래나 건강, 생활습관에 대한 생각이 깊어질 수 있습니다.","normalFunction":"금(金) OS가 건강하게 작동하면 아이에게 필요한 기준과 경계를 세워주고, 생활습관과 건강을 안정적으로 관리하도록 도울 수 있습니다. 수(水) OS는 아이를 깊이 관찰하고 장기적인 지혜로 바라보게 합니다.","distortedFunction":"금(金) OS가 과활성되면 부족한 부분이 먼저 보이고, 빠르게 바로잡거나 설명해야 한다는 압박으로 흐를 수 있습니다. 수(水) OS가 과활성되면 ‘나중에 문제가 되면 어떡하지’라는 걱정이 커질 수 있습니다.","connectionToCurrentPattern":"아이가 자기 생각을 말하지 못하거나 자신감이 부족해 보일 때, 금(金) OS는 ‘바로잡아야 한다’로, 수(水) OS는 ‘앞으로 문제가 될 수 있다’로 반응할 수 있습니다.","selfCheckQuestion":"지금 나는 아이를 성장시키고 있는가, 아니면 내 불안을 해결하려 하고 있는가?","calInsight":""},"section06_newChoice":{"title":"새로운 선택의 시작","description":"자동반응을 없애는 것이 목적은 아닙니다. 반응을 알아차리는 순간 새로운 선택이 가능해집니다. 이 섹션에서는 지금의 패턴을 반복하는 대신 어떤 선택을 시도해 볼 수 있는지 살펴봅니다.","awarenessPoint":"아이가 자신감 없어 보일 때 올라오는 ‘답답함’은 아이의 현재 상태만이 아니라, 부모님 안의 ‘제대로 가르침을 받지 못했다’는 기억과 연결될 수 있습니다.","newPerspective":"아이가 스스로 하려면 먼저 스스로 느끼고, 생각하고, 말해볼 수 있는 시간이 필요합니다.","smallPractice":"아이에게 바로 설명하기 전에 한 문장만 먼저 물어봅니다. ‘너는 어떻게 생각해?’ 그리고 아이의 답이 부족해 보여도 바로 고치지 않고, ‘그렇게 생각했구나’라고 먼저 받아줍니다.","choiceSentence":"나는 아이를 바로잡기 전에, 아이가 자기 생각을 꺼낼 공간을 먼저 열어준다.","calInsight":"꽃마다 피는 계절이 다르고, 피기 전의 고요함도 성장의 일부입니다."},"section07_finalMessage":{"title":"Final Message","description":"지금까지 살펴본 내용을 바탕으로 Parent Scan이 발견한 핵심 메시지를 전달합니다. 아이를 통해 드러난 부모의 반응과 가능성을 하나의 시선으로 정리하는 마지막 페이지입니다.","finalText":"조얀님 안에는 아이가 나약하거나 존재감 없이 살아가지 않기를 바라는 강한 마음이 있습니다. 그 마음은 아이를 사랑하기 때문에 생긴 것이지만, 때로는 반복 설명과 교정의 언어로 먼저 나올 수 있습니다. 아이가 자신감 없어 보이는 순간은 부모님이 실패한 순간이 아니라, 부모님 안의 오래된 기준과 결핍이 모습을 드러내는 순간일 수 있습니다. 그 반응을 알아차릴 때, 아이를 더 세게 밀어주는 길 말고도 다른 선택이 열립니다. 설명하기 전에 기다려주기, 고치기 전에 들어주기, 스스로 하라고 말하기 전에 스스로 생각할 공간을 주기. 이 작은 선택들이 아이에게는 ‘나는 부족해서 고쳐져야 하는 존재’가 아니라 ‘나는 내 생각을 말해도 되는 존재’라는 새로운 현실로 전달될 수 있습니다.","mirrorMessage":"아이는 부모가 가르쳐야 할 대상이기 전에, 부모 자신을 만나게 해주는 가장 가깝고 선명한 거울입니다."}};

document.getElementById('jsonInput').value = JSON.stringify(sampleData, null, 2);

function esc(v){ if(v===undefined||v===null||v==="")return""; return String(v).replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[s])); }
function field(label, value, full=false){ if(!value) return ""; return `<div class="field ${full?'full':''}"><div class="label">${label}</div><div class="value">${esc(value)}</div></div>` }
function insight(text){ if(!text) return ""; return `<div class="insight"><div class="label">CAL INSIGHT</div>${esc(text)}</div>` }
function section(num, title, desc, inner, cal){ return `<section class="section"><div class="section-head"><div class="num">${num}</div><div><h3>${esc(title)}</h3>${desc?`<div class="desc">${esc(desc)}</div>`:""}</div></div>${inner}${insight(cal)}</section>` }

function energyValues(chart){ const c = chart||{}; return { wood:Number(c.wood||0), fire:Number(c.fire||0), earth:Number(c.earth||0), metal:Number(c.metal||0), water:Number(c.water||0) } }
function donutStyle(values){ const total = Math.max(1, values.wood+values.fire+values.earth+values.metal+values.water); let a0 = 0; const colors = {wood:'#6aa374', fire:'#db6d51', earth:'#cca662', metal:'#8da0a8', water:'#518cb0'}; const parts = []; for(const key of ['wood','fire','earth','metal','water']){ const deg = values[key]/total*360; parts.push(`${colors[key]} ${a0}deg ${a0+deg}deg`); a0+=deg; } return `background:conic-gradient(${parts.join(',')});`; }

function energyBars(values){
  const labels = [['wood','목(木)','#6aa374'],['fire','화(火)','#db6d51'],['earth','토(土)','#cca662'],['metal','금(金)','#8da0a8'],['water','수(水)','#518cb0']];
  const max = Math.max(1, ...labels.map(([k])=>values[k]));
  return `<div class="bar-list">` + labels.map(([k,label,color])=>{
    const pct = values[k]/max*100;
    return `<div class="bar-row"><div class="bar-label">${label}</div><div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${color};"></div></div><div class="bar-num">${values[k]}</div></div>`
  }).join('') + `</div><div class="legend">${labels.map(([k,label,color])=>`<span><i class="dot" style="background:${color}"></i>${label}</span>`).join('')}</div>`;
}

function renderReport(){
  const err = document.getElementById('error');
  err.style.display = 'none';
  try {
    const data = JSON.parse(document.getElementById('jsonInput').value);
    const s1 = data.section01_currentOutput||{}, s2 = data.section02_reactionAlgorithm||{}, s3 = data.section03_childMessage||{}, s4 = data.section04_originPattern||{}, s5 = data.section05_sajuOS||{}, s6 = data.section06_newChoice||{}, s7 = data.section07_finalMessage||{};
    const ev = energyValues(s5.energyChart);
    
    document.getElementById('reportRoot').innerHTML = `
      <section class="cover">
        <div class="cover-inner">
          <div class="eyebrow">Consciousness Architecture Lab</div>
          <h2>${esc(data.reportTitle||'CAL Parent Scan')}</h2>
          <div class="subtitle">${esc(data.reportSubtitle||'아이를 통해 드러나는 부모의 반응 알고리즘 리포트')}</div>
          <div class="meta-grid">
            <div class="meta"><span>CLIENT</span><strong>${esc(data.clientName||'정보 부족')}</strong></div>
            <div class="meta"><span>DATE</span><strong>${esc(data.createdDate||'정보 부족')}</strong></div>
            <div class="meta"><span>REPORT NO</span><strong>${esc(data.reportNo||'정보 부족')}</strong></div>
          </div>
        </div>
        <div class="tagline">아이를 이해하는 첫 걸음,<br/>나를 이해하는 것에서 시작됩니다.</div>
      </section>
      
      ${section('01', s1.title, s1.description, `<div class="output-card"><div class="label">현재 출력 요약</div><div class="big">${esc(s1.outputSummary)}</div></div><div class="grid">${field('자극 장면', s1.triggerScene)}${field('현재 감정', s1.currentEmotion)}${field('현재 반응', s1.currentReaction, true)}</div>`, s1.calInsight)}
      ${section('02', s2.title, s2.description, `<div class="loop">${field('자극', s2.trigger)}${field('자동 해석', s2.automaticInterpretation)}${field('숨은 전제', s2.hiddenPremise)}${field('감정', s2.emotion)}${field('반응 행동', s2.reactionBehavior)}${field('반복 루프', s2.reinforcementLoop, true)}</div>`, s2.calInsight)}
      ${section('03', s3.title, s3.description, `<div class="grid">${field('부모의 의도', s3.parentIntention)}${field('반복 반응', s3.repeatedReaction)}${field('아이에게 전달되는 메시지', s3.messageToChild, true)}${field('아이의 해석', s3.childInterpretation, true)}${field('부모가 관찰한 아이의 행동', s3.observedChildBehavior)}${field('반복될 수 있는 행동 패턴', s3.possiblePattern)}</div>`, s3.calInsight)}
      ${section('04', s4.title, s4.description, `<div class="grid">${field('어릴 때 자주 들었던 말', s4.oftenHeardWords)}${field('어릴 때 듣고 싶었던 말', s4.wantedToHearWords)}${field('초기 경험 패턴', s4.earlyExperiencePattern, true)}${field('현재 패턴과의 연결', s4.currentConnection, true)}</div>`, s4.calInsight)}
      
      ${section('05', s5.title, s5.description, `
        <div class="saju-layout">
          <div class="saju-visual"><div class="label">오행 에너지 서클</div><div class="donut-wrap"><div class="donut" style="${donutStyle(ev)}"></div></div></div>
          <div class="saju-visual"><div class="label">오행 분석 지표</div>${energyBars(ev)}</div>
        </div>
        <div class="grid">${field('사주OS 진단 목적', s5.whySajuOS, true)}${field('현재 에너지 구조 구성', s5.currentEnergyStructure, true)}${field('균형 상태의 작동 (Normal)', s5.normalFunction)}${field('불균형 상태의 과활성화 (Distorted)', s5.distortedFunction)}${field('현재 반응 알고리즘과의 정렬', s5.connectionToCurrentPattern, true)}${field('의식 각성을 위한 질문', s5.selfCheckQuestion, true)}</div>
      `, s5.calInsight)}
      
      ${section('06', s6.title, s6.description, `<div class="grid">${field('알아차림 포인트 (Awareness)', s6.awarenessPoint, true)}${field('관점의 전환 (Perspective)', s6.newPerspective, true)}${field('일상적 실천 지침', s6.smallPractice, true)}${field('내면의 확언 문장', s6.choiceSentence, true)}</div>`, s6.calInsight)}
      
      <section class="section">
        <div class="section-head"><div class="num">07</div><div><h3>${esc(s7.title)}</h3>${s7.description?`<div class="desc">${esc(s7.description)}</div>`:''}</div></div>
        <div class="final-message">${esc(s7.finalText)}</div>
        <div class="mirror">${esc(s7.mirrorMessage)}</div>
      </section>
      
      <div class="footer">CAL Parent Scan · Designed by Consciousness Architecture Lab<br/>© CAL. All rights reserved.</div>
    `;
    setTimeout(() => document.querySelector('.report').scrollIntoView({ behavior: 'smooth' }), 100);
  } catch (e) {
    err.textContent = 'JSON 데이터를 파싱하는 중 오류가 발생했습니다: ' + e.message;
    err.style.display = 'block';
  }
}
renderReport();
</script>
</body>
</html>
