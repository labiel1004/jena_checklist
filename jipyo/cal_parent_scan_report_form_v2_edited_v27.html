*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Pretendard","Noto Sans KR","Apple SD Gothic Neo","Malgun Gothic",sans-serif;background:var(--bg);color:var(--ink);line-height:1.75;word-break:keep-all}.wrap{width:min(1080px,calc(100% - 34px));margin:0 auto}.editor{background:var(--green);color:#fff;padding:30px 0}.editor h1{margin:0 0 10px;font-family:Georgia,"Times New Roman",serif;font-size:clamp(2rem,5vw,3.8rem);line-height:1;color:#f5e8c9;letter-spacing:-.04em}.editor p{margin:0 0 18px;color:rgba(255,255,255,.76)}textarea{width:100%;min-height:280px;border:1px solid rgba(255,255,255,.2);border-radius:18px;padding:18px;background:#071d18;color:#f7f1e5;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:.92rem;line-height:1.55;resize:vertical}.buttons{display:flex;gap:12px;flex-wrap:wrap;margin-top:14px}button{border:0;border-radius:999px;padding:14px 22px;font-weight:850;cursor:pointer;font-size:1rem}.primary{background:var(--gold2);color:var(--green)}.secondary{background:transparent;color:var(--gold2);border:1px solid rgba(240,199,111,.55)}.error{color:#ffd5d5;margin-top:10px;font-weight:800;display:none}.report{padding:46px 0 70px}.cover{background:var(--green);color:white;border-radius:34px;padding:clamp(34px,6vw,72px);box-shadow:var(--shadow);position:relative;overflow:hidden;min-height:620px;display:flex;flex-direction:column;justify-content:space-between}.cover:after{display:none}.cover:before{display:none}.cover-inner{position:relative;z-index:1}.eyebrow{color:var(--gold2);letter-spacing:.15em;text-transform:uppercase;font-weight:900;font-size:.82rem;margin-bottom:18px}.cover h2{margin:0;font-family:Georgia,"Times New Roman",serif;font-size:clamp(3rem,8vw,6.2rem);line-height:.92;letter-spacing:-.06em;color:#fff6df}.subtitle{margin-top:24px;max-width:760px;color:#fff;font-size:clamp(1.28rem,2.8vw,2rem);font-weight:850;line-height:1.38}.meta-grid{margin-top:46px;display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.meta{background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.18);border-radius:22px;padding:20px}.meta span{display:block;color:var(--gold2);font-size:.78rem;font-weight:900;letter-spacing:.09em;margin-bottom:6px}.meta strong{display:block;color:#fff;font-size:1.02rem}.tagline{position:relative;z-index:1;margin-top:44px;padding-top:24px;border-top:1px solid rgba(255,255,255,.18);font-size:clamp(1.22rem,2.6vw,1.8rem);font-weight:850;line-height:1.45;color:#fff6df}.section{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);padding:clamp(28px,4vw,46px);margin-top:28px;box-shadow:0 10px 30px rgba(31,42,34,.06)}.section-head{display:flex;gap:18px;align-items:flex-start;border-bottom:1px solid var(--line);padding-bottom:18px;margin-bottom:22px}.num{min-width:46px;height:46px;border-radius:50%;background:var(--green);color:white;display:flex;align-items:center;justify-content:center;font-weight:950}h3{margin:0;color:var(--green);font-size:clamp(1.55rem,3.8vw,2.35rem);line-height:1.22;letter-spacing:-.045em}.desc{margin:12px 0 0;color:var(--muted);font-size:1.04rem;white-space:pre-line}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}.field{background:var(--paper2);border:1px solid #eadfc9;border-radius:20px;padding:20px}.field.full{grid-column:1/-1}.label{color:var(--gold);font-size:.82rem;font-weight:950;letter-spacing:.06em;margin-bottom:8px}.value{white-space:pre-line;color:#2d352e}.output-card{background:#fffdf7;border:1px solid #eadfc9;border-radius:24px;padding:24px;margin-bottom:14px}.output-card .big{font-size:clamp(1.12rem,2.4vw,1.42rem);color:var(--green);font-weight:850;line-height:1.55;white-space:pre-line}.loop{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.loop .field{min-height:150px}.algorithm-core{margin-top:18px;background:#fffdf7;border:1px solid #e8d4a8;border-radius:24px;padding:26px 28px;box-shadow:0 8px 24px rgba(31,42,34,.05)}.algorithm-core .title{color:var(--green);font-size:clamp(1.16rem,2.7vw,1.52rem);font-weight:950;line-height:1.35;letter-spacing:-.03em;margin-bottom:10px}.algorithm-core .text{color:#283229;font-size:clamp(1.06rem,2.2vw,1.2rem);font-weight:850;line-height:1.85;white-space:pre-line}.insight{margin-top:20px;background:var(--green);color:#fff6df;border-radius:22px;padding:24px 26px;font-size:clamp(1.14rem,2.6vw,1.48rem);font-weight:850;line-height:1.55;text-align:center}.insight .label{color:var(--gold2);margin-bottom:8px;font-size:.78rem}.saju-layout{display:grid;grid-template-columns:.95fr 1.2fr;gap:18px;margin-bottom:18px}.saju-visual{background:var(--paper2);border:1px solid #eadfc9;border-radius:24px;padding:24px}.donut-wrap{display:flex;justify-content:center;align-items:center;min-height:250px}.donut{width:230px;height:230px;border-radius:50%;position:relative;background:conic-gradient(#67b85f 0deg 72deg,#f26445 72deg 144deg,#e0af35 144deg 216deg,#d9dee4 216deg 288deg,#3f82d8 288deg 360deg);box-shadow:inset 0 0 0 1px rgba(0,0,0,.05)}.donut:after{content:"사주OS";position:absolute;inset:52px;border-radius:50%;background:var(--paper2);display:flex;align-items:center;justify-content:center;color:var(--green);font-weight:950;letter-spacing:.02em}.bar-list{display:grid;gap:12px;margin-top:14px}.bar-row{display:grid;grid-template-columns:54px 1fr 28px;align-items:center;gap:10px;font-size:.98rem}.bar-label{font-weight:850;color:var(--green)}.bar-track{height:12px;background:#eee3cf;border-radius:999px;overflow:hidden}.bar-fill{height:100%;border-radius:999px;background:var(--green)}.bar-num{text-align:right;font-weight:900;color:var(--gold)}.legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:18px}.legend span{display:inline-flex;gap:6px;align-items:center;font-size:.86rem;color:var(--muted)}.dot{width:10px;height:10px;border-radius:50%;display:inline-block}.final-message{font-size:1.08rem;background:var(--paper2);border-radius:22px;padding:24px;border:1px solid #eadfc9;line-height:1.9}.final-message p{margin:0 0 1.25em}.final-message p:last-child{margin-bottom:0}.mirror{margin-top:16px;background:rgba(23,63,50,.07);border:1px solid rgba(23,63,50,.12);border-radius:22px;padding:22px;color:var(--green);font-weight:850;font-size:1.08rem;white-space:pre-line}.next-step{margin-top:24px;background:#fffdf7;border:1px solid #eadfc9;border-radius:24px;padding:24px 26px;color:#2d352e;line-height:1.85}.next-step .label{color:var(--gold);font-size:.82rem;font-weight:950;letter-spacing:.06em;margin-bottom:8px}.next-step .text{white-space:pre-line}.footer{text-align:center;color:var(--muted);font-size:.95rem;margin-top:34px}@media print{.editor{display:none}body{background:white}.report{padding:0}.section,.cover{box-shadow:none;break-inside:avoid}.section{page-break-inside:avoid}}@media(max-width:860px){.meta-grid,.grid,.loop,.saju-layout{grid-template-columns:1fr}.section-head{gap:12px}.num{min-width:40px;height:40px}.cover{border-radius:24px;min-height:auto}.donut{width:210px;height:210px}.donut:after{inset:48px}}

<section class="editor"><div class="wrap"><h1>CAL Parent Scan<br/>Report FORM v2</h1><p>GPT가 생성한 Parent Scan JSON v2를 붙여넣고 리포트를 생성하세요.</p><textarea id="jsonInput" placeholder="여기에 Parent Scan JSON v2를 붙여넣으세요."></textarea><div class="buttons"><button class="primary" onclick="renderReport()">리포트 생성</button><button class="secondary" onclick="saveGeneratedHtml()">HTML 저장</button><button class="secondary" onclick="window.print()">PDF로 저장/인쇄</button></div><div id="error" class="error"></div></div></section>

<script>
const sampleData={"clientName":"조얀","createdDate":"2026.06.09","reportNo":"CAL-PS-20260609-조얀","reportTitle":"CAL Parent Scan","reportSubtitle":"아이를 통해 드러나는 부모의 반응 알고리즘 리포트","nextStepGuide":"이 리포트는 아이를 통해 드러난 부모님의 반응 패턴을 살펴본 Parent Scan입니다.\n\n아이와의 관계를 넘어, 삶 전반에서 반복되는 감정·선택·관계 패턴을 더 깊이 보고 싶다면 CAL Premium Report를 통해 부모님 자신의 전체 의식 구조를 더 입체적으로 확인할 수 있습니다.\n\nParent Scan이 ‘아이 앞에서 드러나는 나의 반응’을 보는 리포트라면, Premium Report는 ‘내 삶 전체에서 반복되는 나의 자동반응 알고리즘’을 보는 리포트입니다.","section01_currentOutput":{"title":"아이를 통해 드러난 현재의 출력 상태","description":"아이의 행동에 부모가 반복적으로 느끼는 감정과 반응을 한눈에 보여주는 요약 화면입니다","outputSummary":"아이의 독립성과 자기표현이 약해 보일 때, 부모는 기다리기보다 설명하거나 교정하려 합니다. 겉으로는 아이가 스스로 하기를 바라는 말이지만, 안쪽에는 ‘제대로 가르쳐야 한다’는 오래된 요구가 작동합니다.","calInsight":""},"section02_reactionAlgorithm":{"title":"부모의 반응 알고리즘","description":"아이의 행동이 부모에게 어떤 해석과 감정을 거쳐 반응으로 이어지는 과정을 보여주는 섹션입니다","trigger":"아이가 자기 생각을 분명히 말하지 못하거나 자신감 없이 보이는 장면","automaticInterpretation":"지금 바로잡아 주지 않으면 아이가 계속 의존적이거나 약하게 자랄 수 있다.","hiddenPremise":"지금 내 아이는 약하고 불안하다.","emotion":"답답함, 조급함, 걱정, 책임감","reactionBehavior":"반복해서 설명하기, 방법을 알려주기, 아이가 스스로 하도록 요구하기, 부족해 보이는 부분을 빠르게 교정하려 하기","reinforcementLoop":"아이가 자신 있게 표현하지 못함 → 부모가 답답함을 느낌 → 반복 설명과 ‘스스로 해봐’라는 메시지가 나감 → 아이는 더 평가받는 느낌을 받음 → 아이의 표현이 더 조심스러워짐 → 부모는 다시 더 설명해야 한다고 느낌","algorithmCore":"‘제대로 가르쳐야 한다’는 생각은 부모의 책임감에서 나온 자연스러운 마음입니다. 다만 이 생각이 불안과 결합되면, 아이의 미숙함을 성장 과정이 아니라 즉시 보완해야 할 부족함으로 해석하게 됩니다. 그때 부모의 설명은 아이를 돕는 안내이기보다, 부모 안의 불안을 낮추기 위한 자동 개입이 될 수 있습니다.","calInsight":""},"section03_childMessage":{"title":"부모의 반응이 아이에게 전달하는 메시지","description":"부모의 반복된 반응이 아이에게 어떤 메시지로 전달되고, 그 결과 아이가 어떻게 반응하는지를 살펴보는 섹션입니다","parentIntention":"아이가 독립적으로 성장하고, 자신의 생각을 말하며, 건강하고 행복하게 살아가기를 바람","repeatedReaction":"반복 설명, 교정, 스스로 하라는 요구","messageToChild":"나는 지금 이대로 충분하지 않다. 나는 부족한 존재다.","childInterpretation":"내가 말하면 틀릴 수 있다. 엄마가 답답해할 수 있다. 나는 아직 충분하지 않다. 틀리지 않으려면 말하지 않는 게 낫다. 아니면 더 완벽하게 해야 한다.","observedChildBehavior":"자기 생각을 말하지 못하거나 자신감이 부족해 보임. 자꾸 확인하거나 쭈뼛거림. 혹은 상황을 피하거나, 과하게 잘하려고 하다가 긴장하여 실수함.","possiblePattern":"","calInsight":"어린 새는 날개를 펼칠 공간이 있을 때, 바람을 배우기 시작합니다."},"section04_originPattern":{"title":"부모의 반응은 어디에서 시작되었을까요?","description":"현재 부모의 반응은 어느 날 갑자기 만들어진 것이 아닙니다. 어린 시절 경험과 반복적으로 들었던 말들은 지금 아이 앞에서 올라오는 감정과 반응에 영향을 줍니다. 이 섹션에서는 부모의 현재 반응이 어떤 경험 속에서 형성되었는지 그 기원을 살펴봅니다.","oftenHeardWords":"내 강아지, 피곤해 보인다. 너무 애쓰지 말고 그냥저냥 살아라.","wantedToHearWords":"제대로 된 가르침","earlyExperiencePattern":"보호받고 걱정받는 느낌은 있었지만, 삶을 주체적으로 살아가도록 기준과 방향을 배웠다는 느낌은 부족했을 수 있습니다.","currentConnection":"아이에게서 자신감 부족이나 자기표현의 어려움이 보일 때, 부모님 안에서는 ‘나에게 제대로 된 가르침이 있었다면 나는 더 잘 성장할 수 있었을 텐데’, ‘그렇게 고생하지 않았을 텐데’라는 오래된 아쉬움이 함께 건드려질 수 있습니다.","originCore":"‘제대로 된 가르침’은 아이에게 필요한 좋은 기준이 될 수 있습니다. 다만 그 기준이 부모 안의 후회와 불안, 결핍감과 연결될 때, 가르침은 안내가 아니라 긴급한 교정으로 바뀔 수 있습니다. 이때 부모는 아이를 돕고 있다고 느끼지만, 아이는 자신이 부족해서 고쳐져야 한다는 메시지로 받아들일 수 있고, 부모와 아이 사이에는 반복적인 충돌이 생길 수 있습니다.","calInsight":""},"section05_sajuOS":{"title":"사주OS 초기 입력 필터","description":"사주는 우리 삶에 깔린 초기 운영체제와 같습니다. 사주OS는 부모가 세상을 해석하고 반응하는 기본 패턴을 보여주는 초기값입니다. 이 섹션에서는 그 에너지가 건강하게 작동할 때와 왜곡될 때의 차이를 함께 확인합니다.","whySajuOS":"사주는 태어난 년월일시에 깔린 에너지 배치도와 같습니다. 오행은 음과 양의 에너지를 목·화·토·금·수 다섯 가지 성질로 드러나는 방식입니다. 이 섹션에서는 사주를 운명으로 해석하지 않고, 부모님이 어떤 장면에서 더 예민하게 반응하기 쉬운지 이해하는 참고 자료로 사용합니다.","energyChart":{"wood":0,"fire":1,"earth":1,"metal":4,"water":2},"currentEnergyStructure":"금(金)과 수(水) 에너지가 강하게 작동합니다. 이는 상황을 깊게 감지하고, 분석하고, 기준과 구조를 통해 안전을 확보하려는 방향으로 나타납니다.","weakEnergy":"목(木) 에너지가 비어 있습니다. 목(木)은 감정과 생각을 자연스럽게 표현하고, 관계 안에서 방향을 세우는 힘입니다. 이 부분이 약하면 마음을 바로 펼치기보다 머리로 정리하고, 몸에 압축하기 쉬울 수 있습니다.","normalFunction":"건강하게 작동할 때 금(金) 에너지는 필요한 기준과 경계를 세우고, 수(水) 에너지는 상황을 깊이 관찰하며 장기적인 시선으로 바라보게 합니다. 이 조합은 아이의 생활습관과 건강, 성장 방향을 안정적으로 돌보는 힘이 될 수 있습니다.","distortedFunction":"압박이 커지면 금(金) 에너지는 기준과 분별을 넘어 교정과 단절의 방향으로 흐를 수 있고, 수(水) 에너지는 깊은 관찰을 넘어 걱정과 예측 과잉으로 흐를 수 있습니다. 이때 부모의 설명은 안내보다 긴급한 개입에 가까워질 수 있습니다.","lensAmplification":"금수 에너지는 관계의 미세한 신호를 크게 감지하게 만듭니다. 그래서 아이의 자신감 부족이나 표현의 어려움 앞에서 ‘능력이 부족한 건 아닐까’, ‘지금 바로잡아야 하지 않을까’라는 해석과 설명 충동이 빠르게 증폭될 수 있습니다.","connectionToCurrentPattern":"이 사주OS는 현재 현실에서 ‘빨리 설명해야 함’, ‘확인하고 싶음’, ‘지금 잡아주지 않으면 나중에 문제가 될 수 있음’으로 출력될 수 있습니다. 아이가 자신감 없이 보일수록 부모의 기준과 걱정이 동시에 켜지며, 기다림보다 교정이 먼저 나올 수 있습니다.","selfCheckQuestion":"지금 나는 아이에게 필요한 기준을 주고 있는가, 아니면 내 안의 걱정을 낮추기 위해 빠르게 개입하고 있는가?","sajuCoreMessage":"이 사주OS를 가진 부모의 특성은 아이를 깊이 관찰하고, 필요한 기준을 세워주려는 힘이 강하다는 데 있습니다. 다만 그 힘이 불안과 결합되면 기준은 아이를 세우는 힘이 아니라, 아이의 표현 공간을 좁히는 압박으로 전달될 수 있습니다. 이때 핵심은 아이를 고치는 것이 아니라, 기준과 걱정의 강도를 조절하는 것입니다.","calInsight":"금(金)은 틀을 세우고, 수(水)는 깊이를 봅니다. 그러나 틀이 너무 단단하고 물이 너무 깊어지면, 아이의 작은 흔들림도 큰 위험처럼 보일 수 있습니다. 이때 필요한 것은 기준을 버리는 것이 아니라, 아이가 자기 힘으로 움직일 수 있을 만큼 기준의 간격을 넓히는 것입니다."},"section06_newChoice":{"title":"새로운 선택의 시작","description":"자동반응을 없애는 게 목적이 아니라, 반응을 알아차리는 순간 새로운 선택이 가능해집니다. 이 섹션은 지금의 패턴을 반복하는 대신 시도할 수 있는 다른 선택을 살펴봅니다","awarenessPoint":"아이가 자신감 없어 보일 때 올라오는 ‘답답함’은 아이의 현재 상태만이 아니라, 부모님 안의 ‘제대로 가르침을 받지 못했다’는 기억과 연결될 수 있습니다.","newPerspective":"아이가 스스로 하려면 먼저 스스로 느끼고, 생각하고, 말해볼 수 있는 시간이 필요합니다.","smallPractice":"아이에게 바로 설명하기 전에 한 문장만 먼저 물어봅니다. ‘너는 어떻게 생각해?’ 그리고 아이의 답이 부족해 보여도 바로 고치지 않고, ‘그렇게 생각했구나’라고 먼저 받아줍니다.","choiceSentence":"나는 아이를 바로잡기 전에, 아이가 자기 생각을 꺼낼 공간을 먼저 열어준다.","calInsight":"꽃마다 피는 계절이 다르고, 피기 전의 고요함도 성장의 일부입니다."},"section07_finalMessage":{"title":"Final Message","description":"지금까지 살펴본 내용을 토대로 Parent Scan이 발견한 핵심 메시지를 전합니다. 마지막 페이지에서는 아이를 통해 드러난 부모의 반응과 가능성을 하나로 정리합니다","finalText":"조얀님 안에는 아이가 나약하거나 존재감 없이 살아가지 않기를 바라는 강한 마음이 있습니다. 그 마음은 아이를 사랑하기 때문에 생긴 것이지만, 때로는 반복 설명과 교정의 언어로 먼저 나올 수 있습니다. 아이가 자신감 없어 보이는 순간은 부모님이 실패한 순간이 아니라, 부모님 안의 오래된 기준과 결핍이 모습을 드러내는 순간일 수 있습니다. 그 반응을 알아차릴 때, 아이를 더 세게 밀어주는 길 말고도 다른 선택이 열립니다. 설명하기 전에 기다려주기, 고치기 전에 들어주기, 스스로 하라고 말하기 전에 스스로 생각할 공간을 주기. 이 작은 선택들이 아이에게는 ‘나는 부족해서 고쳐져야 하는 존재’가 아니라 ‘나는 내 생각을 말해도 되는 존재’라는 새로운 현실로 전달될 수 있습니다.","mirrorMessage":"아이는 부모가 가르쳐야 할 대상이기 전에, 부모 자신을 만나게 해주는 가장 가깝고 선명한 거울입니다."}};

function esc(v){if(v===undefined||v===null||v==="")return"";return String(v).replace(/[&<>"']/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[s]));}
function paragraphs(v){
  if(v===undefined||v===null||v==="")return "";
  const raw=String(v).trim();
  if(!raw)return "";
  const manual=raw.split(/\n\s*\n/).map(s=>s.trim()).filter(Boolean);
  const chunks=manual.length>1 ? manual : raw
    .replace(/\s+/g,' ')
    .match(/(?:[^.!?。！？]+[.!?。！？]+(?:\s|$)){1,3}|[^.!?。！？]+$/g) || [raw];
  return chunks.map(p=>`<p>${esc(p.trim())}</p>`).join('');
}
function field(label,value,full=false){if(value===undefined||value===null||value==="")return"";return `<div class="field ${full?'full':''}"><div class="label">${label}</div><div class="value">${esc(value)}</div></div>`}
function autoInterpretationBlock(interpretation,premise){
  if((interpretation===undefined||interpretation===null||interpretation==="")&&(premise===undefined||premise===null||premise===""))return "";
  const main=interpretation?`<div class="value">${esc(interpretation)}</div>`:"";
  const sub=premise?`<div class="value" style="margin-top:12px;font-size:.98rem;color:#6f6659;font-weight:750;">(* 전제: ${esc(premise)})</div>`:"";
  return `<div class="field"><div class="label">② 자동 해석</div>${main}${sub}</div>`;
}
function algorithmCore(title,text){if(text===undefined||text===null||text==="")return"";return `<div class="algorithm-core"><div class="title">${esc(title||'알고리즘 핵심')}</div><div class="text">${esc(text)}</div></div>`}
function childInnerMessageBlock(message,interpretation){
  if((message===undefined||message===null||message==="")&&(interpretation===undefined||interpretation===null||interpretation===""))return "";
  const main=message?`<div class="value" style="font-weight:850;color:var(--green);">${esc(message)}</div>`:"";
  const sub=interpretation?`<div class="value" style="margin-top:12px;">${esc(interpretation)}</div>`:"";
  return `<div class="field full"><div class="label">아이 안에서 자극될 수 있는 내면 해석</div>${main}${sub}</div>`;
}
function childBehaviorPatternBlock(observed,pattern){
  if((observed===undefined||observed===null||observed==="")&&(pattern===undefined||pattern===null||pattern===""))return "";
  const main=observed?`<div class="value">${esc(observed)}</div>`:"";
  const sub=pattern?`<div class="value" style="margin-top:12px;">${esc(pattern)}</div>`:"";
  return `<div class="field full"><div class="label">부모가 관찰한 아이의 행동 패턴</div>${main}${sub}</div>`;
}
function insight(text){if(!text)return"";return `<div class="insight"><div class="label">CAL INSIGHT</div>${esc(text)}</div>`}
function nextStepGuide(text){
  if(!text)return "";
  return `<div class="next-step"><div class="label">다음 단계 안내</div><div class="text">${esc(text)}</div></div>`;
}
function section(num,title,desc,inner,cal){return `<section class="section"><div class="section-head"><div class="num">${num}</div><div><h3>${esc(title)}</h3>${desc?`<div class="desc">${esc(desc)}</div>`:""}</div></div>${inner}${insight(cal)}</section>`}
function energyValues(chart){const c=chart||{};return{wood:Number(c.wood||0),fire:Number(c.fire||0),earth:Number(c.earth||0),metal:Number(c.metal||0),water:Number(c.water||0)}}
function donutStyle(values){const total=Math.max(1,values.wood+values.fire+values.earth+values.metal+values.water);let a0=0;const colors={wood:'#67b85f',fire:'#f26445',earth:'#e0af35',metal:'#d9dee4',water:'#3f82d8'};const parts=[];for(const key of ['wood','fire','earth','metal','water']){const deg=values[key]/total*360;parts.push(`${colors[key]} ${a0}deg ${a0+deg}deg`);a0+=deg;}return `background:conic-gradient(${parts.join(',')});`}
function energyBars(values){const labels=[['wood','목(木)','#67b85f'],['fire','화(火)','#f26445'],['earth','토(土)','#e0af35'],['metal','금(金)','#d9dee4'],['water','수(水)','#3f82d8']];const max=Math.max(1,...labels.map(([k])=>values[k]));return `<div class="bar-list">`+labels.map(([k,label,color])=>{const pct=values[k]/max*100;return `<div class="bar-row"><div class="bar-label">${label}</div><div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${color};"></div></div><div class="bar-num">${values[k]}</div></div>`}).join('')+`</div><div class="legend">${labels.map(([k,label,color])=>`<span><i class="dot" style="background:${color}"></i>${label}</span>`).join('')}</div>`}

function cleanJsonText(raw){
  let t=String(raw||"").trim();
  t=t.replace(/^```(?:json)?\s*/i,"").replace(/```$/,"").trim();
  const first=t.indexOf("{");
  const last=t.lastIndexOf("}");
  if(first>=0 && last>first) t=t.slice(first,last+1);
  return t;
}
function formatDateValue(v){
  const now=new Date();
  if(!v || String(v).trim()==="" || String(v).trim()==="정보 부족"){
    const y=now.getFullYear();
    const m=String(now.getMonth()+1).padStart(2,"0");
    const d=String(now.getDate()).padStart(2,"0");
    return `${y}.${m}.${d}`;
  }
  const nums=String(v).match(/\d+/g);
  if(nums && nums.length>=3){
    const y=nums[0].padStart(4,"0");
    const m=nums[1].padStart(2,"0");
    const d=nums[2].padStart(2,"0");
    return `${y}.${m}.${d}`;
  }
  return String(v).trim();
}
function makeReportNo(dateValue,clientName,existing){
  if(existing && String(existing).trim()!=="" && String(existing).trim()!=="정보 부족") return String(existing).trim();
  const dateDigits=String(dateValue||formatDateValue()).replace(/\D/g,"").slice(0,8);
  const name=(clientName && String(clientName).trim()!=="" && String(clientName).trim()!=="정보 부족") ? String(clientName).trim() : "고객";
  return `CAL-PS-${dateDigits||"00000000"}-${name}`;
}
function normalizeMeta(data){
  data.createdDate=formatDateValue(data.createdDate);
  data.clientName=(data.clientName && String(data.clientName).trim()!=="") ? String(data.clientName).trim() : "고객";
  data.reportNo=makeReportNo(data.createdDate,data.clientName,data.reportNo);
  return data;
}

function saveGeneratedHtml(){
  const report=document.getElementById('reportRoot');
  const err=document.getElementById('error');
  if(!report || !report.innerHTML.trim()){
    err.textContent='먼저 리포트 생성을 눌러 HTML 리포트를 만든 뒤 저장해주세요.';
    err.style.display='block';
    return;
  }
  const title=(document.querySelector('.cover h2')?.textContent || 'CAL Parent Scan').trim();
  const client=(document.querySelector('.meta strong')?.textContent || '고객').trim();
  const fullHtml=`<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>${title} - ${client}</title>
<style>
${document.querySelector('style').innerHTML}
.hero{display:none!important}
.report{display:block!important;padding-top:32px}
</style>
</head>
<body>
<main class="report"><div class="wrap">${report.innerHTML}</div></main>
</body>
</html>`;
  const blob=new Blob([fullHtml],{type:'text/html;charset=utf-8'});
  const a=document.createElement('a');
  const safeClient=client.replace(/[\\/:*?"<>|]/g,'_');
  a.href=URL.createObjectURL(blob);
  a.download=`CAL_Parent_Scan_${safeClient}.html`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(a.href);
}

<section class="cover"><div class="cover-inner"><div class="eyebrow">Consciousness Architecture Lab</div><h2>${esc(data.reportTitle||'CAL Parent Scan')}</h2><div class="subtitle">${esc(data.reportSubtitle||'아이를 통해 드러나는 부모의 반응 알고리즘 리포트')}</div><div class="meta-grid"><div class="meta"><span>CLIENT</span><strong>${esc(data.clientName||'정보 부족')}</strong></div><div class="meta"><span>DATE</span><strong>${esc(data.createdDate||'정보 부족')}</strong></div><div class="meta"><span>REPORT NO</span><strong>${esc(data.reportNo||'정보 부족')}</strong></div></div></div><div class="tagline">아이를 이해하는 첫 걸음,<br/>나를 이해하는 것에서 시작됩니다.</div></section>
${section('01',s1.title,s1.description,`<div class="output-card"><div class="label">현재 출력 요약</div><div class="big">${esc(s1.outputSummary)}</div></div>`,s1.calInsight)}
${section('02',s2.title,s2.description,`<div class="loop">${field('① 자극',s2.trigger)}${autoInterpretationBlock(s2.automaticInterpretation,s2.hiddenPremise)}${field('③ 감정',s2.emotion)}${field('④ 반응 행동',s2.reactionBehavior)}${field('⑤ 반복 루프',s2.reinforcementLoop,true)}</div>${algorithmCore('Core Message',s2.algorithmCore)}`,s2.calInsight)}
${section('03',s3.title,s3.description,`<div class="grid">${field('부모의 의도',s3.parentIntention)}${field('부모의 반복 반응',s3.repeatedReaction)}${childInnerMessageBlock(s3.messageToChild,s3.childInterpretation)}${childBehaviorPatternBlock(s3.observedChildBehavior,s3.possiblePattern)}</div>`,s3.calInsight)}
${section('04',s4.title,s4.description,`<div class="grid">${field('어릴 때 자주 들었던 말',s4.oftenHeardWords)}${field('어릴 때 듣고 싶었던 말',s4.wantedToHearWords)}${field('초기 경험 패턴',s4.earlyExperiencePattern,true)}${field('현재 패턴과의 연결',s4.currentConnection,true)}</div>${algorithmCore('Core Message',s4.originCore)}`,s4.calInsight)}
${section('05',s5.title,s5.description,`<div class="saju-layout"><div class="saju-visual"><div class="label">오행 에너지 도넛</div><div class="donut-wrap"><div class="donut" style="${donutStyle(ev)}"></div></div></div><div class="saju-visual"><div class="label">오행 숫자바</div>${energyBars(ev)}</div></div><div class="grid">${field('사주OS를 보는 이유',s5.whySajuOS,true)}${field('에너지 해석',s5.currentEnergyStructure,true)}${field('약한 에너지',s5.weakEnergy,true)}${field('건강한 작동',s5.normalFunction)}${field('왜곡된 작동',s5.distortedFunction)}${field('렌즈 증폭',s5.lensAmplification,true)}${field('현실 출력 연결',s5.connectionToCurrentPattern,true)}${field('스스로 확인할 질문',s5.selfCheckQuestion,true)}</div>${algorithmCore('Core Message',s5.sajuCoreMessage)}`,s5.calInsight)}
${section('06',s6.title,s6.description,`<div class="grid">${field('알아차릴 지점',s6.awarenessPoint,true)}${field('새로운 관점',s6.newPerspective)}${field('작은 실천',s6.smallPractice)}${field('선택 문장',s6.choiceSentence,true)}</div>`,s6.calInsight)}
<section class="section"><div class="section-head"><div class="num">07</div><div><h3>${esc(s7.title)}</h3>${s7.description?`<div class="desc">${esc(s7.description)}</div>`:''}</div></div><div class="final-message">${paragraphs(s7.finalText)}</div><div class="mirror">${esc(s7.mirrorMessage)}</div></section>
${nextStepGuide(data.nextStepGuide)}
<div class="footer">CAL Parent Scan · by Consciousness Architecture Lab<br/>© CAL. All rights reserved.</div>`;setTimeout(()=>document.querySelector('.report').scrollIntoView({behavior:'smooth'}),100)}catch(e){err.textContent='JSON 형식을 확인해주세요: '+e.message;err.style.display='block'}}renderReport();
</script></body></html>
